<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Game Time Estimator v5</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0c0f0a; color: #dde8d8; font-family: 'DM Serif Display', serif; }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2e3d2c; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useRef, useMemo } = React;

        // ── RESTORED LOGIC FROM TSX FILE ──────────────────────────────────────────
        const LEAGUES = {
            hs:       { label: "High School",         halfInning: 10,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
            college:  { label: "College / NCAA",      halfInning: 11,  warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
            rec:      { label: "Adult Rec / Amateur", halfInning: 13,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
            mlb:      { label: "MLB / Pro",           halfInning: 10,  warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
            softball: { label: "Softball",            halfInning: 9,   warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
            custom:   { label: "Custom",              halfInning: 11,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
        };

        const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
        const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];
        const isWarmup = p => p === EV.START || p === EV.MID;

        const C = {
            bg: "#0c0f0a", card: "#141914", border: "#1f261e", borderBright: "#2e3d2c",
            text: "#dde8d8", muted: "#6b7f66", faint: "#2e3d2c",
            green: "#4caf6e", greenDim: "#0d2016",
            red: "#e05c4b", redDim: "#2a0d09",
            yellow: "#d4a843", yellowDim: "#2a1f07",
            blue: "#5b9bd5", blueDim: "#0a1829",
            accent: "#a3e635", accentDim: "#1a2a06",
            orange: "#e8834a",
        };

        const DISPLAY = "'Bebas Neue', Impact, sans-serif";
        const MONO = "'DM Mono', monospace";

        // ── UTILITIES ──
        function parseTime(str) {
            if (!str) return null;
            const [h, m] = str.trim().split(":").map(Number);
            return h * 60 + m;
        }
        function formatTime(min) {
            if (min == null || isNaN(min)) return "—";
            const t = ((Math.round(min)) % 1440 + 1440) % 1440;
            const h = Math.floor(t / 60), m = t % 60;
            return `${h % 12 === 0 ? 12 : h % 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
        }
        function formatDur(min) {
            if (min == null || isNaN(min)) return "—";
            const m = Math.round(min);
            return m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}m` : `${m}m`;
        }
        function nowHM() {
            const d = new Date();
            return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
        }
        function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }

        function phaseLabel(inning, phase) {
            const m = { start: `Pre-${inning} Warmup`, top: `Top ${inning}`, mid: `Mid-${inning} Warmup`, bot: `Bot ${inning}` };
            return m[phase] ?? "";
        }

        // ── SIMULATION ENGINES ──
        function poissonSample(lambda) {
            if (lambda <= 0) return 0;
            const L = Math.exp(-Math.min(lambda, 20));
            let k = 0, p = 1;
            do { k++; p *= Math.random(); } while (p > L);
            return k - 1;
        }

        function computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning, halfDurCount }) {
            if (halfDurCount < 2) return null;
            const prior = 0.8, pw = 2;
            const awayRuns = runsLog.filter(r => r.team === "away").reduce((s, r) => s + r.runs, 0);
            const homeRuns = runsLog.filter(r => r.team === "home").reduce((s, r) => s + r.runs, 0);
            const awayHalves = Math.max(1, runsLog.filter(r => r.half === "top").length);
            const homeHalves = Math.max(1, runsLog.filter(r => r.half === "bot").length);
            const awayRate = (awayRuns + pw * prior) / (awayHalves + pw);
            const homeRate = (homeRuns + pw * prior) / (homeHalves + pw);
            const remAway = Math.max(0, totalInnings - Math.ceil(halfDurCount / 2));
            const remHome = Math.max(0, totalInnings - lastCompletedInning);
            const N = 2000;
            let mercy = 0, endTop = 0, endBot = 0, extra = 0;
            for (let i = 0; i < N; i++) {
                let a = score.away, h = score.home;
                for (let j = 0; j < remAway; j++) a += poissonSample(awayRate);
                for (let j = 0; j < remHome; j++) h += poissonSample(homeRate);
                if (mercyAfter && mercyRuns && Math.abs(a - h) >= mercyRuns) mercy++;
                if (h > a) endTop++; else if (a > h) endBot++; else extra++;
            }
            return { mercy: mercy/N, endAfterTop: endTop/N, endAfterBot: endBot/N, extra: extra/N, awayRate, homeRate };
        }

        function computeEstimate({ events, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog, gameStartTime }) {
            const sorted = [...events].sort((a, b) => a.time - b.time);
            const halfDurs = [], warmupDurs = [];
            for (let i = 0; i < sorted.length - 1; i++) {
                const c = sorted[i], n = sorted[i + 1];
                const d = n.time - c.time;
                if (d < 0 || d > 90) continue;
                if (isWarmup(c.phase)) warmupDurs.push(d); else halfDurs.push(d);
            }
            const avgHalf = avg(halfDurs) ?? fallbackHalf;
            const avgWarmup = avg(warmupDurs) ?? fallbackWarmup;
            const last = sorted[sorted.length - 1] || { time: gameStartTime, inning: 1, phase: EV.START };
            
            let remHalf = 0, remWarmup = 0;
            for (let inn = last.inning; inn <= totalInnings; inn++) {
                PHASE_ORDER.forEach(ph => {
                    if (inn === last.inning && PHASE_ORDER.indexOf(ph) <= PHASE_ORDER.indexOf(last.phase)) return;
                    if (inn === totalInnings && ph === EV.BOT && score.home > score.away) return;
                    if (ph === EV.TOP || ph === EV.BOT) remHalf++; else remWarmup++;
                });
            }
            const estimatedEnd = last.time + (remHalf * avgHalf) + (remWarmup * avgWarmup);
            const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
            const probs = computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning: lastCompleted, halfDurCount: halfDurs.length });

            return { 
                estimatedEnd, avgHalf, avgWarmup, remHalf, remWarmup, probs,
                confidence: halfDurs.length < 2 ? "low" : halfDurs.length < 4 ? "fair" : "strong",
                lastCompletedInning: lastCompleted, canEstimate: true 
            };
        }

        // ── MICRO COMPONENTS ──
        const StatBox = ({ label, value, sub, color }) => (
            <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: "4px", padding: "8px 4px", textAlign: "center" }}>
                <div style={{ fontSize: "9px", textTransform: "uppercase", color: C.muted, fontFamily: MONO }}>{label}</div>
                <div style={{ fontSize: "18px", fontFamily: DISPLAY, color: color || C.text }}>{value}</div>
                {sub && <div style={{ fontSize: "8px", color: C.faint }}>{sub}</div>}
            </div>
        );

        const Btn = ({ children, onClick, variant = "primary", full }) => (
            <button onClick={onClick} style={{ 
                width: full ? "100%" : "auto", padding: "10px 16px", borderRadius: "4px", border: "none",
                background: variant === "primary" ? C.accent : C.border, color: variant === "primary" ? C.bg : C.text,
                fontFamily: DISPLAY, letterSpacing: "1px", cursor: "pointer"
            }}>{children}</button>
        );

        // ── MAIN SCREENS ──
        function SetupScreen({ onStart }) {
            const [league, setLeague] = useState("hs");
            const [away, setAway] = useState("Visitors");
            const [home, setHome] = useState("Home");
            const [startTime, setStartTime] = useState(nowHM());

            return (
                <div style={{ padding: "20px", maxWidth: "420px", margin: "0 auto" }}>
                    <h1 style={{ fontFamily: DISPLAY, color: C.accent, fontSize: "42px", margin: "0 0 20px" }}>GAME ESTIMATOR</h1>
                    <div style={{ background: C.card, padding: "16px", borderRadius: "8px", border: `1px solid ${C.border}` }}>
                        <label style={{ display: "block", fontSize: "10px", fontFamily: MONO, color: C.muted }}>LEAGUE</label>
                        <select value={league} onChange={e => setLeague(e.target.value)} style={{ width: "100%", padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.border}`, marginBottom: "15px" }}>
                            {Object.entries(LEAGUES).map(([k, l]) => <option key={k} value={k}>{l.label}</option>)}
                        </select>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "15px" }}>
                            <input placeholder="Away" value={away} onChange={e => setAway(e.target.value)} style={{ padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.border}` }} />
                            <input placeholder="Home" value={home} onChange={e => setHome(e.target.value)} style={{ padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.border}` }} />
                        </div>
                        <label style={{ display: "block", fontSize: "10px", fontFamily: MONO, color: C.muted }}>START TIME</label>
                        <input value={startTime} onChange={e => setStartTime(e.target.value)} style={{ width: "100%", padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.border}`, marginBottom: "20px" }} />
                        <Btn full onClick={() => onStart({ ...LEAGUES[league], away, home, gameStartTime: parseTime(startTime), league })}>START GAME →</Btn>
                    </div>
                </div>
            );
        }

        function GameTracker({ config, onNewGame }) {
            const [events, setEvents] = useState([]);
            const [score, setScore] = useState({ home: 0, away: 0 });
            const [runsLog, setRunsLog] = useState([]);
            const [gameLog, setGameLog] = useState([]);
            const [entryTime, setEntryTime] = useState(nowHM());
            const [scoreInput, setScoreInput] = useState("0");
            const [isPrompting, setIsPrompting] = useState(false);

            const est = computeEstimate({ events, score, ...config, runsLog });
            
            const getNext = () => {
                if (!events.length) return { inning: 1, phase: EV.START };
                const last = events[events.length - 1];
                const idx = PHASE_ORDER.indexOf(last.phase);
                if (idx < 3) return { inning: last.inning, phase: PHASE_ORDER[idx + 1] };
                return { inning: last.inning + 1, phase: EV.START };
            };
            const next = getNext();

            const logEvent = () => {
                const t = parseTime(entryTime);
                if (next.phase === EV.MID || (next.phase === EV.START && events.length > 0)) {
                    setIsPrompting(true);
                } else {
                    commit(t);
                }
            };

            const commit = (t, runs = 0) => {
                const team = next.phase === EV.MID ? "away" : "home";
                if (runs > 0) {
                    setScore(prev => ({ ...prev, [team]: prev[team] + runs }));
                    setRunsLog(prev => [...prev, { team, runs, inning: next.inning, half: next.phase === EV.MID ? "top" : "bot" }]);
                }
                const newEv = { ...next, time: t, id: Date.now() };
                setEvents([...events, newEv]);
                setGameLog([...gameLog, { ts: entryTime, msg: `Logged ${phaseLabel(next.inning, next.phase)}` }]);
                setIsPrompting(false);
                setScoreInput("0");
            };

            return (
                <div style={{ padding: "16px", maxWidth: "440px", margin: "0 auto" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "15px" }}>
                        <div style={{ fontFamily: DISPLAY, fontSize: "24px" }}>{config.away} @ {config.home}</div>
                        <Btn variant="ghost" onClick={onNewGame}>RESET</Btn>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "15px", textAlign: "center" }}>
                        <div style={{ background: C.card, padding: "10px", borderRadius: "8px" }}>
                            <div style={{ fontSize: "42px", fontFamily: DISPLAY }}>{score.away}</div>
                            <div style={{ fontSize: "10px", color: C.muted }}>{config.away.toUpperCase()}</div>
                        </div>
                        <div style={{ background: C.card, padding: "10px", borderRadius: "8px" }}>
                            <div style={{ fontSize: "42px", fontFamily: DISPLAY }}>{score.home}</div>
                            <div style={{ fontSize: "10px", color: C.muted }}>{config.home.toUpperCase()}</div>
                        </div>
                    </div>

                    <div style={{ background: C.card, padding: "20px", borderRadius: "8px", border: `1px solid ${C.accent}`, marginBottom: "15px", textAlign: "center" }}>
                        <div style={{ fontSize: "10px", color: C.muted, fontFamily: MONO }}>ESTIMATED END</div>
                        <div style={{ fontSize: "48px", fontFamily: DISPLAY, color: C.accent }}>{formatTime(est.estimatedEnd)}</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "5px", marginTop: "15px" }}>
                            <StatBox label="½-INN" value={formatDur(est.avgHalf)} />
                            <StatBox label="WRM" value={formatDur(est.avgWarmup)} />
                            <StatBox label="LEFT" value={est.remHalf} />
                            <StatBox label="CONF" value={est.confidence} />
                        </div>
                    </div>

                    {isPrompting ? (
                        <div style={{ background: C.yellowDim, padding: "15px", borderRadius: "8px", border: `1px solid ${C.yellow}`, marginBottom: "15px" }}>
                            <div style={{ fontSize: "12px", fontFamily: MONO, marginBottom: "10px" }}>Runs scored in previous half?</div>
                            <div style={{ display: "flex", gap: "10px" }}>
                                <input type="number" value={scoreInput} onChange={e => setScoreInput(e.target.value)} style={{ flex: 1, padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.yellow}` }} />
                                <Btn onClick={() => commit(parseTime(entryTime), parseInt(scoreInput))}>CONFIRM</Btn>
                            </div>
                        </div>
                    ) : (
                        <div style={{ background: C.card, padding: "15px", borderRadius: "8px", border: `1px solid ${C.border}`, marginBottom: "15px" }}>
                            <div style={{ fontSize: "10px", color: C.muted, marginBottom: "5px" }}>NEXT: {phaseLabel(next.inning, next.phase)}</div>
                            <div style={{ display: "flex", gap: "10px" }}>
                                <input value={entryTime} onChange={e => setEntryTime(e.target.value)} style={{ flex: 1, padding: "10px", background: C.bg, color: C.text, border: `1px solid ${C.border}` }} />
                                <Btn onClick={logEvent}>LOG NOW</Btn>
                            </div>
                        </div>
                    )}

                    <div style={{ background: C.card, padding: "15px", borderRadius: "8px", maxHeight: "150px", overflowY: "auto" }}>
                        <div style={{ fontSize: "10px", color: C.muted, marginBottom: "5px" }}>GAME LOG</div>
                        {gameLog.map((l, i) => (
                            <div key={i} style={{ fontSize: "11px", fontFamily: MONO, borderBottom: `1px solid ${C.border}`, padding: "4px 0" }}>
                                <span style={{ color: C.faint }}>[{l.ts}]</span> {l.msg}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [config, setConfig] = useState(null);
            return config ? <GameTracker config={config} onNewGame={() => setConfig(null)} /> : <SetupScreen onStart={setConfig} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
