    <script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ── Fonts & Colors (Rustic Scorecard Theme) ───────────────────────────────────
const FONT = "https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&display=swap";

const C = {
  bg: "#f4f1ea", card: "#eae4d3", border: "#d0c8b6", borderBright: "#b8af9b",
  text: "#2c2c2c", muted: "#5a5a5a", faint: "#8a8a8a",
  green: "#4a6b4a", greenDim: "#d4dbd4",
  red: "#8b3a3a", redDim: "#ebd6d6",
  yellow: "#b89030", yellowDim: "#e8dfc8",
  blue: "#4a6b8c", blueDim: "#d2dce6",
  accent: "#8b3a3a", accentDim: "#e0caca",
  orange: "#b3592d",
};
const DISPLAY = "'Special Elite', cursive";
const MONO    = "'Courier Prime', monospace";
const SERIF   = "'Courier Prime', monospace";

// ── League presets ────────────────────────────────────────────────────────────
const LEAGUES = {
  hs:       { label: "High School",         halfInning: 10,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  college:  { label: "College / NCAA",      halfInning: 11,  warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
  rec:      { label: "Adult Rec / Amateur", halfInning: 13,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  mlb:      { label: "MLB / Pro",           halfInning: 10,  warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
  softball: { label: "Softball",            halfInning: 9,   warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
  custom:   { label: "Custom",              halfInning: 11,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
};

// ── Phase constants ───────────────────────────────────────────────────────────
const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];
const isWarmup = p => p === EV.START || p === EV.MID;

function phaseLabel(inning, phase) {
  const m = { start: `Pre-${inning} Warmup`, top: `Top ${inning}`, mid: `Mid-${inning} Warmup`, bot: `Bot ${inning}` };
  return m[phase] ?? "";
}
function phaseDesc(phase) {
  const m = { start: "Between-inning warmup begins", top: "Away steps up to bat", mid: "Mid-inning warmup begins", bot: "Home steps up to bat" };
  return m[phase] ?? "";
}

// ── Time utils ────────────────────────────────────────────────────────────────
function parseTime(str) {
  if (!str) return null;
  const [h, m] = str.trim().split(":").map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function formatTime(min) {
  if (min == null || isNaN(min)) return "—";
  const t = ((Math.round(min)) % 1440 + 1440) % 1440;
  const h = Math.floor(t / 60), m = t % 60;
  return `${h % 12 === 0 ? 12 : h % 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
}
function formatDur(min) {
  if (min == null || isNaN(min)) return "—";
  const m = Math.round(min);
  return m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}m` : `${m}m`;
}
function nowHM() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── Next phase logic ──────────────────────────────────────────────────────────
function getNextPhase(phaseEvents) {
  if (!phaseEvents.length) return { inning: 1, phase: EV.START };
  const sorted = [...phaseEvents].sort((a, b) => a.time - b.time);
  const last = sorted[sorted.length - 1];
  const idx = PHASE_ORDER.indexOf(last.phase);
  if (idx < 3) {
    return { inning: last.inning, phase: PHASE_ORDER[idx + 1] };
  }
  return { inning: last.inning + 1, phase: EV.START };
}

function isGamePotentiallyOver(phaseEvents, score, totalInnings, mercyAfter, mercyRuns) {
  if (!phaseEvents.length) return false;
  const sorted = [...phaseEvents].sort((a, b) => a.time - b.time);
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const diff = Math.abs(score.home - score.away);

  if (mercyAfter && mercyRuns && lastCompleted >= mercyAfter && diff >= mercyRuns) return true;
  if (mercyAfter && mercyRuns && last.phase === EV.BOT && last.inning >= mercyAfter && diff >= mercyRuns && score.home > score.away) return true;
  
  if (last.inning === totalInnings && last.phase === EV.MID && score.home > score.away) return true;
  if (lastCompleted >= totalInnings && score.home !== score.away) return true;
  
  return false;
}

// ── Monte Carlo probability engine ───────────────────────────────────────────
function poissonSample(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-Math.min(lambda, 20));
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning, halfDurCount }) {
  if (halfDurCount < 2) return null;
  const prior = 0.8, pw = 2;
  const awayRuns   = runsLog.filter(r => r.team === "away").reduce((s, r) => s + r.runs, 0);
  const homeRuns   = runsLog.filter(r => r.team === "home").reduce((s, r) => s + r.runs, 0);
  const awayHalves = Math.max(1, runsLog.filter(r => r.half === "top").length);
  const homeHalves = Math.max(1, runsLog.filter(r => r.half === "bot").length);
  const awayRate   = (awayRuns + pw * prior) / (awayHalves + pw);
  const homeRate   = (homeRuns + pw * prior) / (homeHalves + pw);
  const remAway = Math.max(0, totalInnings - Math.ceil(halfDurCount / 2));
  const remHome = Math.max(0, totalInnings - lastCompletedInning);
  const N = 4000;
  let mercy = 0, endTop = 0, endBot = 0, extra = 0;
  for (let i = 0; i < N; i++) {
    let a = score.away, h = score.home;
    for (let j = 0; j < remAway; j++) a += poissonSample(awayRate);
    for (let j = 0; j < remHome; j++) h += poissonSample(homeRate);
    const diff = Math.abs(a - h);
    if (mercyAfter && mercyRuns && diff >= mercyRuns && lastCompletedInning >= mercyAfter - 1) mercy++;
    if (h > a) endTop++; else if (a > h) endBot++; else extra++;
  }
  return {
    mercy:       clamp(mercy / N, 0, 0.97),
    endAfterTop: clamp(endTop / N, 0, 0.97),
    endAfterBot: clamp(endBot / N, 0, 0.97),
    extra:       clamp(extra / N, 0, 0.97),
    awayRate, homeRate,
  };
}

// ── Core estimate engine ──────────────────────────────────────────────────────
function computeEstimate({ phaseEvents, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog }) {
  if (!phaseEvents.length) return null;
  const sorted = [...phaseEvents].sort((a, b) => a.time - b.time);
  const halfDurs = [], warmupDurs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const c = sorted[i], n = sorted[i + 1];
    const d = n.time - c.time;
    if (d < 0 || d > 90) continue;
    if (c.phase === EV.START && n.phase === EV.TOP  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.MID  && n.phase === EV.BOT  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.TOP  && n.phase === EV.MID  && n.inning === c.inning)      halfDurs.push(d);
    if (c.phase === EV.BOT  && n.phase === EV.START && n.inning === c.inning + 1) halfDurs.push(d);
  }
  const measuredHalf   = avg(halfDurs);
  const measuredWarmup = avg(warmupDurs);
  const avgHalf   = measuredHalf   ?? fallbackHalf;
  const avgWarmup = measuredWarmup ?? fallbackWarmup;
  const minS = Math.min(halfDurs.length, warmupDurs.length);
  const confidence = minS === 0 ? null : minS === 1 ? "low" : minS <= 2 ? "fair" : minS <= 4 ? "good" : "strong";
  const canEstimate = warmupDurs.length >= 1;
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const runDiff = Math.abs(score.home - score.away);
  const mercyEligible = !!(mercyAfter && mercyRuns && lastCompleted >= mercyAfter && runDiff >= mercyRuns);
  const homeLeading = score.home > score.away;
  const botFinalNeeded = !homeLeading;
  const inExtra = lastCompleted >= totalInnings;
  let remHalf = 0, remWarmup = 0;
  const effEnd = inExtra ? lastCompleted + 1 : totalInnings;
  for (let inn = 1; inn <= effEnd; inn++) {
    for (const ph of PHASE_ORDER) {
      if (inn === totalInnings && ph === EV.BOT && !botFinalNeeded && !inExtra) continue;
      if (inn === 1 && ph === EV.START) continue;
      if (sorted.some(e => e.inning === inn && e.phase === ph)) continue;
      if (ph === EV.TOP || ph === EV.BOT) remHalf++; else remWarmup++;
    }
  }
  if (inExtra) { remHalf += 2; remWarmup += 2; }
  const estimatedEnd = last.time + remHalf * avgHalf + remWarmup * avgWarmup;
  const probs = computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning: lastCompleted, halfDurCount: halfDurs.length });
  return {
    avgHalf, avgWarmup, measuredHalf, measuredWarmup,
    halfDurs, warmupDurs, confidence, canEstimate,
    remHalf, remWarmup, estimatedEnd, last,
    mercyEligible, botFinalNeeded, inExtra,
    lastCompletedInning: lastCompleted, currentlyInWarmup: isWarmup(last.phase),
    probs, runDiff,
  };
}

// ── Import / Export helpers ───────────────────────────────────────────────────
const SAVE_VERSION = 2;

function exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory) {
  const data = {
    v: SAVE_VERSION,
    savedAt: new Date().toISOString(),
    config, events, baseScore, baseRunsLog, gameLog, estimateHistory,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const ts   = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "-");
  a.href     = url;
  a.download = `game_${config.away}_vs_${config.home}_${ts}.json`.replace(/\s+/g, "_");
  a.click();
  URL.revokeObjectURL(url);
}

function exportGameText(config, events, baseScore, baseRunsLog, gameLog, estimateHistory) {
  const lines = [
    `GAME: ${config.away} @ ${config.home}`,
    `SAVED: ${new Date().toLocaleString()}`,
    `---`,
    JSON.stringify({ v: SAVE_VERSION, config, events, baseScore, baseRunsLog, gameLog, estimateHistory }),
  ];
  return lines.join("\n");
}

function parseImport(text) {
  try {
    const data = JSON.parse(text.trim());
    if (data.v && data.config && data.events) return { ok: true, data };
    return { ok: false, error: "Unrecognized format" };
  } catch {
    const lines = text.trim().split("\n");
    for (let i = lines.length - 1; i >= 0; i--) {
      try {
        const data = JSON.parse(lines[i]);
        if (data.v && data.config && data.events) return { ok: true, data };
      } catch {}
    }
    return { ok: false, error: "Could not parse game data" };
  }
}

// ── Micro components ──────────────────────────────────────────────────────────
function Label({ children, style: s }) {
  return <div style={{ fontSize: "11px", letterSpacing: "1px", textTransform: "uppercase", color: C.muted, fontFamily: MONO, marginBottom: "5px", fontWeight: "bold", ...s }}>{children}</div>;
}
function Inp({ value, onChange, placeholder, type = "text", style: s, autoFocus }) {
  return (
    <input autoFocus={autoFocus} type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: "0px", color: C.text, padding: "9px 11px", fontSize: "14px", fontFamily: MONO, width: "100%", boxSizing: "border-box", outline: "none", WebkitAppearance: "none", ...s }} />
  );
}
function Sel({ value, onChange, children, style: s }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: "0px", color: C.text, padding: "9px 11px", fontSize: "14px", fontFamily: MONO, width: "100%", boxSizing: "border-box", outline: "none", WebkitAppearance: "none", ...s }}>
      {children}
    </select>
  );
}
function Btn({ children, onClick, variant = "primary", small, full, disabled, style: s }) {
  const vs = {
    primary:   { background: C.text, color: C.bg, border: `2px solid ${C.text}`, boxShadow: `2px 2px 0px ${C.text}` },
    outline:   { background: "transparent", color: C.text, border: `2px solid ${C.text}`, boxShadow: `2px 2px 0px ${C.text}` },
    ghost:     { background: "transparent", color: C.muted, border: `1px dashed ${C.borderBright}` },
    danger:    { background: C.red, color: C.bg, border: `2px solid ${C.red}`, boxShadow: `2px 2px 0px ${C.red}` },
    success:   { background: C.green, color: C.bg, border: `2px solid ${C.green}`, boxShadow: `2px 2px 0px ${C.green}` },
    highlight: { background: C.yellow, color: C.bg, border: `2px solid ${C.yellow}`, boxShadow: `2px 2px 0px ${C.yellow}` },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{
      ...vs[variant], cursor: disabled ? "default" : "pointer",
      fontFamily: MONO, fontWeight: "bold", textTransform: "uppercase",
      fontSize: small ? "11px" : "14px", padding: small ? "7px 10px" : "11px 16px",
      width: full ? "100%" : undefined, opacity: disabled ? 0.35 : 1, transition: "transform 0.1s, box-shadow 0.1s", ...s,
    }}>{children}</button>
  );
}
function Toggle({ on, onToggle, label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
      <button onClick={onToggle} style={{ background: on ? C.text : "transparent", border: `2px solid ${C.text}`, width: "38px", height: "22px", cursor: "pointer", position: "relative", transition: "background 0.2s" }}>
        <div style={{ position: "absolute", top: "2px", left: on ? "18px" : "2px", width: "14px", height: "14px", background: on ? C.bg : C.text, transition: "left 0.2s" }} />
      </button>
      <span style={{ fontSize: "12px", color: C.text, fontFamily: MONO, fontWeight: "bold" }}>{label}</span>
    </div>
  );
}
function ProbBar({ label, value, color }) {
  const pct = Math.round((value ?? 0) * 100);
  return (
    <div style={{ marginBottom: "9px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
        <span style={{ fontSize: "11px", color: C.text, fontFamily: MONO }}>{label}</span>
        <span style={{ fontSize: "11px", color, fontFamily: MONO, fontWeight: "bold" }}>{pct}%</span>
      </div>
      <div style={{ height: "6px", background: C.card, border: `1px solid ${C.borderBright}` }}>
        <div style={{ height: "100%", width: `${pct}%`, background: color, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}
function ConfChip({ confidence }) {
  if (!confidence) return null;
  const map = { low: { label: "Low", color: C.red, bg: C.redDim }, fair: { label: "Fair", color: C.yellow, bg: C.yellowDim }, good: { label: "Good", color: C.blue, bg: C.blueDim }, strong: { label: "Strong", color: C.green, bg: C.greenDim } };
  const { label, color, bg } = map[confidence];
  return <span style={{ fontSize: "10px", fontWeight: "bold", textTransform: "uppercase", color, background: bg, border: `1px dashed ${color}`, padding: "2px 7px", fontFamily: MONO }}>{label}</span>;
}
function StatBox({ label, value, sub, color, dim }) {
  return (
    <div style={{ background: C.bg, border: `1px solid ${C.borderBright}`, padding: "8px 6px", textAlign: "center", opacity: dim ? 0.6 : 1, transition: "opacity 0.3s" }}>
      <Label style={{ marginBottom: "3px" }}>{label}</Label>
      <div style={{ fontSize: "22px", fontFamily: DISPLAY, color: color ?? C.text, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: "10px", color: C.muted, fontFamily: MONO, marginTop: "4px" }}>{sub}</div>}
    </div>
  );
}
function Divider({ label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px", margin: "14px 0 12px" }}>
      <div style={{ flex: 1, borderTop: `1px dashed ${C.borderBright}` }} />
      {label && <span style={{ fontSize: "10px", letterSpacing: "1px", textTransform: "uppercase", color: C.muted, fontFamily: MONO }}>{label}</span>}
      <div style={{ flex: 1, borderTop: `1px dashed ${C.borderBright}` }} />
    </div>
  );
}

// ── Linescore ─────────────────────────────────────────────────────────────────
function Linescore({ away, home, score, runsLog, totalInnings, lastCompletedInning }) {
  const cols = Array.from({ length: Math.max(totalInnings, lastCompletedInning) }, (_, i) => i + 1);
  const getRuns = (team, inning) => {
    const half = team === "away" ? "top" : "bot";
    const entries = runsLog.filter(r => r.team === team && r.inning === inning && r.half === half);
    const played = team === "away" ? inning <= Math.ceil((lastCompletedInning || 0) + 0.5) : inning <= (lastCompletedInning || 0);
    if (!entries.length) return played ? "0" : "·";
    return String(entries.reduce((s, r) => s + r.runs, 0));
  };
  const cell = val => ({ width: "26px", minWidth: "26px", textAlign: "center", fontSize: "13px", fontFamily: MONO, padding: "5px 2px", color: val === "·" ? C.faint : C.text, borderRight: `1px solid ${C.borderBright}`, borderBottom: `1px solid ${C.borderBright}` });
  return (
    <div style={{ overflowX: "auto", border: `2px solid ${C.text}`, background: C.bg }}>
      <table style={{ borderCollapse: "collapse", width: "100%" }}>
        <thead>
          <tr>
            <td style={{ width: "64px", fontSize: "10px", fontFamily: MONO, color: C.muted, padding: "3px 4px", borderBottom: `2px solid ${C.text}` }} />
            {cols.map(i => <td key={i} style={{ width: "26px", minWidth: "26px", textAlign: "center", fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "3px 2px", borderRight: `1px solid ${C.borderBright}`, borderBottom: `2px solid ${C.text}` }}>{i}{i > totalInnings ? "x" : ""}</td>)}
            <td style={{ width: "28px", textAlign: "center", fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "3px 4px", borderBottom: `2px solid ${C.text}`, borderLeft: `2px solid ${C.text}` }}>R</td>
          </tr>
        </thead>
        <tbody>
          {[["away", away], ["home", home]].map(([side, name]) => (
            <tr key={side}>
              <td style={{ fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "5px 4px", maxWidth: "64px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", borderBottom: `1px solid ${C.borderBright}`, borderRight: `2px solid ${C.text}` }}>{name}</td>
              {cols.map(inn => { const v = getRuns(side, inn); return <td key={inn} style={cell(v)}>{v}</td>; })}
              <td style={{ width: "28px", textAlign: "center", fontSize: "14px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "5px 4px", borderBottom: `1px solid ${C.borderBright}`, borderLeft: `2px solid ${C.text}` }}>{score[side]}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Setup Screen ──────────────────────────────────────────────────────────────
function SetupScreen({ onStart, onImport }) {
  const [league, setLeague]         = useState("hs");
  const [away, setAway]             = useState("");
  const [home, setHome]             = useState("");
  const [innings, setInnings]       = useState(7);
  const [mercyAfter, setMercyAfter] = useState(5);
  const [mercyRuns, setMercyRuns]   = useState(10);
  const [useMercy, setUseMercy]     = useState(true);
  const [useTimeLimit, setUseTimeLimit] = useState(false);
  const [timeLimit, setTimeLimit]   = useState("120");
  const [startTime, setStartTime]   = useState(nowHM());

  useEffect(() => {
    if (league === "custom") return;
    const p = LEAGUES[league];
    setInnings(p.innings);
    if (p.mercy) { setMercyRuns(p.mercy); setMercyAfter(p.mercyAfter); setUseMercy(true); } else setUseMercy(false);
  }, [league]);

  const preset = LEAGUES[league];
  const valid  = away.trim() && home.trim();

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 48px" }}>
      <link rel="stylesheet" href={FONT} />
      <div style={{ padding: "40px 20px 30px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "14px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>Official Scorecard</div>
        <div style={{ fontSize: "48px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1, marginTop: "8px" }}>GAME TIME<br/>ESTIMATOR</div>
      </div>
      <div style={{ padding: "20px 16px", maxWidth: "420px", margin: "0 auto" }}>
        
        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "16px", position: "relative" }}>
          <div style={{ position: "absolute", top: "-10px", left: "12px", background: C.bg, padding: "0 6px", fontSize: "12px", fontWeight: "bold", fontFamily: MONO }}>LEAGUE / LEVEL</div>
          <Sel value={league} onChange={setLeague} style={{ marginTop: "6px" }}>
            {Object.entries(LEAGUES).map(([k, l]) => <option key={k} value={k}>{l.label}</option>)}
          </Sel>
          {league !== "custom" && <div style={{ marginTop: "10px", fontSize: "11px", color: C.muted, fontFamily: MONO }}>{preset.innings} inn · {preset.halfInning}m half · {preset.warmup}m warmup</div>}
        </div>

        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "16px", position: "relative" }}>
          <div style={{ position: "absolute", top: "-10px", left: "12px", background: C.bg, padding: "0 6px", fontSize: "12px", fontWeight: "bold", fontFamily: MONO }}>TEAMS</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginTop: "6px" }}>
            <div><Label>AWAY</Label><Inp value={away} onChange={setAway} placeholder="Visitors" /></div>
            <div><Label>HOME</Label><Inp value={home} onChange={setHome} placeholder="Home" /></div>
          </div>
        </div>

        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "20px", position: "relative" }}>
          <div style={{ position: "absolute", top: "-10px", left: "12px", background: C.bg, padding: "0 6px", fontSize: "12px", fontWeight: "bold", fontFamily: MONO }}>RULES</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px", marginTop: "6px" }}>
            <div><Label>INNINGS</Label><Sel value={innings} onChange={v => setInnings(Number(v))}>{[5,6,7,9].map(n => <option key={n} value={n}>{n}</option>)}</Sel></div>
            <div><Label>FIRST PITCH</Label><Inp value={startTime} onChange={setStartTime} placeholder="H:MM" /></div>
          </div>
          <Toggle on={useMercy} onToggle={() => setUseMercy(v => !v)} label="Mercy Rule Active" />
          {useMercy && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginTop: "12px" }}>
              <div><Label>AFTER INN</Label><Sel value={mercyAfter} onChange={v => setMercyAfter(Number(v))}>{[3,4,5,6,7,8].map(n => <option key={n} value={n}>{n}</option>)}</Sel></div>
              <div><Label>RUN DIFF</Label><Sel value={mercyRuns} onChange={v => setMercyRuns(Number(v))}>{[5,8,10,12,15,20].map(n => <option key={n} value={n}>{n}</option>)}</Sel></div>
            </div>
          )}
        </div>

        <Btn full disabled={!valid} onClick={() => {
          const t = parseTime(startTime) ?? parseTime(nowHM());
          onStart({ away: away.trim(), home: home.trim(), totalInnings: innings, mercyAfter: useMercy ? mercyAfter : null, mercyRuns: useMercy ? mercyRuns : null, timeLimit: useTimeLimit ? Number(timeLimit) : null, gameStartTime: t, fallbackHalf: LEAGUES[league].halfInning, fallbackWarmup: LEAGUES[league].warmup, league });
        }}>Start Game →</Btn>
      </div>
    </div>
  );
}

// ── Game Tracker ──────────────────────────────────────────────────────────────
function GameTracker({ config, onNewGame, initialState }) {
  const { away, home, totalInnings, mercyAfter, mercyRuns, timeLimit, gameStartTime, fallbackHalf, fallbackWarmup } = config;

  // Unified Timeline Event Stream
  // Event: { id, batchId, type: 'phase'|'run'|'out', phase, inning, half, team, val, time }
  const [events,          setEvents]          = useState(initialState?.events          ?? []);
  const [gameLog,         setGameLog]         = useState(initialState?.gameLog         ?? []);
  const [estimateHistory, setEstimateHistory] = useState(initialState?.estimateHistory ?? []);
  
  // Legacy support for older saves that had score/runsLog distinct from events
  const [baseScore,       setBaseScore]       = useState(initialState?.baseScore       ?? { home: 0, away: 0 });
  const [baseRunsLog,     setBaseRunsLog]     = useState(initialState?.baseRunsLog     ?? []);

  const [entryTime, setEntryTime] = useState(nowHM());

  const logRef = useRef(null);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [gameLog]);

  // Derived State
  const phaseEvents = events.filter(e => e.type === 'phase' || !e.type); // !e.type handles v1 legacy saves
  const lastPhase = phaseEvents.length ? [...phaseEvents].sort((a,b)=>a.time-b.time).pop() : null;
  const inActiveInning = lastPhase && (lastPhase.phase === EV.TOP || lastPhase.phase === EV.BOT);
  
  let activeHalf = null, activeInningNum = null, battingTeam = null, fieldingTeam = null, currentOuts = 0;
  if (inActiveInning) {
      activeHalf = lastPhase.phase === EV.TOP ? 'top' : 'bot';
      activeInningNum = lastPhase.inning;
      battingTeam = activeHalf === 'top' ? 'away' : 'home';
      fieldingTeam = activeHalf === 'top' ? 'home' : 'away';
      const outEvents = events.filter(e => e.type === 'out' && e.inning === activeInningNum && e.half === activeHalf);
      currentOuts = outEvents.reduce((s, e) => s + e.val, 0);
  }

  const combinedRunsLog = useMemo(() => {
      const activeRuns = events.filter(e => e.type === 'run').map(e => ({ team: e.team, runs: e.val, inning: e.inning, half: e.half, eventId: e.id, batchId: e.batchId }));
      return [...baseRunsLog, ...activeRuns];
  }, [baseRunsLog, events]);

  const score = useMemo(() => {
      const s = { home: baseScore.home, away: baseScore.away };
      events.filter(e => e.type === 'run').forEach(e => s[e.team] += e.val);
      return s;
  }, [baseScore, events]);

  const nextPhaseFallback = getNextPhase(phaseEvents);
  const est  = computeEstimate({ phaseEvents, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog: combinedRunsLog });

  // Snapshot estimate history
  useEffect(() => {
    if (!est?.canEstimate || !events.length) return;
    const lastEv = events[events.length - 1];
    setEstimateHistory(prev => {
      if (prev.length && prev[prev.length - 1].batchId === lastEv.batchId) return prev;
      return [...prev, {
        batchId:   lastEv.batchId,
        eventId:   lastEv.id,
        wallTime:  lastEv.time,
        inning:    lastEv.inning || lastPhase?.inning || 1,
        phase:     lastEv.phase || lastPhase?.phase || EV.START,
        estimate:  est.estimatedEnd,
        confidence: est.confidence,
      }];
    });
  }, [events, est?.estimatedEnd]);

  const commitEventBatch = (newEvents, logs = []) => {
      setEvents(p => [...p, ...newEvents]);
      setGameLog(p => [...p, ...logs.map(msg => ({ msg, ts: nowHM(), batchId: newEvents[0].batchId }))]);
      setEntryTime(nowHM());
  };

  const handleLogNextPhase = () => {
      const t = parseTime(entryTime) ?? parseTime(nowHM());
      const batchId = Date.now();
      const next = getNextPhase(phaseEvents);
      const newEvents = [{ id: batchId, batchId, type: 'phase', phase: next.phase, inning: next.inning, time: t }];
      const logs = [`📍 ${phaseLabel(next.inning, next.phase)} — ${formatTime(t)}`];
      commitEventBatch(newEvents, logs);
  };

  const handleAddRun = (val) => {
      const t = parseTime(entryTime) ?? parseTime(nowHM());
      const batchId = Date.now();
      const newEvents = [{ id: batchId, batchId, type: 'run', val, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }];
      const logs = [`🏃 +${val} Run for ${battingTeam === 'away' ? away : home} at ${formatTime(t)}`];
      commitEventBatch(newEvents, logs);
  };

  const handleAddOut = (val) => {
      const t = parseTime(entryTime) ?? parseTime(nowHM());
      const batchId = Date.now();
      const newEvents = [{ id: batchId, batchId, type: 'out', val, time: t, team: fieldingTeam, inning: activeInningNum, half: activeHalf }];
      const logs = [`⚾ ${val} Out(s) recorded at ${formatTime(t)}`];

      if (currentOuts + val >= 3) {
          const nextPhase = activeHalf === 'top' ? EV.MID : EV.START;
          const nextInning = activeHalf === 'top' ? activeInningNum : activeInningNum + 1;
          newEvents.push({ id: batchId + 1, batchId, type: 'phase', phase: nextPhase, inning: nextInning, time: t });
          logs.push(`🕒 3 Outs! Auto-advanced to ${phaseLabel(nextInning, nextPhase)}`);
      }
      commitEventBatch(newEvents, logs);
  };

  const handleUndo = () => {
      if (!events.length) return;
      const lastBatchId = events[events.length - 1].batchId || events[events.length - 1].id;
      setEvents(p => p.filter(e => (e.batchId || e.id) !== lastBatchId));
      setGameLog(p => p.filter(l => l.batchId !== lastBatchId));
      setEstimateHistory(p => p.filter(h => h.batchId !== lastBatchId));
  };

  const potOver = isGamePotentiallyOver(phaseEvents, score, totalInnings, mercyAfter, mercyRuns);

  const inWarmup = est?.currentlyInWarmup ?? false;
  const lastCompleted = est?.lastCompletedInning ?? 0;
  const runDiff = Math.abs(score.home - score.away);

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, maxWidth: "440px", margin: "0 auto", paddingBottom: "48px" }}>
      <link rel="stylesheet" href={FONT} />

      {/* ── Header ── */}
      <div style={{ background: C.card, borderBottom: `2px solid ${C.text}`, padding: "16px 16px 12px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>
              {totalInnings} INN · {mercyAfter ? `M${mercyRuns}/${mercyAfter}` : "NO MERCY"}
            </div>
            <div style={{ fontSize: "28px", fontFamily: DISPLAY, marginTop: "4px", lineHeight: 1 }}>
              {away} <span style={{ color: C.faint, fontSize: "20px" }}>@</span> {home}
            </div>
          </div>
          <div style={{ display: "flex", gap: "6px", flexDirection: "column" }}>
            <Btn small variant="ghost" onClick={onNewGame}>Quit</Btn>
            {events.length > 0 && <Btn small variant="outline" onClick={handleUndo}>↩ Undo</Btn>}
          </div>
        </div>

        {/* Scoreboard */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 32px 1fr", alignItems: "center", margin: "16px 0 10px" }}>
          {[["away", away], ["home", home]].map(([side, name], i) => (
            <div key={side} style={{ textAlign: i === 0 ? "left" : "right" }}>
              <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>{side.toUpperCase()}</div>
              <div style={{ fontSize: "64px", fontFamily: DISPLAY, lineHeight: 1, color: score[side] > score[side === "away" ? "home" : "away"] ? C.accent : C.text }}>{score[side]}</div>
            </div>
          ))}
          <div style={{ textAlign: "center", color: C.faint, fontFamily: DISPLAY, fontSize: "24px" }}>–</div>
        </div>
      </div>

      {/* Banners */}
      {est?.mercyEligible && <div style={{ background: C.redDim, borderBottom: `2px solid ${C.red}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.red, fontWeight: "bold" }}>⚠ MERCY ELIGIBLE — {score.home > score.away ? home : away} +{runDiff}</div>}
      {inWarmup && <div style={{ background: C.blueDim, borderBottom: `2px solid ${C.blue}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.blue, fontWeight: "bold" }}>⏸ WARMUP — Stats paused, tracking duration</div>}
      {potOver && <div style={{ background: C.yellowDim, borderBottom: `2px solid ${C.yellow}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.text, fontWeight: "bold" }}>🏁 GAME OVER CONDITION REACHED</div>}

      <div style={{ padding: "16px 16px 0" }}>

        {/* Active Inning Controls vs Next Phase Controls */}
        {inActiveInning ? (
          <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px", position: "relative" }}>
             <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
              <div>
                <div style={{ fontSize: "28px", fontFamily: DISPLAY, color: C.text, lineHeight: 1 }}>{activeHalf === 'top' ? 'TOP' : 'BOT'} {activeInningNum}</div>
                <div style={{ fontSize: "12px", fontFamily: MONO, color: C.accent, marginTop: "4px", fontWeight: "bold" }}>▶ {battingTeam === 'away' ? away : home} BATTING</div>
              </div>
              <div>
                 <Label style={{ textAlign: "right", marginBottom: "4px" }}>OUTS</Label>
                 <div style={{ display: "flex", gap: "6px" }}>
                    {[1,2,3].map(i => (
                        <div key={i} style={{ width: "16px", height: "16px", borderRadius: "50%", border: `2px solid ${C.text}`, background: currentOuts >= i ? C.text : "transparent" }} />
                    ))}
                 </div>
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px" }}>
               <div style={{ border: `1px dashed ${C.borderBright}`, padding: "12px", textAlign: "center", background: C.bg }}>
                  <Label>RUN FOR {battingTeam === 'away' ? "AWAY" : "HOME"}</Label>
                  <Btn full variant="outline" onClick={() => handleAddRun(1)}>+1 Run</Btn>
               </div>
               <div style={{ border: `1px dashed ${C.borderBright}`, padding: "12px", textAlign: "center", background: C.bg }}>
                  <Label>OUT FOR {fieldingTeam === 'home' ? "HOME" : "AWAY"}</Label>
                  <div style={{ display: "flex", gap: "6px" }}>
                    <Btn full variant="outline" onClick={() => handleAddOut(1)}>+1</Btn>
                    {currentOuts < 2 && <Btn full variant="outline" onClick={() => handleAddOut(2)}>+2</Btn>}
                    {currentOuts < 1 && <Btn full variant="outline" onClick={() => handleAddOut(3)}>+3</Btn>}
                  </div>
               </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "8px", alignItems: "end" }}>
              <div><Label>EVENT TIME (H:MM)</Label><Inp value={entryTime} onChange={setEntryTime} /></div>
              <Btn variant="ghost" onClick={() => setEntryTime(nowHM())}>NOW</Btn>
            </div>
          </div>
        ) : (
          <div style={{ background: C.bg, border: `2px dashed ${C.text}`, padding: "16px", marginBottom: "16px", textAlign: "center" }}>
            <Label>NEXT PHASE TO LOG</Label>
            <div style={{ fontSize: "24px", fontFamily: DISPLAY, color: C.accent, marginBottom: "4px" }}>{phaseLabel(nextPhaseFallback.inning, nextPhaseFallback.phase)}</div>
            <div style={{ fontSize: "12px", color: C.muted, fontFamily: MONO, marginBottom: "16px" }}>{phaseDesc(nextPhaseFallback.phase)}</div>
            
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: "8px", alignItems: "end" }}>
              <div style={{ textAlign: "left" }}><Label>TIME</Label><Inp value={entryTime} onChange={setEntryTime} /></div>
              <Btn variant="ghost" onClick={() => { const t = nowHM(); setEntryTime(t); handleLogNextPhase(); }}>NOW</Btn>
              <Btn variant="primary" onClick={handleLogNextPhase}>LOG ↵</Btn>
            </div>
          </div>
        )}

        {/* Estimate card */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          {!est?.canEstimate ? (
            <div style={{ padding: "8px 0", textAlign: "center" }}>
              <div style={{ fontSize: "14px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>GATHERING PACE DATA...</div>
              <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, marginTop: "6px" }}>Log Pre-1 Warmup → Top 1 → Mid-1 Warmup</div>
            </div>
          ) : (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <Label>ESTIMATED END</Label>
                  <div style={{ fontSize: "48px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1 }}>{formatTime(est.estimatedEnd)}</div>
                  {est.inExtra && <div style={{ fontSize: "11px", color: C.orange, fontFamily: MONO, marginTop: "6px", fontWeight: "bold" }}>EXTRA INNINGS EXPECTED</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <ConfChip confidence={est.confidence} />
                </div>
              </div>
              <Divider label="Pace Stats" />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "6px" }}>
                <StatBox label="½-Inn" value={formatDur(est.avgHalf)}   sub={est.measuredHalf   ? `${est.halfDurs.length}×`   : "default"} dim={inWarmup} />
                <StatBox label="Warmup" value={formatDur(est.avgWarmup)} sub={est.measuredWarmup ? `${est.warmupDurs.length}×` : "default"} dim={inWarmup} />
                <StatBox label="½ Left" value={est.remHalf}   dim={inWarmup} />
                <StatBox label="Wrm Left"   value={est.remWarmup} dim={inWarmup} />
              </div>
            </>
          )}
        </div>

        {/* Linescore */}
        <div style={{ marginBottom: "16px" }}>
          <Linescore away={away} home={home} score={score} runsLog={combinedRunsLog} totalInnings={totalInnings} lastCompletedInning={lastCompleted} />
        </div>

        {/* Game log */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "12px", marginBottom: "20px" }}>
          <Label>GAME LOG</Label>
          <div ref={logRef} style={{ background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px", maxHeight: "160px", overflowY: "auto", fontFamily: MONO, fontSize: "12px", lineHeight: "1.8" }}>
            {gameLog.length === 0 ? <span style={{ color: C.faint }}>No events logged yet.</span>
              : gameLog.map((e, i) => <div key={i} style={{ color: i === gameLog.length - 1 ? C.text : C.muted }}><span style={{ color: C.faint }}>{e.ts} </span>{e.msg}</div>)}
          </div>
        </div>

      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("setup");
  const [config,  setConfig]  = useState(null);
  const [initState, setInitState] = useState(null);
  const [key, setKey] = useState(0);

  const handleStart = cfg => { setConfig(cfg); setInitState(null); setKey(k => k + 1); setScreen("game"); };

  if (screen === "game" && config) {
    return <GameTracker key={key} config={config} onNewGame={() => setScreen("setup")} initialState={initState} />;
  }
  return <SetupScreen onStart={handleStart} onImport={() => {}} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
