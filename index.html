// ── Late Start Sub-Screen ─────────────────────────────────────────────────────
function LateStartScreen({ config, onComplete, onCancel }) {
  const [inning, setInning] = useState(1);
  const [half, setHalf] = useState("top");
  const [outs, setOuts] = useState(0);
  const [runs, setRuns] = useState({});

  const halvesToPlay = useMemo(() => {
    const res = [];
    for (let i = 1; i <= inning; i++) {
      res.push({ inn: i, half: 'top', team: 'away' });
      if (i < inning || half === 'bot') {
        res.push({ inn: i, half: 'bot', team: 'home' });
      }
    }
    return res;
  }, [inning, half]);

  const handleRunsChange = (inn, h, val) => {
    setRuns(prev => ({ ...prev, [`${inn}-${h}`]: Math.max(0, parseInt(val) || 0) }));
  };

  const handleSubmit = () => {
    const baseRunsLog = halvesToPlay.map(h => ({
      team: h.team,
      runs: runs[`${h.inn}-${h.half}`] || 0,
      inning: h.inn,
      half: h.half
    }));

    let awayScore = 0, homeScore = 0;
    baseRunsLog.forEach(r => {
      if (r.team === 'away') awayScore += r.runs;
      else homeScore += r.runs;
    });

    const nowSecs = parseTime(nowTime());
    const initialEvents = [
      { id: Date.now(), batchId: Date.now(), type: 'phase', phase: half === 'top' ? EV.TOP : EV.BOT, inning, time: nowSecs }
    ];
    if (outs > 0) {
      initialEvents.push({ id: Date.now() + 1, batchId: Date.now(), type: 'out', val: outs, inning, half, team: half === 'top' ? 'home' : 'away', time: nowSecs });
    }

    onComplete({
      baseScore: { away: awayScore, home: homeScore },
      baseRunsLog,
      events: initialEvents,
      gameLog: [{ msg: `[${formatTime(nowSecs)}] Joined late in ${half === 'top' ? 'Top' : 'Bottom'} ${inning} with ${outs} outs.`, batchId: Date.now() }],
      estimateHistory: []
    });
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 48px" }}>
      <div style={{ padding: "40px 20px 20px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "14px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>Join In Progress</div>
        <div style={{ fontSize: "36px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1, marginTop: "8px" }}>LATE START SETUP</div>
      </div>
      <div style={{ padding: "20px 16px", maxWidth: "420px", margin: "0 auto" }}>
        
        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "16px" }}>
          <Label>CURRENT GAME STATUS</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginTop: "8px" }}>
            <div><Label>INNING</Label><Sel value={inning} onChange={v => setInning(Number(v))}>{Array.from({length: (config?.totalInnings || 7) + 5}, (_, i) => i + 1).map(n => <option key={n} value={n}>{n}</option>)}</Sel></div>
            <div><Label>HALF</Label><Sel value={half} onChange={v => setHalf(v)}><option value="top">Top</option><option value="bot">Bottom</option></Sel></div>
            <div><Label>OUTS</Label><Sel value={outs} onChange={v => setOuts(Number(v))}><option value={0}>0</option><option value={1}>1</option><option value={2}>2</option></Sel></div>
          </div>
        </div>

        {halvesToPlay.length > 0 && (
          <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "20px" }}>
            <Label>RUNS SCORED PREVIOUSLY</Label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginTop: "12px" }}>
              {halvesToPlay.map(h => (
                <div key={`${h.inn}-${h.half}`} style={{ display: "flex", alignItems: "center", gap: "8px", background: C.bg, padding: "6px", border: `1px solid ${C.borderBright}` }}>
                  <div style={{ flex: 1, fontSize: "12px", fontFamily: MONO, fontWeight: "bold" }}>
                    {h.half === 'top' ? 'Top' : 'Bot'} {h.inn} ({h.team === 'away' ? config?.away : config?.home})
                  </div>
                  <input type="number" min="0" value={runs[`${h.inn}-${h.half}`] || ""} placeholder="0" onChange={e => handleRunsChange(h.inn, h.half, e.target.value)} style={{ width: "40px", padding: "4px", textAlign: "center", fontFamily: MONO, border: `1px solid ${C.border}`, background: C.card, outline: "none" }} />
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          <Btn full variant="primary" onClick={handleSubmit}>FINISH SETUP & ENTER GAME →</Btn>
          <Btn full variant="ghost" onClick={onCancel}>CANCEL</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Summary Screen ────────────────────────────────────────────────────────────
function SummaryScreen({ config, events, baseScore, baseRunsLog, endTime, estimateHistory, rosterData, pitchData, onNewGame }) {
  const { away, home, totalInnings } = config;
  
  const phaseEvents = events.filter(e => e.type === 'phase' || !e.type);
  const sorted = sortEvents(phaseEvents);
  const startTime = sorted[0]?.time;
  const actualDuration = endTime && startTime ? endTime - startTime : null;
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  
  const halfDurs = [], warmupDurs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const c = sorted[i], n = sorted[i + 1];
    const d = n.time - c.time;
    if (d < 0 || d > 5400) continue;
    if (c.phase === EV.START && n.phase === EV.TOP  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.MID  && n.phase === EV.BOT  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.TOP  && n.phase === EV.MID  && n.inning === c.inning)      halfDurs.push(d);
    if (c.phase === EV.BOT  && n.phase === EV.START && n.inning === c.inning + 1) halfDurs.push(d);
  }

  const score = { home: baseScore.home, away: baseScore.away };
  events.filter(e => e.type === 'run').forEach(e => score[e.team] += e.val);
  
  const combinedRunsLog = [...baseRunsLog, ...events.filter(e => e.type === 'run').map(e => ({ team: e.team, runs: e.val, inning: e.inning, half: e.half }))];

  const firstEst = estimateHistory.find(h => h.estimate != null);
  const firstEstError = firstEst && endTime ? Math.round((firstEst.estimate - endTime) / 60) : null;
  const winner = score.home > score.away ? home : score.away > score.home ? away : null;
  
  const [showCopy, setShowCopy] = useState(false);
  const exportText = exportGameText(config, events, baseScore, baseRunsLog, [], estimateHistory, null, rosterData);

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 60px" }}>
      {showCopy && <CopyModal text={exportText} onClose={() => setShowCopy(false)} />}

      <div style={{ padding: "40px 20px 30px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "14px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>FINAL SCORE</div>
        <div style={{ fontSize: "72px", fontFamily: DISPLAY, marginTop: "8px", lineHeight: 1 }}>{score.away} – {score.home}</div>
        <div style={{ fontSize: "16px", color: C.text, fontFamily: MONO, marginTop: "8px", fontWeight: "bold" }}>{away} @ {home}</div>
        {winner ? <div style={{ marginTop: "12px", fontSize: "16px", color: C.accent, fontFamily: MONO, letterSpacing: "2px", fontWeight: "bold" }}>{winner.toUpperCase()} WINS</div>
                : <div style={{ marginTop: "12px", fontSize: "16px", color: C.text, fontFamily: MONO, letterSpacing: "2px", fontWeight: "bold" }}>TIE GAME</div>}
      </div>

      <div style={{ padding: "20px 16px", maxWidth: "440px", margin: "0 auto" }}>
        
        <StatsTable events={events} rosterData={rosterData} config={config} />

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>FINAL LINESCORE</Label>
          <Linescore away={away} home={home} score={score} runsLog={combinedRunsLog} totalInnings={totalInnings} lastCompletedInning={lastCompleted} currentPhase={null} currentInning={lastCompleted} />
        </div>

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>GAME TIME & PACE</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "12px" }}>
            <StatBox label="FIRST PITCH" value={formatTime(startTime)} />
            <StatBox label="FINAL OUT"   value={formatTime(endTime)} />
            <StatBox label="DURATION"    value={formatDur(actualDuration)} />
            <StatBox label="INNINGS"     value={`${lastCompleted}`} sub={lastCompleted > totalInnings ? "EXTRA INNINGS" : "REGULATION"} />
          </div>
          <Divider label="Measured Pace" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
            <StatBox label="AVG ½-INN"  value={formatDur(avg(halfDurs))}   sub={`${halfDurs.length} measured`} />
            <StatBox label="AVG WARMUP" value={formatDur(avg(warmupDurs))} sub={`${warmupDurs.length} measured`} />
          </div>
        </div>
        
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
            <Label>PITCH COUNTS</Label>
            <div style={{ display: "flex", gap: "12px" }}>
                <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "12px", fontFamily: MONO, fontWeight: "bold", borderBottom: `1px dashed ${C.text}`, marginBottom: "6px" }}>{away}</div>
                    {Object.entries(pitchData?.away || {}).map(([p, c]) => <div key={p} style={{ fontSize: "12px", fontFamily: MONO, display: "flex", justifyContent: "space-between" }}><span>{p}</span><span>{c}</span></div>)}
                </div>
                <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "12px", fontFamily: MONO, fontWeight: "bold", borderBottom: `1px dashed ${C.text}`, marginBottom: "6px" }}>{home}</div>
                    {Object.entries(pitchData?.home || {}).map(([p, c]) => <div key={p} style={{ fontSize: "12px", fontFamily: MONO, display: "flex", justifyContent: "space-between" }}><span>{p}</span><span>{c}</span></div>)}
                </div>
            </div>
        </div>

        {firstEstError !== null && (
          <div style={{ background: C.bg, border: `2px dashed ${C.text}`, padding: "16px", marginBottom: "16px", textAlign: "center" }}>
            <Label>FIRST ESTIMATE ACCURACY</Label>
            <div style={{ fontSize: "40px", fontFamily: DISPLAY, color: Math.abs(firstEstError) <= 5 ? C.green : Math.abs(firstEstError) <= 15 ? C.yellow : C.red }}>
              {firstEstError > 0 ? "+" : ""}{firstEstError}m
            </div>
            <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO, marginTop: "6px", fontWeight: "bold" }}>
              {Math.abs(firstEstError) <= 5 ? "Excellent (within 5 min)" : Math.abs(firstEstError) <= 15 ? "Good (within 15 min)" : "Off pace (unusual game length)"}
            </div>
          </div>
        )}

        <AccuracyGraph estimateHistory={estimateHistory} endTime={endTime} config={config} />

        <div style={{ display: "flex", flexDirection: "column", gap: "12px", marginTop: "24px" }}>
          <Btn full variant="primary" onClick={onNewGame}>START NEW GAME →</Btn>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
            <Btn full variant="outline" small onClick={() => exportGame(config, events, baseScore, baseRunsLog, [], estimateHistory, null, rosterData)}>⬇ Download JSON</Btn>
            <Btn full variant="outline" small onClick={() => setShowCopy(true)}>📋 Copy Text</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Game Tracker ──────────────────────────────────────────────────────────────
function GameTracker({ config, onNewGame, initialState, rosterData, setRosterData, onOpenRoster }) {
  const { away, home, totalInnings, mercyAfter, mercyRuns, allowTies, tieInningLimit, gameStartTime, fallbackHalf, fallbackWarmup } = config;

  const [extraInningsAdded, setExtraInningsAdded] = useState(0);
  const effTotalInnings = totalInnings + extraInningsAdded;

  const [events,          setEvents]          = useState(initialState?.events          ?? []);
  const [gameLog,         setGameLog]         = useState(initialState?.gameLog         ?? []);
  const [estimateHistory, setEstimateHistory] = useState(initialState?.estimateHistory ?? []);
  
  const [baseScore,       setBaseScore]       = useState(initialState?.baseScore       ?? { home: 0, away: 0 });
  const [baseRunsLog,     setBaseRunsLog]     = useState(initialState?.baseRunsLog     ?? []);

  const [entryTime, setEntryTime] = useState(nowTime());
  const [isTypingTime, setIsTypingTime] = useState(false);
  const [gameOverPrompt, setGameOverPrompt] = useState(false);
  const [endTimeInput,   setEndTimeInput]   = useState(nowTime());
  const [showSummary,    setShowSummary]    = useState(false);
  const [finalEndTime,   setFinalEndTime]   = useState(null);
  
  const [delayActive, setDelayActive] = useState(initialState?.weatherDelayState?.active ?? false);
  const [delayStartTime, setDelayStartTime] = useState(initialState?.weatherDelayState?.startTime ?? null);
  const [accumulatedDelaySec, setAccumulatedDelaySec] = useState(initialState?.weatherDelayState?.accumulatedSec ?? 0);
  const [liveDelaySec, setLiveDelaySec] = useState(0);
  
  const [showImport, setShowImport] = useState(false);
  const [showCopy, setShowCopy]     = useState(false);
  const [copyText, setCopyText]     = useState("");
  
  // Roster / Field logic
  const lineupIdx = rosterData.lineupIdx || { away: 0, home: 0 };
  const setLineupIdx = useCallback((updater) => {
      setRosterData(prev => {
          const oldIdx = prev.lineupIdx || { away: 0, home: 0 };
          const nextIdx = typeof updater === 'function' ? updater(oldIdx) : updater;
          return { ...prev, lineupIdx: nextIdx };
      });
  }, [setRosterData]);

  const [bases, setBases] = useState({ home: null, '1b': null, '2b': null, '3b': null });
  const [activeFielderSubModal, setActiveFielderSubModal] = useState(null);
  const [offensiveSubModal, setOffensiveSubModal] = useState(null);
  const [actionMenuState, setActionMenuState] = useState(null);
  const [pendingPitchCountPrompt, setPendingPitchCountPrompt] = useState(false);
  
  const defaultPitchers = {
      away: rosterData?.fielders?.away?.['P']?.name || rosterData?.away.find(p => p.pos === 'P')?.name || 'Unassigned',
      home: rosterData?.fielders?.home?.['P']?.name || rosterData?.home.find(p => p.pos === 'P')?.name || 'Unassigned'
  };
  const [pitchData, setPitchData] = useState(initialState?.pitchData ?? { away: { [defaultPitchers.away]: 0 }, home: { [defaultPitchers.home]: 0 } });
  
  const [atBatCount, setAtBatCount] = useState({ b: 0, s: 0 });

  const logRef = useRef(null);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [gameLog]);

  useEffect(() => {
      if (!isTypingTime) {
          const id = setInterval(() => setEntryTime(nowTime()), 1000);
          return () => clearInterval(id);
      }
  }, [isTypingTime]);

  useEffect(() => {
      if (delayActive && delayStartTime) {
          const id = setInterval(() => {
              const cur = parseTime(nowTime());
              setLiveDelaySec(Math.max(0, cur - delayStartTime));
          }, 1000);
          return () => clearInterval(id);
      } else {
          setLiveDelaySec(0);
      }
  }, [delayActive, delayStartTime]);

  const phaseEvents = events.filter(e => e.type === 'phase' || !e.type); 
  const sortedPhaseEvents = sortEvents(phaseEvents);
  const lastPhase = sortedPhaseEvents.length ? sortedPhaseEvents[sortedPhaseEvents.length - 1] : null;
  const inActiveInning = lastPhase && (lastPhase.phase === EV.TOP || lastPhase.phase === EV.BOT);
  
  let activeHalf = null, activeInningNum = null, battingTeam = null, fieldingTeam = null, currentOuts = 0;
  if (inActiveInning) {
      activeHalf = lastPhase.phase === EV.TOP ? 'top' : 'bot';
      activeInningNum = lastPhase.inning;
      battingTeam = activeHalf === 'top' ? 'away' : 'home';
      fieldingTeam = activeHalf === 'top' ? 'home' : 'away';
      const outEvents = events.filter(e => e.type === 'out' && e.inning === activeInningNum && e.half === activeHalf);
      currentOuts = outEvents.reduce((s, e) => s + e.val, 0);
  }

  // Safe Fielder map lookup
  const activeFieldersMap = rosterData.fielders?.[fieldingTeam] || {};

  // CORRECTLY DEFINE ACTIVE PITCHER SO BUTTONS WORK
  const currentPitcher = activeFieldersMap?.['P'] || rosterData[fieldingTeam]?.find(p => p.pos === 'P');
  const currentPitches = currentPitcher ? (pitchData[fieldingTeam]?.[currentPitcher.name] || 0) : 0;

  // Base state spawn logic: spawn batter with lineupIndex tagged so subs target the right spot
  useEffect(() => {
      if (inActiveInning && !bases.home && currentOuts < 3) {
          let batter = rosterData[battingTeam][lineupIdx[battingTeam]];
          if (!batter) {
              batter = { id: `blank_${Date.now()}`, name: `Batter ${lineupIdx[battingTeam] + 1}`, no: '', pos: '' };
              const newRoster = { ...rosterData };
              if (!newRoster[battingTeam]) newRoster[battingTeam] = [];
              newRoster[battingTeam][lineupIdx[battingTeam]] = batter;
              setRosterData(newRoster);
          }
          setBases(prev => ({ ...prev, home: { ...batter, lineupIndex: lineupIdx[battingTeam] } }));
      }
  }, [inActiveInning, activeHalf, bases.home, currentOuts, lineupIdx, battingTeam, rosterData]);

  // Keep home batter in sync if they are Pinch Hit for via the Roster Screen
  useEffect(() => {
      if (inActiveInning && bases.home) {
          const currentBatterInLineup = rosterData[battingTeam][lineupIdx[battingTeam]];
          if (currentBatterInLineup && (bases.home.id !== currentBatterInLineup.id || bases.home.name !== currentBatterInLineup.name)) {
              setBases(prev => ({ ...prev, home: { ...currentBatterInLineup, lineupIndex: lineupIdx[battingTeam] } }));
          }
      }
  }, [rosterData, battingTeam, lineupIdx, inActiveInning]);

  const advanceBatter = useCallback(() => {
      if (!battingTeam) return;
      setLineupIdx(prev => {
          const currentIdx = prev[battingTeam];
          const isClosed = rosterData.lineupClosed?.[battingTeam];
          const lineupLen = rosterData[battingTeam].length;
          let nextIdx = currentIdx + 1;
          if (isClosed) {
              nextIdx = nextIdx % lineupLen;
          }
          return { ...prev, [battingTeam]: nextIdx };
      });
  }, [battingTeam, rosterData]);

  const score = useMemo(() => {
      const s = { home: baseScore.home, away: baseScore.away };
      events.filter(e => e.type === 'run').forEach(e => s[e.team] += e.val);
      return s;
  }, [baseScore, events]);

  const combinedRunsLog = useMemo(() => {
      const activeRuns = events.filter(e => e.type === 'run').map(e => ({ team: e.team, runs: e.val, inning: e.inning, half: e.half, eventId: e.id, batchId: e.batchId }));
      return [...baseRunsLog, ...activeRuns];
  }, [baseRunsLog, events]);

  const nextPhaseFallback = getNextPhase(phaseEvents);
  const est = computeEstimate({ phaseEvents, allEvents: events, score, totalInnings: effTotalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog: combinedRunsLog, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase, accumulatedDelay: accumulatedDelaySec + liveDelaySec });

  useEffect(() => {
    if (!est?.canEstimate || !events.length) return;
    const lastEv = events[events.length - 1];
    setEstimateHistory(prev => {
      if (prev.length && prev[prev.length - 1].batchId === lastEv.batchId) return prev;
      return [...prev, {
        batchId:   lastEv.batchId,
        eventId:   lastEv.id,
        wallTime:  lastEv.time,
        inning:    lastEv.inning || lastPhase?.inning || 1,
        phase:     lastEv.phase || lastPhase?.phase || EV.START,
        estimate:  est.estimatedEnd,
        confidence: est.confidence,
      }];
    });
  }, [events, est?.estimatedEnd]);

  useEffect(() => { 
    if (isGamePotentiallyOver(phaseEvents, score, effTotalInnings, mercyAfter, mercyRuns, allowTies, tieInningLimit) && !gameOverPrompt && !showSummary) { 
      setGameOverPrompt(true); setEndTimeInput(nowTime()); 
    } else if (!isGamePotentiallyOver(phaseEvents, score, effTotalInnings, mercyAfter, mercyRuns, allowTies, tieInningLimit) && gameOverPrompt) {
      setGameOverPrompt(false);
    }
  }, [phaseEvents, score, showSummary, effTotalInnings, gameOverPrompt]);

  const commitEventBatch = (newEvents, logs = [], snapshot = null) => {
      const snap = snapshot || { bases: { ...bases }, lineupIdx: { ...lineupIdx }, pitchData: JSON.parse(JSON.stringify(pitchData)), atBatCount: { ...atBatCount } };
      const batchId = newEvents.length > 0 ? newEvents[0].batchId : Date.now();
      
      if (newEvents.length > 0) {
          newEvents[0].snapshot = snap;
          setEvents(p => [...p, ...newEvents]);
      }
      if (logs.length > 0) {
          setGameLog(p => [...p, ...logs.map(msg => ({ msg, batchId }))]);
      }
      setAtBatCount({ b: 0, s: 0 });
      setIsTypingTime(false);
      setEntryTime(nowTime());
  };

  const handleLogNextPhase = () => {
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const next = getNextPhase(phaseEvents);
      const newEvents = [{ id: batchId, batchId, type: 'phase', phase: next.phase, inning: next.inning, time: t }];
      const logs = [`[${formatTime(t)}] 📍 ${phaseLabel(next.inning, next.phase)}`];
      commitEventBatch(newEvents, logs);
      setBases({ home: null, '1b': null, '2b': null, '3b': null }); 
  };

  const logPitch = (type) => {
      if (!inActiveInning || currentOuts >= 3) return;
      const t = getSafeTime(entryTime, events);
      const pName = currentPitcher?.name || 'Pitcher';
      const batchId = Date.now();
      const snap = { bases: { ...bases }, lineupIdx: { ...lineupIdx }, pitchData: JSON.parse(JSON.stringify(pitchData)), atBatCount: { ...atBatCount } };
      
      let newB = atBatCount.b;
      let newS = atBatCount.s;
      let autoAction = null;
      
      if (type === 'ball') { newB++; if (newB >= 4) autoAction = 'walk'; }
      if (type === 'strike') { newS++; if (newS >= 3) autoAction = 'k'; }
      if (type === 'foul') { newS = Math.min(newS + 1, 2); }
      if (type === 'hbp') { autoAction = 'hbp'; }

      const pitchLog = `[${formatTime(t)}] ⚾ Pitch: ${type.toUpperCase()} (${newB}-${newS})`;
      const newPitchData = { ...pitchData, [fieldingTeam]: { ...(pitchData[fieldingTeam] || {}), [pName]: currentPitches + 1 } };
      
      if (!autoAction) {
          setPitchData(newPitchData);
          setAtBatCount({ b: newB, s: newS });
          const pitchEvent = { id: batchId, batchId, type: 'pitch', pitchType: type, val: 1, time: t, team: fieldingTeam, inning: activeInningNum, half: activeHalf };
          commitEventBatch([pitchEvent], [pitchLog], snap);
      } else {
          setPitchData(newPitchData);
          setAtBatCount({ b: 0, s: 0 });
          if (autoAction === 'walk') executeAdvance('home', 'walk', null, false, pitchLog, snap, batchId);
          else if (autoAction === 'hbp') executeAdvance('home', 'hbp', null, false, pitchLog, snap, batchId);
          else if (autoAction === 'k') handleActionOut('home', 'K', 1, ['home'], pitchLog, snap, batchId);
      }
  };

  const BASE_VAL = { home: 0, '1b': 1, '2b': 2, '3b': 3, score: 4 };
  const VAL_BASE = { 0: 'home', 1: '1b', 2: '2b', 3: '3b', 4: 'score' };

  const executeAdvance = (sourceId, targetId, actionLabel = null, isError = false, extraLog = null, incomingSnap = null, incomingBatchId = null) => {
      const sVal = BASE_VAL[sourceId];
      const tVal = targetId === 'walk' || targetId === 'hbp' ? 1 : BASE_VAL[targetId];
      if (tVal <= sVal && targetId !== 'walk' && targetId !== 'hbp') return; 

      const t = getSafeTime(entryTime, events);
      const batchId = incomingBatchId || Date.now();
      const snap = incomingSnap || { bases: { ...bases }, lineupIdx: { ...lineupIdx }, pitchData: JSON.parse(JSON.stringify(pitchData)), atBatCount: { ...atBatCount } };
      
      let pitchAdded = 0;
      if (sourceId === 'home' && targetId !== 'walk' && targetId !== 'hbp' && !incomingBatchId) {
          pitchAdded = 1;
      }
      if (pitchAdded > 0 && currentPitcher) {
          const pName = currentPitcher.name;
          setPitchData(prev => ({ ...prev, [fieldingTeam]: { ...prev[fieldingTeam], [pName]: (prev[fieldingTeam]?.[pName] || 0) + 1 } }));
      }
      
      let newBases = { ...bases };
      let runsScored = 0;
      let advanceLogs = extraLog ? [extraLog] : [];
      let newEvents = [];

      if (sourceId === 'home') {
          setAtBatCount({ b: 0, s: 0 }); // reset count on ball in play
          const has1B = !!bases['1b'];
          const has2B = !!bases['2b'];
          const has3B = !!bases['3b'];
          const batter = bases['home'];

          if (targetId === 'score') { // HR
              if (has3B) { runsScored++; newEvents.push({ id: batchId+1, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['3b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              if (has2B) { runsScored++; newEvents.push({ id: batchId+2, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['2b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              if (has1B) { runsScored++; newEvents.push({ id: batchId+3, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['1b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              runsScored++; newEvents.push({ id: batchId+4, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: batter?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
              
              newBases = { home: null, '1b': null, '2b': null, '3b': null };
              advanceLogs.push(`[${formatTime(t)}] ⚾ ${actionLabel ? actionLabel + ' - ' : ''}${batter?.name || 'Batter'} hit a Home Run!`);
          } else if (targetId === 'walk' || targetId === 'hbp') {
              advanceLogs.push(`[${formatTime(t)}] ⚾ ${actionLabel ? actionLabel + ' - ' : ''}${batter?.name || 'Batter'} took a ${targetId === 'walk' ? 'Walk' : 'Hit By Pitch'}!`);
              newBases = { home: null, '1b': batter, '2b': bases['2b'], '3b': bases['3b'] };
              if (has1B) {
                  newBases['2b'] = bases['1b'];
                  if (has2B) {
                      newBases['3b'] = bases['2b'];
                      if (has3B) {
                          runsScored++;
                          newEvents.push({ id: batchId+1, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['3b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
                      }
                  }
              }
              newEvents.push({ id: batchId+2, batchId, type: 'advance', targetBase: targetId, isError: false, batterId: batter?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          } else if (targetId === '3b') { // Triple
              advanceLogs.push(`[${formatTime(t)}] ⚾ ${actionLabel ? actionLabel + ' - ' : ''}${batter?.name || 'Batter'} hit a Triple!`);
              newBases = { home: null, '1b': null, '2b': null, '3b': batter };
              if (has3B) { runsScored++; newEvents.push({ id: batchId+1, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['3b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              if (has2B) { runsScored++; newEvents.push({ id: batchId+2, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['2b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              if (has1B) { runsScored++; newEvents.push({ id: batchId+3, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['1b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
              newEvents.push({ id: batchId+4, batchId, type: 'advance', targetBase: '3b', isError, batterId: batter?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          } else if (targetId === '2b') { // Double
              advanceLogs.push(`[${formatTime(t)}] ⚾ ${actionLabel ? actionLabel + ' - ' : ''}${batter?.name || 'Batter'} hit a Double!`);
              newBases = { home: null, '1b': null, '2b': batter, '3b': null };
              if (has3B) {
                  if (has1B || has2B) { runsScored++; newEvents.push({ id: batchId+1, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['3b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
                  else newBases['3b'] = bases['3b'];
              }
              if (has2B) {
                  if (has1B) { runsScored++; newEvents.push({ id: batchId+2, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['2b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
                  else newBases['3b'] = bases['2b'];
              }
              if (has1B) {
                  newBases['3b'] = bases['1b'];
              }
              newEvents.push({ id: batchId+4, batchId, type: 'advance', targetBase: '2b', isError, batterId: batter?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          } else if (targetId === '1b') { // Single
              advanceLogs.push(`[${formatTime(t)}] ⚾ ${actionLabel ? actionLabel + ' - ' : ''}${batter?.name || 'Batter'} hit a Single!`);
              newBases = { home: null, '1b': batter, '2b': null, '3b': null };
              if (has3B) {
                  if (has1B && has2B) { runsScored++; newEvents.push({ id: batchId+1, batchId, type: 'run', targetBase: 'score', isError: false, batterId: batter?.id, scoredId: bases['3b']?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }); }
                  else newBases['3b'] = bases['3b'];
              }
              if (has2B) {
                  if (has1B) newBases['3b'] = bases['2b'];
                  else newBases['2b'] = bases['2b'];
              }
              if (has1B) {
                  newBases['2b'] = bases['1b'];
              }
              newEvents.push({ id: batchId+4, batchId, type: 'advance', targetBase: '1b', isError, batterId: batter?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          }
          
          setBases(newBases);
          advanceBatter();
          if (newEvents.length === 0 && runsScored === 0) newEvents.push({ id: batchId, batchId, type: 'advance', targetBase: targetId, isError, batterId: batter?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          commitEventBatch(newEvents, advanceLogs, snap);
      } else {
          // Manual Runner Advance logic
          const N = tVal - sVal;
          let displacements = { 1: 0, 2: 0, 3: 0 };
          displacements[sVal] = N;

          for (let i = sVal + 1; i <= 3; i++) {
              if (bases[VAL_BASE[i]]) {
                  let maxPosBehind = 0;
                  for (let j = sVal; j < i; j++) {
                      if (bases[VAL_BASE[j]]) {
                          maxPosBehind = Math.max(maxPosBehind, j + displacements[j]);
                      }
                  }
                  if (maxPosBehind >= i) {
                      displacements[i] = N;
                  }
              }
          }

          let finalBases = { home: bases.home, '1b': null, '2b': null, '3b': null };
          for (let i = 1; i <= 3; i++) {
              const bId = VAL_BASE[i];
              if (bases[bId]) {
                  const d = displacements[i] || 0;
                  const finalPos = i + d;
                  if (finalPos >= 4) {
                      runsScored++;
                      newEvents.push({ id: batchId+i, batchId, type: 'run', targetBase: 'score', isError: false, batterId: bases.home?.id, scoredId: bases[bId]?.id, val: 1, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
                      advanceLogs.push(`[${formatTime(t)}] 🏃 ${bases[bId].name || 'Runner'} scored!`);
                  } else {
                      finalBases[VAL_BASE[finalPos]] = bases[bId];
                      if (d > 0) {
                          advanceLogs.push(`[${formatTime(t)}] 🏃 ${actionLabel ? actionLabel + ' - ' : ''}${bases[bId].name || 'Runner'} advanced to ${VAL_BASE[finalPos].toUpperCase()}`);
                      }
                  }
              }
          }
          
          setBases(finalBases);
          if (newEvents.length === 0 && runsScored === 0) newEvents.push({ id: batchId, batchId, type: 'advance', targetBase: targetId, isError, batterId: bases.home?.id, val: 0, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf });
          commitEventBatch(newEvents, advanceLogs, snap);
      }
  };

  const handleActionOut = (baseId, label, count, selectedBaseIds = [baseId], extraLog = null, incomingSnap = null, incomingBatchId = null) => {
      const t = getSafeTime(entryTime, events);
      const batchId = incomingBatchId || Date.now();
      const snap = incomingSnap || { bases: { ...bases }, lineupIdx: { ...lineupIdx }, pitchData: JSON.parse(JSON.stringify(pitchData)), atBatCount: { ...atBatCount } };
      
      let pitchAdded = 0;
      if (selectedBaseIds.includes('home') && !incomingBatchId) {
          pitchAdded = 1;
      }
      if (pitchAdded > 0 && currentPitcher) {
          const pName = currentPitcher.name;
          setPitchData(prev => ({ ...prev, [fieldingTeam]: { ...prev[fieldingTeam], [pName]: (prev[fieldingTeam]?.[pName] || 0) + 1 } }));
      }
      
      let newBases = { ...bases };
      const logs = extraLog ? [extraLog] : [];
      const newEvents = [];
      
      selectedBaseIds.forEach((bId, idx) => {
          newEvents.push({ id: batchId+idx, batchId, type: 'out', outType: label, batterId: bases[bId]?.id, val: 1, time: t, team: fieldingTeam, inning: activeInningNum, half: activeHalf });
          logs.push(`[${formatTime(t)}] ⚾ Out (${label}) recorded on ${bases[bId]?.name || 'Player'}`);
          newBases[bId] = null;
      });

      setBases(newBases);
      if (selectedBaseIds.includes('home')) {
          setAtBatCount({ b: 0, s: 0 }); // reset on out
          advanceBatter();
      }

      if (currentOuts + selectedBaseIds.length >= 3) {
          setPendingPitchCountPrompt(true);
      }

      commitEventBatch(newEvents, logs, snap);
      setActionMenuState(null);
  };

  const handleCourtesyRun = (baseId) => {
      const runner = bases[baseId];
      const prevLineupIdx = (lineupIdx[battingTeam] + 8) % Math.max(9, rosterData[battingTeam].length);
      const courtesyPlayer = rosterData[battingTeam][prevLineupIdx];
      
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const snap = { bases: { ...bases }, lineupIdx: { ...lineupIdx }, pitchData: JSON.parse(JSON.stringify(pitchData)), atBatCount: { ...atBatCount } };
      
      setBases(prev => ({
          ...prev,
          [baseId]: { ...courtesyPlayer, lineupIndex: runner.lineupIndex, isCourtesy: true }
      }));
      
      const logs = [`[${formatTime(t)}] 🏃 Courtesy Runner: ${courtesyPlayer?.name || 'Player'} runs for ${runner?.name || 'Unassigned'}`];
      commitEventBatch([{ id: batchId, batchId, type: 'sub', time: t }], logs, snap);
      setActionMenuState(null);
  };

  const finishInningAfterPitchCount = (pitches) => {
      setPendingPitchCountPrompt(false);
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const nextPhase = activeHalf === 'top' ? EV.MID : EV.START;
      const nextInning = activeHalf === 'top' ? activeInningNum : activeInningNum + 1;
      
      const newEvents = [{ id: batchId, batchId, type: 'phase', phase: nextPhase, inning: nextInning, time: t }];
      const logs = [`[${formatTime(t)}] 🕒 3 Outs! Auto-advanced to ${phaseLabel(nextInning, nextPhase)}`];
      
      if (pitches >= 0) {
          const pName = currentPitcher?.name || 'Pitcher';
          setPitchData(prev => ({ ...prev, [fieldingTeam]: { ...prev[fieldingTeam], [pName]: pitches }}));
          logs.push(`[${formatTime(t)}] ⚾ ${pName} pitch count updated to ${pitches}`);
      }
      commitEventBatch(newEvents, logs);
      setBases({ home: null, '1b': null, '2b': null, '3b': null });
  };

  const handleSubLog = (oldP, newP, pitches, team) => {
      const t = getSafeTime(nowTime(), events);
      const batchId = Date.now();
      const oldName = oldP?.name || 'Unassigned';
      const logs = [`[${formatTime(t)}] 🔄 Sub: ${newP.name} (#${newP.no}) replaces ${oldName} at ${newP.pos}`];
      if (oldP?.pos === 'P' || newP.pos === 'P') {
          if (pitches >= 0 && oldP) {
              logs.push(`[${formatTime(t)}] ⚾ ${oldP.name} threw ${pitches} total pitches.`);
              setPitchData(prev => ({ ...prev, [team]: { ...prev[team], [oldP.name]: pitches }}));
          }
      }
      const newEvents = [{ id: batchId, batchId, type: 'sub', time: t }];
      commitEventBatch(newEvents, logs);
  };

  const handleToggleDelay = () => {
      if (delayActive) {
          setDelayActive(false);
          setAccumulatedDelaySec(prev => prev + liveDelaySec);
          setDelayStartTime(null);
      } else {
          setDelayActive(true);
          setDelayStartTime(parseTime(nowTime()));
      }
  };

  const handleUndo = () => {
      if (!events.length) return;
      const lastBatchId = events[events.length - 1].batchId || events[events.length - 1].id;
      
      const firstEventInBatch = events.find(e => (e.batchId || e.id) === lastBatchId);
      if (firstEventInBatch && firstEventInBatch.snapshot) {
          if (firstEventInBatch.snapshot.bases) setBases(firstEventInBatch.snapshot.bases);
          if (firstEventInBatch.snapshot.lineupIdx) setLineupIdx(firstEventInBatch.snapshot.lineupIdx);
          if (firstEventInBatch.snapshot.pitchData) setPitchData(firstEventInBatch.snapshot.pitchData);
          if (firstEventInBatch.snapshot.atBatCount) setAtBatCount(firstEventInBatch.snapshot.atBatCount);
      }

      setEvents(p => p.filter(e => (e.batchId || e.id) !== lastBatchId));
      setGameLog(p => p.filter(l => l.batchId !== lastBatchId));
      setEstimateHistory(p => p.filter(h => h.batchId !== lastBatchId));
      setGameOverPrompt(false);
      setPendingPitchCountPrompt(false);
  };

  if (showSummary) {
    return <SummaryScreen config={config} events={events} baseScore={baseScore} baseRunsLog={baseRunsLog} endTime={finalEndTime} estimateHistory={estimateHistory} rosterData={rosterData} pitchData={pitchData} onNewGame={onNewGame} />;
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, maxWidth: "440px", margin: "0 auto", paddingBottom: "48px" }}>
      {showCopy   && <CopyModal text={copyText} onClose={() => setShowCopy(false)} />}
      {showImport && (
        <ImportModal
          hasActiveGame={events.length > 0}
          onImport={handleImport}
          onCancel={() => setShowImport(false)}
          onExportFirst={() => exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, { active: delayActive, startTime: delayStartTime, accumulatedSec: accumulatedDelaySec }, rosterData)}
        />
      )}
      
      {/* Defensive Sub Modal - Applies to ANY clicked fielding position */}
      {activeFielderSubModal && (
          <FielderSubModal 
              team={activeFielderSubModal.team}
              pos={activeFielderSubModal.pos}
              currentPlayer={activeFielderSubModal.player}
              rosterPool={rosterData.pool?.[activeFielderSubModal.team] || []}
              activeFieldersMap={activeFieldersMap}
              currentPitchTotal={activeFielderSubModal.pos === 'P' && activeFielderSubModal.player ? pitchData[activeFielderSubModal.team]?.[activeFielderSubModal.player.name] : 0}
              onSave={(newPlayer, pitches) => {
                  const newRoster = { ...rosterData };
                  if (!newRoster.fielders) newRoster.fielders = { away: {}, home: {} };
                  
                  const oldPosOfNewPlayer = Object.keys(activeFieldersMap).find(pPos => activeFieldersMap[pPos]?.id === newPlayer.id && pPos !== activeFielderSubModal.pos);
                  
                  if (activeFielderSubModal.pos === 'P' && activeFielderSubModal.player) {
                      if (pitches >= 0) {
                          setPitchData(prev => ({ ...prev, [activeFielderSubModal.team]: { ...prev[activeFielderSubModal.team], [activeFielderSubModal.player.name]: pitches }}));
                      }
                  }

                  newRoster.fielders[activeFielderSubModal.team] = { ...newRoster.fielders[activeFielderSubModal.team] };
                  newRoster.fielders[activeFielderSubModal.team][activeFielderSubModal.pos] = newPlayer;
                  
                  if (oldPosOfNewPlayer) {
                      newRoster.fielders[activeFielderSubModal.team][oldPosOfNewPlayer] = null;
                  }

                  const poolIdx = newRoster.pool[activeFielderSubModal.team].findIndex(p => p.id === newPlayer.id);
                  if (poolIdx === -1) {
                      newRoster.pool[activeFielderSubModal.team].push({ ...newPlayer, pos: activeFielderSubModal.pos });
                  } else {
                      newRoster.pool[activeFielderSubModal.team][poolIdx] = { ...newRoster.pool[activeFielderSubModal.team][poolIdx], pos: activeFielderSubModal.pos };
                  }

                  const lineupIndexLoc = newRoster[activeFielderSubModal.team].findIndex(p => p.id === newPlayer.id);
                  if (lineupIndexLoc > -1) {
                      newRoster[activeFielderSubModal.team][lineupIndexLoc] = { ...newPlayer, pos: activeFielderSubModal.pos };
                  }

                  setRosterData(newRoster);
                  
                  if (oldPosOfNewPlayer) {
                      setActiveFielderSubModal({ team: activeFielderSubModal.team, pos: oldPosOfNewPlayer, player: null });
                  } else {
                      setActiveFielderSubModal(null);
                  }
              }}
              onCancel={() => {
                  setActiveFielderSubModal(null);
              }}
          />
      )}

      {/* Offensive Pinch Runner / Pinch Hitter Modal */}
      {offensiveSubModal && (
          <OffensiveSubModal 
            team={battingTeam}
            baseId={offensiveSubModal.baseId}
            currentPlayer={offensiveSubModal.runner} 
            rosterPool={rosterData.pool?.[battingTeam]?.filter(p => {
                const lockedIdx = rosterData.lineupLocks?.[battingTeam]?.[p.id];
                return lockedIdx === undefined || lockedIdx === offensiveSubModal.runner.lineupIndex;
            }) || []}
            onSave={(newPlayer) => {
                const newRoster = { ...rosterData };
                const targetLineupIndex = offensiveSubModal.runner.lineupIndex;
                
                if (!newRoster.lineupLocks) newRoster.lineupLocks = { away: {}, home: {} };
                if (!newRoster.lineupLocks[battingTeam]) newRoster.lineupLocks[battingTeam] = {};
                newRoster.lineupLocks[battingTeam][newPlayer.id] = targetLineupIndex;

                if (!newRoster.pool[battingTeam].find(p => p.id === newPlayer.id)) {
                    newRoster.pool[battingTeam].push({ ...newPlayer, pos: '' });
                }
                
                newRoster[battingTeam][targetLineupIndex] = newPlayer;
                setRosterData(newRoster);
                
                setBases(prev => ({ ...prev, [offensiveSubModal.baseId]: { ...newPlayer, lineupIndex: targetLineupIndex } }));
                
                const t = getSafeTime(nowTime(), events);
                const batchId = Date.now();
                const role = offensiveSubModal.baseId === 'home' ? 'Pinch Hitter' : 'Pinch Runner';
                const logs = [`[${formatTime(t)}] 🔄 ${role}: ${newPlayer.name || 'Player'} replaces ${offensiveSubModal.runner.name || 'Unassigned'}`];
                commitEventBatch([{ id: batchId, batchId, type: 'sub', time: t }], logs);
                
                setOffensiveSubModal(null);
            }} 
            onCancel={() => setOffensiveSubModal(null)} 
          />
      )}

      {/* Runner / Batter Interactive Action Menu */}
      {actionMenuState && (
          <ActionMenuModal
              baseId={actionMenuState}
              bases={bases}
              runner={bases[actionMenuState]}
              rosterPool={rosterData.pool?.[battingTeam] || []}
              onClose={() => setActionMenuState(null)}
              onOut={(label, count, selectedIds) => handleActionOut(actionMenuState, label, count, selectedIds)}
              onAdvance={(label, targetBase, isError) => {
                  executeAdvance(actionMenuState, targetBase, label, isError);
                  setActionMenuState(null);
              }}
              onSub={() => {
                  setOffensiveSubModal({ baseId: actionMenuState, runner: bases[actionMenuState] });
                  setActionMenuState(null);
              }}
              onCourtesy={() => handleCourtesyRun(actionMenuState)}
              onEditInfo={(info) => {
                  const runner = bases[actionMenuState];
                  if (!runner) return;
                  const updated = { ...runner, ...info };
                  setBases(p => ({ ...p, [actionMenuState]: updated }));
                  
                  const newRoster = { ...rosterData };
                  // Ensure player exists in pool
                  if (!newRoster.pool[battingTeam].find(p => p.id === updated.id)) {
                      newRoster.pool[battingTeam].push({ ...updated, pos: '' });
                  } else {
                      const poolIdx = newRoster.pool[battingTeam].findIndex(p => p.id === updated.id);
                      if (poolIdx > -1) newRoster.pool[battingTeam][poolIdx] = { ...newRoster.pool[battingTeam][poolIdx], ...info };
                  }
                  
                  // Update in lineup
                  const lIdx = newRoster[battingTeam].findIndex(p => p.lineupIndex === runner.lineupIndex || p.id === runner.id);
                  if (lIdx > -1) {
                      newRoster[battingTeam][lIdx] = { ...updated, pos: newRoster[battingTeam][lIdx].pos };
                      if (newRoster.lineupLocks && newRoster.lineupLocks[battingTeam]) {
                          const lockVal = newRoster.lineupLocks[battingTeam][runner.id];
                          if (lockVal !== undefined) {
                              delete newRoster.lineupLocks[battingTeam][runner.id];
                              newRoster.lineupLocks[battingTeam][updated.id] = lockVal;
                          }
                      }
                  }
                  
                  setRosterData(newRoster);
                  setActionMenuState(null);
              }}
          />
      )}

      {pendingPitchCountPrompt && (
          <PitchCountModal 
              pitcher={currentPitcher} 
              currentTotal={currentPitches}
              onSave={finishInningAfterPitchCount} 
              onSkip={() => finishInningAfterPitchCount(-1)} 
              onUndo={handleUndo}
          />
      )}

      {/* ── Header ── */}
      <div style={{ background: C.card, borderBottom: `2px solid ${C.text}`, padding: "16px 16px 12px", position: "relative" }}>
        <button onClick={onOpenRoster} style={{ position: "absolute", top: "16px", left: "12px", background: "none", border: "none", fontSize: "20px", cursor: "pointer" }}>ℹ️</button>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", paddingLeft: "32px" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>
              {effTotalInnings} INN · {mercyAfter ? `M${mercyRuns}/${mercyAfter}` : "NO MERCY"}
            </div>
            <div style={{ fontSize: "28px", fontFamily: DISPLAY, marginTop: "4px", lineHeight: 1 }}>
              {away} <span style={{ color: C.faint, fontSize: "20px" }}>@</span> {home}
            </div>
          </div>
          <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", justifyContent: "flex-end", maxWidth: "160px" }}>
            {events.length > 0 && <Btn small variant="outline" onClick={handleUndo} disabled={delayActive}>↩ Undo</Btn>}
            <Btn small variant="ghost" onClick={() => exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, { active: delayActive, startTime: delayStartTime, accumulatedSec: accumulatedDelaySec }, rosterData)}>⬇</Btn>
            <Btn small variant="ghost" onClick={() => { setCopyText(exportGameText(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, { active: delayActive, startTime: delayStartTime, accumulatedSec: accumulatedDelaySec }, rosterData)); setShowCopy(true); }}>📋</Btn>
            <Btn small variant="ghost" onClick={() => setShowImport(true)}>⬆</Btn>
            <Btn small variant="ghost" onClick={onNewGame}>Quit</Btn>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 32px 1fr", alignItems: "center", margin: "16px 0 10px" }}>
          {[["away", away], ["home", home]].map(([side, name], i) => (
            <div key={side} style={{ textAlign: i === 0 ? "left" : "right" }}>
              <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>{name.toUpperCase()}</div>
              <div style={{ fontSize: "64px", fontFamily: DISPLAY, lineHeight: 1, color: score[side] > score[side === "away" ? "home" : "away"] ? C.accent : C.text }}>{score[side]}</div>
            </div>
          ))}
          <div style={{ textAlign: "center", color: C.faint, fontFamily: DISPLAY, fontSize: "24px" }}>–</div>
        </div>
      </div>

      {est?.mercyEligible && <div style={{ background: C.redDim, borderBottom: `2px solid ${C.red}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.red, fontWeight: "bold" }}>⚠ MERCY ELIGIBLE — {score.home > score.away ? home : away} +{Math.abs(score.home - score.away)}</div>}
      {est?.currentlyInWarmup && !delayActive && <div style={{ background: C.blueDim, borderBottom: `2px solid ${C.blue}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.blue, fontWeight: "bold" }}>⏸ WARMUP — Stats paused, tracking duration</div>}

      <div style={{ padding: "16px 16px 0" }}>

        <div style={{ marginBottom: "16px" }}>
          <Btn full variant={delayActive ? "highlight" : "outline"} onClick={handleToggleDelay}>
            {delayActive ? `⏸ WEATHER DELAY ACTIVE — ${formatDur(accumulatedDelaySec + liveDelaySec)}` : "⛅ WEATHER DELAY TOGGLE"}
          </Btn>
        </div>

        {gameOverPrompt && !delayActive && (
          <div style={{ background: C.card, border: `2px solid ${C.yellow}`, padding: "16px", marginBottom: "16px" }}>
            <Label>GAME OVER?</Label>
            <div style={{ fontSize: "14px", color: C.text, fontFamily: MONO, marginBottom: "12px" }}>The game condition has been reached. Log end time to finalize.</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: "8px", alignItems: "end" }}>
              <div><Label>END TIME</Label><Inp value={endTimeInput} onChange={v => { setEndTimeInput(v); setIsTypingTime(true); }} placeholder="H:MM:SS" /></div>
              <Btn onClick={() => { setFinalEndTime(getSafeTime(endTimeInput, events)); setGameLog(p => [...p, { msg: `[${formatTime(getSafeTime(endTimeInput, events))}] 🏁 Final out logged`, batchId: Date.now() }]); setShowSummary(true); }} variant="highlight">END GAME</Btn>
              <Btn onClick={() => { setGameOverPrompt(false); setExtraInningsAdded(p => p + 1); }} variant="ghost" small>MORE INN</Btn>
            </div>
          </div>
        )}

        {!gameOverPrompt && (
          inActiveInning ? (
            <div style={{ position: "relative" }}>
                <FieldDiagram 
                    activeHalf={activeHalf} 
                    currentOuts={currentOuts} 
                    bases={bases} 
                    fieldingRoster={rosterData[fieldingTeam]}
                    activeFieldersMap={activeFieldersMap}
                    battingLineup={rosterData[battingTeam]}
                    lineupIdx={lineupIdx[battingTeam]}
                    onOpenActionMenu={setActionMenuState}
                    onChangeFielder={(pos, player) => setActiveFielderSubModal({ team: fieldingTeam, pos, player })}
                />
                {!actionMenuState && !pendingPitchCountPrompt && currentOuts < 3 && (
                    <div style={{ display: 'flex', gap: '6px', marginBottom: '16px' }}>
                         <Btn full small variant="outline" onClick={() => logPitch('ball')}>Ball ({atBatCount.b})</Btn>
                         <Btn full small variant="outline" onClick={() => logPitch('strike')}>Strike ({atBatCount.s})</Btn>
                         <Btn full small variant="outline" onClick={() => logPitch('foul')}>Foul</Btn>
                         <Btn full small variant="outline" onClick={() => logPitch('hbp')}>HBP</Btn>
                    </div>
                )}
                {currentOuts >= 3 && !pendingPitchCountPrompt && (
                    <div style={{ position: "absolute", inset: 0, zIndex: 50, background: "rgba(244, 241, 234, 0.8)", display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(2px)", border: `2px solid ${C.text}`, borderRadius: "8px" }}>
                        <Btn variant="highlight" onClick={() => setPendingPitchCountPrompt(true)} style={{ fontSize: "16px", padding: "16px 24px" }}>3 OUTS - END INNING →</Btn>
                    </div>
                )}
            </div>
          ) : (
            <div style={{ background: C.bg, border: `2px dashed ${C.text}`, padding: "16px", marginBottom: "16px", textAlign: "center" }}>
              <Label>NEXT PHASE TO LOG</Label>
              <div style={{ fontSize: "24px", fontFamily: DISPLAY, color: C.accent, marginBottom: "4px" }}>{phaseLabel(nextPhaseFallback.inning, nextPhaseFallback.phase)}</div>
              <div style={{ fontSize: "12px", color: C.muted, fontFamily: MONO, marginBottom: "16px" }}>{phaseDesc(nextPhaseFallback.phase, away, home)}</div>
              
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: "8px", alignItems: "end" }}>
                <div style={{ textAlign: "left" }}><Label>TIME</Label><Inp disabled={delayActive} value={entryTime} onChange={v => { setEntryTime(v); setIsTypingTime(true); }} /></div>
                <Btn variant="ghost" disabled={delayActive} onClick={() => { setIsTypingTime(false); setEntryTime(nowTime()); }}>LIVE</Btn>
                <Btn variant="primary" disabled={delayActive} onClick={handleLogNextPhase}>LOG ↵</Btn>
              </div>
            </div>
          )
        )}

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          {!est?.canEstimate ? (
            <div style={{ padding: "8px 0", textAlign: "center" }}>
              <div style={{ fontSize: "14px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>GATHERING PACE DATA...</div>
              <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, marginTop: "6px" }}>Log Pre-1 Warmup → Top 1 → Mid-1 Warmup</div>
            </div>
          ) : (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <Label>ESTIMATED END</Label>
                  <div style={{ fontSize: "48px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1 }}>{formatTime(est.estimatedEnd)}</div>
                  {est.inExtra && <div style={{ fontSize: "11px", color: C.orange, fontFamily: MONO, marginTop: "6px", fontWeight: "bold" }}>EXTRA INNINGS EXPECTED</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <ConfChip confidence={est.confidence} />
                </div>
              </div>
              <Divider label="Pace Stats" />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "6px" }}>
                <StatBox label="½-Inn" value={formatDur(est.avgHalf)}   sub={est.measuredHalf   ? `${est.halfDurs.length}×`   : "default"} dim={est.currentlyInWarmup || delayActive} />
                <StatBox label="Warmup" value={formatDur(est.avgWarmup)} sub={est.measuredWarmup ? `${est.warmupDurs.length}×` : "default"} dim={est.currentlyInWarmup || delayActive} />
                <StatBox label="½ Left" value={est.remHalf}   dim={est.currentlyInWarmup || delayActive} />
                <StatBox label="Wrm Left"   value={est.remWarmup} dim={est.currentlyInWarmup || delayActive} />
              </div>
            </>
          )}
        </div>

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>PREDICTED WINNER</Label>
          {!est?.probs ? (
            <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, textAlign: "center", padding: "8px 0" }}>
              Need at least 2 logged half-innings to simulate outcomes.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              <div style={{ display: "grid", gridTemplateColumns: allowTies ? "1fr 1fr 1fr" : "1fr 1fr", gap: "10px" }}>
                <StatBox label={`${away.toUpperCase()} WIN`} value={`${Math.round(est.probs.awayWin*100)}%`} color={C.blue} />
                <StatBox label={`${home.toUpperCase()} WIN`} value={`${Math.max(0, 100 - Math.round(est.probs.awayWin*100) - (allowTies ? Math.round(est.probs.tie*100) : 0))}%`} color={C.accent} />
                {allowTies && <StatBox label="TIE" value={`${Math.round(est.probs.tie*100)}%`} color={C.muted} />}
              </div>
            </div>
          )}
        </div>

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>OUTCOME PROBABILITIES</Label>
          {!est?.probs ? (
            <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, textAlign: "center", padding: "8px 0" }}>
              Need at least 2 logged half-innings to simulate outcomes.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", fontFamily: MONO, fontSize: "12px", background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px" }}>
                {mercyAfter && <div>⚡ Mercy: <strong style={{color: C.accent}}>{Math.round(est.probs.mercy * 100)}%</strong></div>}
                <div>🔝 Top {effTotalInnings} End: <strong>{Math.round(est.probs.endTop * 100)}%</strong></div>
                <div>🔚 Bot {effTotalInnings} End: <strong>{Math.round(est.probs.endBot * 100)}%</strong></div>
                <div>➕ Extras: <strong style={{color: C.orange}}>{Math.round(est.probs.extra * 100)}%</strong></div>
              </div>
            </div>
          )}
        </div>

        <div style={{ marginBottom: "16px" }}>
          <Linescore away={away} home={home} score={score} runsLog={combinedRunsLog} totalInnings={effTotalInnings} lastCompletedInning={est?.lastCompletedInning} currentPhase={lastPhase?.phase} currentInning={activeInningNum || lastPhase?.inning} />
        </div>

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "12px", marginBottom: "12px" }}>
          <Label>GAME LOG</Label>
          <div ref={logRef} style={{ background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px", maxHeight: "160px", overflowY: "auto", fontFamily: MONO, fontSize: "12px", lineHeight: "1.8" }}>
            {gameLog.length === 0 ? <span style={{ color: C.faint }}>No events logged yet.</span>
              : gameLog.map((e, i) => <div key={i} style={{ color: i === gameLog.length - 1 ? C.text : C.muted }}>{e.msg}</div>)}
          </div>
        </div>

      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("setup");
  const [showRoster, setShowRoster] = useState(false);
  const [config,  setConfig]  = useState(null);
  const [initState, setInitState] = useState(null);
  const [key, setKey] = useState(0);
  
  // Safe Initialization with Pool and Fielders maps (Empty by default)
  const [rosterData, setRosterData] = useState(() => {
      const awayLineup = [{ id: `blank_a0`, name: '', no: '', pos: '' }];
      const homeLineup = [{ id: `blank_h0`, name: '', no: '', pos: '' }];
      
      return {
          away: awayLineup,
          home: homeLineup,
          pool: { away: [], home: [] },
          fielders: { away: {}, home: {} },
          lineupLocks: { away: {}, home: {} },
          lineupClosed: { away: false, home: false },
          lineupIdx: { away: 0, home: 0 }
      };
  });

  const handleStart = cfg => { 
      setConfig(cfg); 
      if (cfg.lateStart) {
          setScreen("latestart");
      } else {
          setInitState(null); 
          setKey(k => k + 1); 
          setScreen("game"); 
      }
  };
  
  const handleLateStartSubmit = data => {
      setInitState(data);
      setKey(k => k + 1);
      setScreen("game");
  };

  const handleImport = data => {
    setConfig(data.config);
    setInitState(data);
    if (data.rosterData) {
        const rd = { ...data.rosterData };
        if (!rd.pool) rd.pool = { away: [...(rd.away || [])], home: [...(rd.home || [])] };
        if (!rd.fielders) {
            rd.fielders = {
                away: (rd.away || []).reduce((acc, p) => { if(p.pos) acc[p.pos] = p; return acc; }, {}),
                home: (rd.home || []).reduce((acc, p) => { if(p.pos) acc[p.pos] = p; return acc; }, {})
            };
        }
        if (!rd.lineupLocks) {
            rd.lineupLocks = { away: {}, home: {} };
            (rd.away || []).forEach((p, i) => { if (p.id) rd.lineupLocks.away[p.id] = i; });
            (rd.home || []).forEach((p, i) => { if (p.id) rd.lineupLocks.home[p.id] = i; });
        }
        if (rd.lineupClosed === undefined) {
            rd.lineupClosed = { away: (rd.away || []).length > 1, home: (rd.home || []).length > 1 };
        }
        if (!rd.lineupIdx) {
            rd.lineupIdx = { away: 0, home: 0 };
        }
        setRosterData(rd);
    }
    setKey(k => k + 1);
    setScreen("game");
  };

  return (
      <>
        <div style={{ display: screen === 'latestart' && config ? 'block' : 'none' }}>
            {screen === 'latestart' && config && <LateStartScreen config={config} onComplete={handleLateStartSubmit} onCancel={() => setScreen("setup")} />}
        </div>
        <div style={{ display: screen === 'game' && config ? 'block' : 'none' }}>
            {screen === 'game' && config && <GameTracker key={key} config={config} onNewGame={() => { setConfig(null); setScreen("setup"); }} initialState={initState} rosterData={rosterData} setRosterData={setRosterData} onOpenRoster={() => setShowRoster(true)} />}
        </div>
        <div style={{ display: screen === 'setup' ? 'block' : 'none' }}>
            {screen === 'setup' && <SetupScreen onStart={handleStart} onImport={handleImport} onOpenRoster={() => setShowRoster(true)} />}
        </div>
        
        {/* Overlay Roster Screen preserves mounted states underneath */}
        {showRoster && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 1000, background: C.bg, overflowY: 'auto' }}>
                <RosterScreen 
                    rosterData={rosterData} 
                    awayName={config?.away}
                    homeName={config?.home}
                    onSaveRoster={setRosterData} 
                    onClose={() => setShowRoster(false)}
                />
            </div>
        )}
      </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
