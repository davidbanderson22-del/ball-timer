<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorecard Estimator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IM+Fell+DW+Pica&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f4f1ea;
            --ink: #2b2b2b;
            --ink-fade: #5e5e5e;
            --border: #d1cdc2;
            --accent: #8b4513; /* Leather/Wood accent */
            --highlight: #d4a017;
        }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #d1cdc2; 
            color: var(--ink);
            font-family: 'IM Fell DW Pica', serif;
        }
        /* Paper texture effect */
        .paper-texture {
            background-color: var(--paper);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ── Constants & Helpers ───────────────────────────────────────────────────────
const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];

const LEAGUES = {
    hs: { label: "High School", halfInning: 10, warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
    college: { label: "College", halfInning: 11, warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
    rec: { label: "Adult Rec", halfInning: 13, warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
    mlb: { label: "MLB / Pro", halfInning: 10, warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
    softball: { label: "Softball", halfInning: 9, warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
    custom: { label: "Custom", halfInning: 11, warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
};

function formatTime(min) {
    if (min == null) return "—";
    const t = ((Math.round(min)) % 1440 + 1440) % 1440;
    const h = Math.floor(t / 60), m = t % 60;
    return `${h % 12 === 0 ? 12 : h % 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
}
function formatDur(min) {
    const m = Math.round(min);
    return m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}m` : `${m}m`;
}
function nowHM() {
    const d = new Date();
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
}
function parseTime(str) {
    if (!str) return null;
    const parts = str.trim().split(":");
    if (parts.length !== 2) return null;
    const h = parseInt(parts[0]), m = parseInt(parts[1]);
    return h * 60 + m;
}

// ── Components ────────────────────────────────────────────────────────────────
const Typewriter = ({ children, style }) => (
    <span style={{ fontFamily: "'Special Elite', cursive", ...style }}>{children}</span>
);

const Card = ({ children, style }) => (
    <div className="paper-texture" style={{ 
        border: '1px solid var(--border)', 
        boxShadow: '2px 2px 5px rgba(0,0,0,0.1)', 
        padding: '15px', 
        marginBottom: '15px', 
        position: 'relative',
        ...style 
    }}>
        {children}
    </div>
);

const Button = ({ onClick, children, variant = "ink", disabled, small }) => {
    const styles = {
        ink: { background: 'var(--ink)', color: 'var(--paper)' },
        paper: { background: 'transparent', color: 'var(--ink)', border: '1px solid var(--ink)' },
        accent: { background: 'var(--accent)', color: 'white' }
    };
    return (
        <button 
            onClick={onClick} 
            disabled={disabled}
            style={{
                ...styles[variant],
                fontFamily: "'Special Elite', cursive",
                padding: small ? '4px 8px' : '10px 15px',
                cursor: disabled ? 'default' : 'pointer',
                opacity: disabled ? 0.4 : 1,
                border: variant === 'paper' ? '1px solid var(--ink)' : 'none',
                borderRadius: '2px'
            }}
        >
            {children}
        </button>
    );
};

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
    const [view, setView] = useState("setup");
    const [config, setConfig] = useState(null);
    const [events, setEvents] = useState([]); // { type: 'phase'|'run'|'out', inning, phase, time, value }
    const [outs, setOuts] = useState(0);
    const [score, setScore] = useState({ away: 0, home: 0 });
    const [entryTime, setEntryTime] = useState(nowHM());

    // ── Logic ─────────────────────────────────────────────────────────────────
    const currentStatus = useMemo(() => {
        if (!events.length) return { inning: 1, phase: EV.START };
        const last = [...events].sort((a,b) => a.id - b.id).pop();
        return { inning: last.inning, phase: last.phase };
    }, [events]);

    const logEvent = (type, value = null, timeOverride = null) => {
        const time = parseTime(timeOverride || entryTime);
        const newEvent = {
            id: Date.now(),
            type,
            value,
            time,
            inning: currentStatus.inning,
            phase: currentStatus.phase
        };
        
        setEvents(prev => [...prev, newEvent]);

        // Logic for score/outs
        if (type === 'run') {
            const team = currentStatus.phase === EV.TOP ? 'away' : 'home';
            setScore(prev => ({ ...prev, [team]: prev[team] + value }));
        }
        
        if (type === 'out') {
            const newOutTotal = outs + value;
            if (newOutTotal >= 3) {
                setOuts(0);
                triggerTransition(time);
            } else {
                setOuts(newOutTotal);
            }
        }

        if (type === 'phase') {
            setOuts(0);
        }

        setEntryTime(nowHM());
    };

    const triggerTransition = (time) => {
        const { inning, phase } = currentStatus;
        let nextInning = inning;
        let nextPhase = phase;

        if (phase === EV.START) nextPhase = EV.TOP;
        else if (phase === EV.TOP) nextPhase = EV.MID;
        else if (phase === EV.MID) nextPhase = EV.BOT;
        else { nextPhase = EV.START; nextInning++; }

        setEvents(prev => [...prev, {
            id: Date.now() + 1,
            type: 'phase',
            time,
            inning: nextInning,
            phase: nextPhase
        }]);
    };

    const undo = () => {
        if (!events.length) return;
        const last = events[events.length - 1];
        
        if (last.type === 'run') {
            const team = last.phase === EV.TOP ? 'away' : 'home';
            setScore(prev => ({ ...prev, [team]: prev[team] - last.value }));
        } else if (last.type === 'out') {
            setOuts(prev => prev - last.value);
        } else if (last.type === 'phase') {
            // Complex undo for phases requires recalculating outs from history
            // For brevity, we simply pop and the useMemo handles status
            setOuts(0); 
        }
        setEvents(prev => prev.slice(0, -1));
    };

    // ── Estimate Engine (Simplified for Rustic flow) ──────────────────────────
    const estimate = useMemo(() => {
        if (!config || events.length < 3) return null;
        
        // Calculate averages from phase events
        const phaseEvents = events.filter(e => e.type === 'phase');
        const halfDurs = [];
        const warmDurs = [];

        for(let i=0; i < phaseEvents.length - 1; i++) {
            const dur = phaseEvents[i+1].time - phaseEvents[i].time;
            if (dur <= 0 || dur > 60) continue;
            if ([EV.START, EV.MID].includes(phaseEvents[i].phase)) warmDurs.push(dur);
            else halfDurs.push(dur);
        }

        const avgHalf = halfDurs.length ? halfDurs.reduce((a,b)=>a+b,0)/halfDurs.length : config.fallbackHalf;
        const avgWarm = warmDurs.length ? warmDurs.reduce((a,b)=>a+b,0)/warmDurs.length : config.fallbackWarmup;

        // Remaining
        const currentTotalIdx = (currentStatus.inning - 1) * 4 + PHASE_ORDER.indexOf(currentStatus.phase);
        const gameEndIdx = (config.totalInnings - 1) * 4 + 3; // End of Bot
        
        let remHalf = 0, remWarm = 0;
        for (let i = currentTotalIdx + 1; i <= gameEndIdx; i++) {
            const p = PHASE_ORDER[i % 4];
            if ([EV.TOP, EV.BOT].includes(p)) remHalf++;
            else remWarm++;
        }

        const lastTime = events[events.length - 1].time;
        const projectedEnd = lastTime + (remHalf * avgHalf) + (remWarm * avgWarm);

        return { end: projectedEnd, avgHalf, avgWarm };
    }, [events, config, currentStatus]);

    // ── Render Helpers ────────────────────────────────────────────────────────
    if (view === "setup") return (
        <div style={{ maxWidth: '400px', margin: '20px auto', padding: '20px' }}>
            <Card style={{ textAlign: 'center', border: '2px solid var(--ink)' }}>
                <h1 style={{ fontFamily: "'Special Elite', cursive", textDecoration: 'underline' }}>Official Game Ledger</h1>
                <div style={{ marginBottom: '15px' }}>
                    <label style={{ display: 'block', fontSize: '12px' }}>AWAY TEAM</label>
                    <input id="away" className="paper-texture" style={{ border: 'none', borderBottom: '1px solid var(--ink)', textAlign: 'center', fontSize: '20px', width: '80%' }} />
                </div>
                <div style={{ marginBottom: '15px' }}>
                    <label style={{ display: 'block', fontSize: '12px' }}>HOME TEAM</label>
                    <input id="home" className="paper-texture" style={{ border: 'none', borderBottom: '1px solid var(--ink)', textAlign: 'center', fontSize: '20px', width: '80%' }} />
                </div>
                <div style={{ marginBottom: '20px' }}>
                    <label style={{ display: 'block', fontSize: '12px' }}>LEAGUE PRESET</label>
                    <select id="league" className="paper-texture" style={{ border: '1px solid var(--ink)', padding: '5px' }}>
                        {Object.entries(LEAGUES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                    </select>
                </div>
                <Button onClick={() => {
                    const l = document.getElementById('league').value;
                    setConfig({
                        away: document.getElementById('away').value || "Away",
                        home: document.getElementById('home').value || "Home",
                        ...LEAGUES[l],
                        fallbackHalf: LEAGUES[l].halfInning,
                        fallbackWarmup: LEAGUES[l].warmup
                    });
                    setView("game");
                }}>Open Ledger</Button>
            </Card>
        </div>
    );

    return (
        <div style={{ maxWidth: '450px', margin: '0 auto', padding: '10px' }}>
            {/* Scoreboard */}
            <Card style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', textAlign: 'center', borderBottom: '3px double var(--ink)' }}>
                <div>
                    <div style={{ fontSize: '12px' }}>{config.away}</div>
                    <div style={{ fontSize: '48px', fontFamily: "'Special Elite', cursive" }}>{score.away}</div>
                </div>
                <div style={{ padding: '0 20px', fontSize: '24px' }}>vs</div>
                <div>
                    <div style={{ fontSize: '12px' }}>{config.home}</div>
                    <div style={{ fontSize: '48px', fontFamily: "'Special Elite', cursive" }}>{score.home}</div>
                </div>
            </Card>

            {/* Status & Estimate */}
            <Card style={{ textAlign: 'center' }}>
                <Typewriter style={{ fontSize: '18px', color: 'var(--accent)' }}>
                    {currentStatus.phase === EV.START && `Pre-Game Warmup`}
                    {currentStatus.phase === EV.TOP && `Top of the ${currentStatus.inning}`}
                    {currentStatus.phase === EV.MID && `Middle of the ${currentStatus.inning}`}
                    {currentStatus.phase === EV.BOT && `Bottom of the ${currentStatus.inning}`}
                </Typewriter>
                <div style={{ marginTop: '10px', display: 'flex', justifyContent: 'center', gap: '15px' }}>
                    <div style={{ border: '1px solid var(--border)', padding: '5px 15px' }}>
                        <label style={{ display: 'block', fontSize: '9px' }}>OUTS</label>
                        <div style={{ fontSize: '20px' }}>
                            {[1,2,3].map(i => <span key={i} style={{ color: outs >= i ? 'var(--ink)' : 'var(--border)', margin: '0 2px' }}>●</span>)}
                        </div>
                    </div>
                    <div style={{ border: '1px solid var(--border)', padding: '5px 15px' }}>
                        <label style={{ display: 'block', fontSize: '9px' }}>EST. FINISH</label>
                        <Typewriter style={{ fontSize: '18px' }}>{estimate ? formatTime(estimate.end) : "Pending..."}</Typewriter>
                    </div>
                </div>
            </Card>

            {/* Controls */}
            <Card>
                <div style={{ display: 'flex', gap: '10px', marginBottom: '15px' }}>
                    <input 
                        type="time" 
                        value={entryTime} 
                        onChange={e => setEntryTime(e.target.value)} 
                        className="paper-texture"
                        style={{ border: '1px solid var(--ink)', padding: '5px', fontFamily: "'Courier Prime', monospace" }} 
                    />
                    <Button small variant="paper" onClick={() => setEntryTime(nowHM())}>Now</Button>
                    <div style={{ flex: 1 }} />
                    <Button small variant="paper" onClick={undo} disabled={!events.length}>Undo</Button>
                </div>

                {/* Contextual Buttons */}
                {([EV.START, EV.MID].includes(currentStatus.phase)) ? (
                    <Button variant="accent" full onClick={() => logEvent('phase')}>
                        Start {currentStatus.phase === EV.START ? `Top ${currentStatus.inning}` : `Bot ${currentStatus.inning}`}
                    </Button>
                ) : (
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.5fr', gap: '10px' }}>
                        <div>
                            <label style={{ fontSize: '10px', display: 'block', marginBottom: '5px' }}>RECORD RUNS</label>
                            <Button variant="ink" onClick={() => logEvent('run', 1)}>+1 Run</Button>
                        </div>
                        <div>
                            <label style={{ fontSize: '10px', display: 'block', marginBottom: '5px' }}>RECORD OUTS</label>
                            <div style={{ display: 'flex', gap: '5px' }}>
                                <Button variant="ink" onClick={() => logEvent('out', 1)}>+1</Button>
                                {outs === 0 && <Button variant="ink" onClick={() => logEvent('out', 2)}>+2</Button>}
                                {outs === 0 && <Button variant="ink" onClick={() => logEvent('out', 3)}>+3</Button>}
                                {outs === 1 && <Button variant="ink" onClick={() => logEvent('out', 2)}>+2</Button>}
                            </div>
                        </div>
                    </div>
                )}
            </Card>

            {/* Log */}
            <Card style={{ maxHeight: '150px', overflowY: 'auto' }}>
                <label style={{ fontSize: '10px', textDecoration: 'underline' }}>GAME LEDGER</label>
                <div style={{ fontSize: '12px', marginTop: '5px', lineHeight: '1.6' }}>
                    {[...events].reverse().map(e => (
                        <div key={e.id} style={{ borderBottom: '1px dashed var(--border)' }}>
                            <Typewriter style={{ color: 'var(--ink-fade)' }}>[{formatTime(e.time)}]</Typewriter>
                            <span style={{ marginLeft: '8px' }}>
                                {e.type === 'phase' && `Transition to ${e.phase} ${e.inning}`}
                                {e.type === 'run' && `Run scored by ${e.phase === EV.TOP ? config.away : config.home}`}
                                {e.type === 'out' && `${e.value} Out(s) recorded`}
                            </span>
                        </div>
                    ))}
                </div>
            </Card>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
