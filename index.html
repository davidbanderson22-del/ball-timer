const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ── Fonts & Colors (Rustic Scorecard Theme) ───────────────────────────────────
const FONT = "https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&display=swap";

const C = {
  bg: "#f4f1ea", card: "#eae4d3", border: "#d0c8b6", borderBright: "#b8af9b",

};
const DISPLAY = "'Special Elite', cursive";
const MONO    = "'Courier Prime', monospace";

// ── League presets ────────────────────────────────────────────────────────────
const LEAGUES = {
  hs:       { label: "High School",         halfInning: 10,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  college:  { label: "College / NCAA",      halfInning: 11,  warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
  rec:      { label: "Adult Rec / Amateur", halfInning: 13,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  mlb:      { label: "MLB / Pro",           halfInning: 10,  warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
  softball: { label: "Softball",            halfInning: 9,   warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
  custom:   { label: "Custom",              halfInning: 11,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
};

// ── Phase constants ───────────────────────────────────────────────────────────
const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];
const isWarmup = p => p === EV.START || p === EV.MID;

function phaseLabel(inning, phase) {
  const m = { start: `Pre-${inning} Warmup`, top: `Top ${inning}`, mid: `Mid-${inning} Warmup`, bot: `Bot ${inning}` };
  return m[phase] ?? "";
}
function phaseDesc(phase, awayName = "Away", homeName = "Home") {
  const m = { start: "Between-inning warmup begins", top: `${awayName} steps up to bat`, mid: "Mid-inning warmup begins", bot: `${homeName} steps up to bat` };
  return m[phase] ?? "";
}

// ── Time & Sorting Utils (Quantized to Seconds) ───────────────────────────────
function parseTime(str) {
  if (!str) return null;
  const parts = str.trim().split(":").map(Number);
  let h = 0, m = 0, s = 0;
  if (parts.length === 3) { [h, m, s] = parts; } 
  else if (parts.length === 2) { [h, m] = parts; }
  else return null;
  if (isNaN(h) || isNaN(m) || isNaN(s)) return null;
  return h * 3600 + m * 60 + s;
}
function formatTime(sec) {
  if (sec == null || isNaN(sec)) return "—";
  const t = ((Math.round(sec)) % 86400 + 86400) % 86400;
  const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
  return `${h % 12 === 0 ? 12 : h % 12}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
}
function formatDur(sec) {
  if (sec == null || isNaN(sec)) return "—";
  const t = Math.round(sec);
  const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
  return h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
}
function nowTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Robust sorting to prevent tie-breaker interface lockups
function sortEvents(arr) {
  return [...arr].sort((a, b) => {
    if (a.time !== b.time) return a.time - b.time;
    return (a.id || 0) - (b.id || 0);
  });
}

function getSafeTime(inputTime, allEvents) {
  let t = parseTime(inputTime) ?? parseTime(nowTime());
  if (allEvents && allEvents.length > 0) {
      const sorted = sortEvents(allEvents);
      const lastTime = sorted[sorted.length - 1].time;
      if (t < lastTime) return lastTime;
  }
  return t;
}

// ── Next phase logic ──────────────────────────────────────────────────────────
function getNextPhase(phaseEvents) {
  if (!phaseEvents.length) return { inning: 1, phase: EV.START };
  const sorted = sortEvents(phaseEvents);
  const last = sorted[sorted.length - 1];
  const idx = PHASE_ORDER.indexOf(last.phase);
  if (idx < 3) {
    return { inning: last.inning, phase: PHASE_ORDER[idx + 1] };
  }
  return { inning: last.inning + 1, phase: EV.START };
}

function isGamePotentiallyOver(phaseEvents, score, totalInnings, mercyAfter, mercyRuns) {
  if (!phaseEvents.length) return false;
  const sorted = sortEvents(phaseEvents);
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const diff = Math.abs(score.home - score.away);

  // EQUAL AT-BATS MERCY RULE CHECK
  if (mercyAfter && mercyRuns && diff >= mercyRuns) {
    if (score.home > score.away) {
        if (lastCompleted >= mercyAfter) return true;
        if (last.phase === EV.BOT && last.inning >= mercyAfter) return true; // Home walk-off mercy
    } else {
        if (lastCompleted >= mercyAfter && last.phase === EV.START) return true; // Away wins only when inning completely finishes
    }
  }

  if (last.inning >= totalInnings && last.phase === EV.MID && score.home > score.away) return true;
  if (lastCompleted >= totalInnings && score.home !== score.away) return true;
  
  return false;
}

// ── Monte Carlo probability engine ───────────────────────────────────────────
function poissonSample(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-Math.min(lambda, 20));
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning, halfDurCount, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase }) {
  if (halfDurCount < 2) return null;
  const prior = 0.8, pw = 2;
  const awayRuns   = runsLog.filter(r => r.team === "away").reduce((s, r) => s + r.runs, 0);
  const homeRuns   = runsLog.filter(r => r.team === "home").reduce((s, r) => s + r.runs, 0);
  const awayHalves = Math.max(1, runsLog.filter(r => r.half === "top").length);
  const homeHalves = Math.max(1, runsLog.filter(r => r.half === "bot").length);
  const awayRate   = (awayRuns + pw * prior) / (awayHalves + pw);
  const homeRate   = (homeRuns + pw * prior) / (homeHalves + pw);
  
  const N = 4000;
  let mercy = 0, endTop = 0, endBot = 0, extra = 0;
  let awayWin = 0, homeWin = 0, tieCount = 0;

  const baseInning = activeInningNum || (lastPhase ? lastPhase.inning : 1);
  const isTop = activeHalf === 'top';
  const isBot = activeHalf === 'bot';

  for (let i = 0; i < N; i++) {
    let a = score.away, h = score.home;
    let currentInn = Math.max(lastCompletedInning + 1, baseInning);

    // 1. Resolve current active inning / partial runs
    if (isTop) {
        a += poissonSample(awayRate * ((3 - (currentOuts || 0)) / 3));
        h += poissonSample(homeRate);
        currentInn++;
    } else if (isBot) {
        h += poissonSample(homeRate * ((3 - (currentOuts || 0)) / 3));
        currentInn++;
    } else if (lastPhase && lastPhase.phase === EV.MID) {
        h += poissonSample(homeRate);
        currentInn++;
    }

    // 2. Add remaining guaranteed regulation innings
    for (let j = currentInn; j <= totalInnings; j++) {
        a += poissonSample(awayRate);
        h += poissonSample(homeRate);
    }
    
    const diff = Math.abs(a - h);
    
    // 3. Evaluate Outcomes
    if (mercyAfter && mercyRuns && diff >= mercyRuns && (lastCompletedInning >= mercyAfter - 1 || totalInnings >= mercyAfter)) {
      mercy++;
    } else if (a === h) {
      extra++;
    } else if (h > a) {
      endTop++; 
    } else {
      endBot++; 
    }

    // Winner Resolution (including Extra Innings / Ties)
    let currentInningResolution = Math.max(totalInnings, lastCompletedInning);
    while (a === h) {
      if (allowTies && currentInningResolution >= tieInningLimit) {
        tieCount++;
        break;
      }
      a += poissonSample(awayRate);
      h += poissonSample(homeRate);
      currentInningResolution++;
      if (currentInningResolution > 50) { tieCount++; break; } // safety fallback
    }

    if (a > h) awayWin++;
    else if (h > a) homeWin++;
  }
  return {
    mercy:       clamp(mercy / N, 0, 1),
    endTop:      clamp(endTop / N, 0, 1),
    endBot:      clamp(endBot / N, 0, 1),
    extra:       clamp(extra / N, 0, 1),
    awayWin:     clamp(awayWin / N, 0, 1),
    homeWin:     clamp(homeWin / N, 0, 1),
    tie:         clamp(tieCount / N, 0, 1),
    awayRate, homeRate,
  };
}

// ── Core estimate engine ──────────────────────────────────────────────────────
function computeEstimate({ phaseEvents, allEvents, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase, accumulatedDelay }) {
  if (!phaseEvents.length) return null;
  const sorted = sortEvents(phaseEvents);
  const halfDurs = [], warmupDurs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const c = sorted[i], n = sorted[i + 1];
    const d = n.time - c.time;
    if (d < 0 || d > 5400) continue; // 5400 seconds = 90 mins max threshold
    if (c.phase === EV.START && n.phase === EV.TOP  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.MID  && n.phase === EV.BOT  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.TOP  && n.phase === EV.MID  && n.inning === c.inning)      halfDurs.push(d);
    if (c.phase === EV.BOT  && n.phase === EV.START && n.inning === c.inning + 1) halfDurs.push(d);
  }
  const measuredHalf   = avg(halfDurs);
  const measuredWarmup = avg(warmupDurs);
  const avgHalf   = (measuredHalf   ?? (fallbackHalf * 60)) || 600; // Config fallbacks are minutes, multiply to seconds
  const avgWarmup = (measuredWarmup ?? (fallbackWarmup * 60)) || 180;
  const minS = Math.min(halfDurs.length, warmupDurs.length);
  const confidence = minS === 0 ? null : minS === 1 ? "low" : minS <= 2 ? "fair" : minS <= 4 ? "good" : "strong";
  const canEstimate = warmupDurs.length >= 1;
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const runDiff = Math.abs(score.home - score.away);
  
  let mercyEligible = false;
  if (mercyAfter && mercyRuns && runDiff >= mercyRuns) {
      if (score.home > score.away) {
          if (lastCompleted >= mercyAfter) mercyEligible = true;
          if (last.phase === EV.BOT && last.inning >= mercyAfter) mercyEligible = true;
      } else {
          if (lastCompleted >= mercyAfter && last.phase === EV.START) mercyEligible = true;
      }
  }
  
  const homeLeading = score.home > score.away;
  const botFinalNeeded = !homeLeading;
  const inExtra = lastCompleted >= totalInnings;
  let remHalf = 0, remWarmup = 0;
  const effEnd = inExtra ? lastCompleted + 1 : totalInnings;
  for (let inn = 1; inn <= effEnd; inn++) {
    for (const ph of PHASE_ORDER) {
      if (inn === totalInnings && ph === EV.BOT && !botFinalNeeded && !inExtra) continue;
      if (inn === 1 && ph === EV.START) continue;
      if (sorted.some(e => e.inning === inn && e.phase === ph)) continue;
      if (ph === EV.TOP || ph === EV.BOT) remHalf++; else remWarmup++;
    }
  }
  if (inExtra) { remHalf += 2; remWarmup += 2; }
  
  const currentlyInWarmup = isWarmup(last.phase);
  const latestEvent = allEvents && allEvents.length ? sortEvents(allEvents)[allEvents.length - 1] : last;
  const outPace = (avgHalf || 0) / 3;
  const activeTimeRem = (!currentlyInWarmup && activeHalf) ? Math.max(0, (3 - (currentOuts || 0)) * outPace) : (currentlyInWarmup ? (avgWarmup || 0) : 0);
  
  const estimatedEnd = latestEvent.time + activeTimeRem + remHalf * avgHalf + remWarmup * avgWarmup + (accumulatedDelay || 0);
  const probs = computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning: lastCompleted, halfDurCount: halfDurs.length, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase });
  return {
    avgHalf, avgWarmup, measuredHalf, measuredWarmup,
    halfDurs, warmupDurs, confidence, canEstimate,
    remHalf, remWarmup, estimatedEnd, last,
    mercyEligible, botFinalNeeded, inExtra,
    lastCompletedInning: lastCompleted, currentlyInWarmup,
    probs, runDiff,
  };
}

// ── Import / Export helpers ───────────────────────────────────────────────────
const SAVE_VERSION = 2;

function exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState) {
  const data = {
    v: SAVE_VERSION,
    savedAt: new Date().toISOString(),
    config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const ts   = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "-");
  a.href     = url;
  a.download = `game_${config.away}_vs_${config.home}_${ts}.json`.replace(/\s+/g, "_");
  a.click();
  URL.revokeObjectURL(url);
}

function exportGameText(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState) {
  const lines = [
    `GAME: ${config.away} @ ${config.home}`,
    `SAVED: ${new Date().toLocaleString()}`,
    `---`,
    JSON.stringify({ v: SAVE_VERSION, config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState }),
  ];
  return lines.join("\n");
}

function parseImport(text) {
  try {
    const data = JSON.parse(text.trim());
    if (data.v && data.config && data.events) return { ok: true, data };
    return { ok: false, error: "Unrecognized format" };
  } catch {
    const lines = text.trim().split("\n");
    for (let i = lines.length - 1; i >= 0; i--) {
      try {
        const data = JSON.parse(lines[i]);
        if (data.v && data.config && data.events) return { ok: true, data };
      } catch {}
    }
    return { ok: false, error: "Could not parse game data" };
  }
}

  const map = { low: { label: "Low", color: C.red, bg: C.redDim }, fair: { label: "Fair", color: C.yellow, bg: C.yellowDim }, good: { label: "Good", color: C.blue, bg: C.blueDim }, strong: { label: "Strong", color: C.green, bg: C.greenDim } };
  const { label, color, bg } = map[confidence];
  return <span style={{ fontSize: "10px", fontWeight: "bold", textTransform: "uppercase", color, background: bg, border: `1px dashed ${color}`, padding: "2px 7px", fontFamily: MONO }}>{label}</span>;

// ── Linescore ─────────────────────────────────────────────────────────────────
function Linescore({ away, home, score, runsLog, totalInnings, lastCompletedInning, currentPhase, currentInning }) {
  const maxCols = Math.max(totalInnings, currentInning || lastCompletedInning || 1);
  const cols = Array.from({ length: maxCols }, (_, i) => i + 1);
  const getRuns = (team, inning) => {
    const half = team === "away" ? "top" : "bot";
    const entries = runsLog.filter(r => r.team === team && r.inning === inning && r.half === half);
    if (entries.length) return String(entries.reduce((s, r) => s + r.runs, 0));

    let played = false;
    if (currentPhase !== null && currentPhase !== undefined) {
        if (inning < (currentInning || 1)) {
           played = true;
        } else if (inning === currentInning) {
           if (team === "away" && (currentPhase === EV.TOP || currentPhase === EV.MID || currentPhase === EV.BOT)) played = true;
           if (team === "home" && currentPhase === EV.BOT) played = true;
        }
    } else {
        played = team === "away" ? inning <= Math.ceil((lastCompletedInning || 0) + 0.5) : inning <= (lastCompletedInning || 0);
    }
    return played ? "0" : "·";
  };
  const cell = val => ({ width: "26px", minWidth: "26px", textAlign: "center", fontSize: "13px", fontFamily: MONO, padding: "5px 2px", color: val === "·" ? C.faint : C.text, borderRight: `1px solid ${C.borderBright}`, borderBottom: `1px solid ${C.borderBright}` });
  return (

// ── Accuracy Graph ────────────────────────────────────────────────────────────
function AccuracyGraph({ estimateHistory, endTime, config }) {
  const [xMode, setXMode] = useState("inning");
  const [yMode, setYMode] = useState("signed");
  const svgRef = useRef(null);

  const points = useMemo(() => {
    if (!endTime || !estimateHistory.length) return [];
    return estimateHistory
      .filter(h => h.estimate != null)
      .map(h => ({
        ...h,
        // Dividing by 60 to display cleanly as +/- minutes rather than 300+ seconds
        error: yMode === "signed" ? Math.round((h.estimate - endTime) / 60) : Math.round(Math.abs(h.estimate - endTime) / 60),
        xVal:  xMode === "inning" ? h.inning + (h.phase === EV.MID || h.phase === EV.BOT ? 0.5 : 0) : h.wallTime,
      }));
  }, [estimateHistory, endTime, xMode, yMode]);

  if (!points.length) return null;

  const W = 320, H = 180, PL = 44, PR = 12, PT = 16, PB = 28;
  const IW = W - PL - PR, IH = H - PT - PB;
  const xs = points.map(p => p.xVal);
  const ys = points.map(p => p.error);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yAbsMax = Math.max(Math.abs(Math.min(...ys)), Math.abs(Math.max(...ys)), 5);
  const yMin = yMode === "signed" ? -yAbsMax : 0;
  const yMax = yAbsMax;

  const toSVG = (xv, yv) => ({
    x: PL + ((xv - xMin) / (xMax - xMin || 1)) * IW,
    y: PT + (1 - (yv - yMin) / (yMax - yMin || 1)) * IH,
  });

  const zeroY = PT + (1 - (0 - yMin) / (yMax - yMin || 1)) * IH;
  const pathD = points.map((p, i) => { const { x, y } = toSVG(p.xVal, p.error); return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`; }).join(" ");

  const yTicks = [];
  const step = Math.ceil(yAbsMax / 3);
  for (let v = Math.ceil(yMin / step) * step; v <= yMax; v += step) yTicks.push(v);
  const xTicks = xMode === "inning"
    ? Array.from({ length: config.totalInnings }, (_, i) => i + 1).filter(v => v >= xMin && v <= xMax)
    : points.map(p => p.xVal);

  return (
    <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "14px", marginBottom: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
        <Label style={{ marginBottom: 0 }}>ESTIMATE ACCURACY</Label>
        <div style={{ display: "flex", gap: "6px" }}>
          {[["signed", "±"], ["absolute", "|e|"]].map(([v, l]) => (
            <button key={v} onClick={() => setYMode(v)} style={{ background: yMode === v ? C.text : "transparent", border: `1px solid ${C.text}`, color: yMode === v ? C.bg : C.text, padding: "2px 6px", fontSize: "10px", fontFamily: MONO, fontWeight: "bold", cursor: "pointer" }}>{l}</button>
          ))}
          {[["inning", "INN"], ["time", "TIME"]].map(([v, l]) => (
            <button key={v} onClick={() => setXMode(v)} style={{ background: xMode === v ? C.blue : "transparent", border: `1px solid ${xMode === v ? C.blue : C.text}`, color: xMode === v ? C.bg : C.text, padding: "2px 6px", fontSize: "10px", fontFamily: MONO, fontWeight: "bold", cursor: "pointer" }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ overflowX: "auto", background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px 0" }}>
        <svg ref={svgRef} width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
          {yMode === "signed" && <line x1={PL} y1={zeroY} x2={W - PR} y2={zeroY} stroke={C.borderBright} strokeWidth="2" strokeDasharray="4,4" />}
          {yTicks.map(v => {
            const y = PT + (1 - (v - yMin) / (yMax - yMin || 1)) * IH;
            return <line key={v} x1={PL} y1={y} x2={W - PR} y2={y} stroke={C.borderBright} strokeWidth="1" strokeDasharray="2,2" />;
          })}
          <line x1={PL} y1={PT} x2={PL} y2={PT + IH} stroke={C.text} strokeWidth="2" />
          <line x1={PL} y1={PT + IH} x2={W - PR} y2={PT + IH} stroke={C.text} strokeWidth="2" />
          {yTicks.map(v => {
            const y = PT + (1 - (v - yMin) / (yMax - yMin || 1)) * IH;
            return <text key={v} x={PL - 6} y={y + 4} textAnchor="end" fontSize="10" fill={C.text} fontFamily={MONO} fontWeight="bold">{v > 0 ? `+${v}` : v}m</text>;
          })}
          {xMode === "inning" ? xTicks.map(v => {
            const { x } = toSVG(v, 0);
            return <text key={v} x={x} y={H - 6} textAnchor="middle" fontSize="10" fill={C.text} fontFamily={MONO} fontWeight="bold">{v}</text>;
          }) : points.map((p, i) => {
            if (i % Math.max(1, Math.floor(points.length / 5)) !== 0) return null;
            const { x } = toSVG(p.xVal, 0);
            return <text key={i} x={x} y={H - 6} textAnchor="middle" fontSize="9" fill={C.muted} fontFamily={MONO}>{formatTime(p.wallTime)}</text>;
          })}
          {points.length > 1 && <path d={`${pathD} L${toSVG(points[points.length - 1].xVal, yMin).x},${toSVG(points[points.length - 1].xVal, yMin).y} L${toSVG(points[0].xVal, yMin).x},${toSVG(points[0].xVal, yMin).y} Z`} fill={C.accentDim} opacity="0.4" />}
          {points.length > 1 && <path d={pathD} fill="none" stroke={C.accent} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />}
          {points.map((p, i) => {
            const { x, y } = toSVG(p.xVal, p.error);
            const col = yMode === "signed"
              ? (p.error > 0 ? C.yellow : p.error < 0 ? C.blue : C.green)
              : (Math.abs(p.error) <= 5 ? C.green : Math.abs(p.error) <= 15 ? C.yellow : C.red);
            return <circle key={i} cx={x} cy={y} r="5" fill={col} stroke={C.bg} strokeWidth="2" />;
          })}
          <text x={PL + IW / 2} y={H} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily={MONO} fontWeight="bold">{xMode === "inning" ? "INNING" : "TIME"}</text>
          <text x={10} y={PT + IH / 2} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily={MONO} fontWeight="bold" transform={`rotate(-90,10,${PT + IH / 2})`}>ERROR (MIN)</text>
        </svg>
      </div>

      <div style={{ display: "flex", gap: "12px", justifyContent: "center", marginTop: "12px" }}>
        {yMode === "signed"
          ? [["Long", C.yellow], ["Short", C.blue], ["Exact", C.green]].map(([l, c]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
              <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: c, border: `1px solid ${C.text}` }} />
              <span style={{ fontSize: "10px", color: C.muted, fontFamily: MONO, fontWeight: "bold", textTransform: "uppercase" }}>{l}</span>
            </div>
          ))
          : [["≤5m", C.green], ["≤15m", C.yellow], [">15m", C.red]].map(([l, c]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
              <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: c, border: `1px solid ${C.text}` }} />
              <span style={{ fontSize: "10px", color: C.muted, fontFamily: MONO, fontWeight: "bold", textTransform: "uppercase" }}>{l}</span>
            </div>
          ))}
      </div>
    </div>
  );
}

// ── Modals ────────────────────────────────────────────────────────────────────
const overlayStyle = { position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" };
const modalStyle   = { background: C.bg, border: `4px solid ${C.text}`, padding: "20px", width: "100%", maxWidth: "360px", boxShadow: `6px 6px 0px rgba(0,0,0,0.2)` };

function ImportModal({ onImport, onCancel, hasActiveGame, onExportFirst }) {
  const [text, setText] = useState("");
  const [error, setError] = useState(null);
  const [step, setStep] = useState(hasActiveGame ? "warn" : "paste");
  const fileRef = useRef(null);

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setText(ev.target.result);
    reader.readAsText(file);
  };

  const handleImport = () => {
    const result = parseImport(text);
    if (!result.ok) { setError(result.error); return; }
    onImport(result.data);
  };

  if (step === "warn") {
    return (
      <div style={overlayStyle}>
        <div style={modalStyle}>
          <div style={{ fontSize: "20px", fontFamily: DISPLAY, color: C.accent, marginBottom: "10px" }}>GAME IN PROGRESS</div>
          <div style={{ fontSize: "12px", color: C.text, fontFamily: MONO, marginBottom: "18px", lineHeight: "1.6", fontWeight: "bold" }}>
            You have an active game. Importing will overwrite it.<br />Save the current game first?
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            <Btn full variant="highlight" onClick={() => { onExportFirst(); setStep("paste"); }}>SAVE CURRENT GAME FIRST</Btn>
            <Btn full variant="outline"   onClick={() => setStep("paste")}>DISCARD & IMPORT</Btn>
            <Btn full variant="ghost"     onClick={onCancel}>CANCEL</Btn>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={overlayStyle}>
      <div style={modalStyle}>
        <div style={{ fontSize: "20px", fontFamily: DISPLAY, color: C.text, marginBottom: "10px" }}>IMPORT SAVED GAME</div>
        <div style={{ fontSize: "12px", color: C.muted, fontFamily: MONO, marginBottom: "12px" }}>Upload a .json file or paste exported text.</div>
        <input ref={fileRef} type="file" accept=".json,text/plain" onChange={handleFile} style={{ display: "none" }} />
        <Btn full variant="outline" small onClick={() => fileRef.current.click()} style={{ marginBottom: "12px" }}>📂 CHOOSE FILE</Btn>
        <textarea
          value={text} onChange={e => setText(e.target.value)}
          placeholder="Or paste exported text here..."
          style={{ background: C.card, border: `2px solid ${C.borderBright}`, color: C.text, padding: "10px", fontSize: "12px", fontFamily: MONO, width: "100%", height: "100px", boxSizing: "border-box", resize: "none", outline: "none" }}
        />
        {error && <div style={{ fontSize: "12px", color: C.red, fontFamily: MONO, marginTop: "8px", fontWeight: "bold" }}>{error}</div>}
        <div style={{ display: "flex", gap: "10px", marginTop: "16px" }}>
          <Btn full variant="primary" onClick={handleImport} disabled={!text.trim()}>IMPORT →</Btn>
          <Btn full variant="ghost"   onClick={onCancel}>CANCEL</Btn>
        </div>
      </div>
    </div>
  );
}

function CopyModal({ text, onClose }) {
  const [copied, setCopied] = useState(false);

    <div style={overlayStyle}>

// ── Late Start Sub-Screen ─────────────────────────────────────────────────────
function LateStartScreen({ config, onComplete, onCancel }) {
  const [inning, setInning] = useState(1);
  const [half, setHalf] = useState("top");
  const [outs, setOuts] = useState(0);
  const [runs, setRuns] = useState({});

  const halvesToPlay = useMemo(() => {
    const res = [];
    for (let i = 1; i <= inning; i++) {
      res.push({ inn: i, half: 'top', team: 'away' });
      if (i < inning || half === 'bot') {
        res.push({ inn: i, half: 'bot', team: 'home' });
      }
    }
    return res;
  }, [inning, half]);

  const handleRunsChange = (inn, h, val) => {
    setRuns(prev => ({ ...prev, [`${inn}-${h}`]: Math.max(0, parseInt(val) || 0) }));
  };

  const handleSubmit = () => {
    const baseRunsLog = halvesToPlay.map(h => ({
      team: h.team,
      runs: runs[`${h.inn}-${h.half}`] || 0,
      inning: h.inn,
      half: h.half
    }));

    let awayScore = 0, homeScore = 0;
    baseRunsLog.forEach(r => {
      if (r.team === 'away') awayScore += r.runs;
      else homeScore += r.runs;
    });

    const nowSecs = parseTime(nowTime());
    const initialEvents = [
      { id: Date.now(), batchId: Date.now(), type: 'phase', phase: half === 'top' ? EV.TOP : EV.BOT, inning, time: nowSecs }
    ];
    if (outs > 0) {
      initialEvents.push({ id: Date.now() + 1, batchId: Date.now(), type: 'out', val: outs, inning, half, team: half === 'top' ? 'home' : 'away', time: nowSecs });
    }

    onComplete({
      baseScore: { away: awayScore, home: homeScore },
      baseRunsLog,
      events: initialEvents,
      gameLog: [{ msg: `Joined late in ${half === 'top' ? 'Top' : 'Bottom'} ${inning} with ${outs} outs.`, batchId: Date.now() }],
      estimateHistory: []
    });
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 48px" }}>
      <link rel="stylesheet" href={FONT} />
      <div style={{ padding: "40px 20px 20px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "14px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>Join In Progress</div>
        <div style={{ fontSize: "36px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1, marginTop: "8px" }}>LATE START SETUP</div>
      </div>
      <div style={{ padding: "20px 16px", maxWidth: "420px", margin: "0 auto" }}>
        
        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "16px" }}>
          <Label>CURRENT GAME STATUS</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", marginTop: "8px" }}>
            <div><Label>INNING</Label><Sel value={inning} onChange={v => setInning(Number(v))}>{Array.from({length: (config?.totalInnings || 7) + 5}, (_, i) => i + 1).map(n => <option key={n} value={n}>{n}</option>)}</Sel></div>
            <div><Label>HALF</Label><Sel value={half} onChange={v => setHalf(v)}><option value="top">Top</option><option value="bot">Bottom</option></Sel></div>
            <div><Label>OUTS</Label><Sel value={outs} onChange={v => setOuts(Number(v))}><option value={0}>0</option><option value={1}>1</option><option value={2}>2</option></Sel></div>
          </div>
        </div>

        {halvesToPlay.length > 0 && (
          <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "20px" }}>
            <Label>RUNS SCORED PREVIOUSLY</Label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginTop: "12px" }}>
              {halvesToPlay.map(h => (
                <div key={`${h.inn}-${h.half}`} style={{ display: "flex", alignItems: "center", gap: "8px", background: C.bg, padding: "6px", border: `1px solid ${C.borderBright}` }}>
                  <div style={{ flex: 1, fontSize: "12px", fontFamily: MONO, fontWeight: "bold" }}>
                    {h.half === 'top' ? 'Top' : 'Bot'} {h.inn} ({h.team === 'away' ? config?.away : config?.home})
                  </div>
                  <input type="number" min="0" value={runs[`${h.inn}-${h.half}`] || ""} placeholder="0" onChange={e => handleRunsChange(h.inn, h.half, e.target.value)} style={{ width: "40px", padding: "4px", textAlign: "center", fontFamily: MONO, border: `1px solid ${C.border}`, background: C.card, outline: "none" }} />
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          <Btn full variant="primary" onClick={handleSubmit}>FINISH SETUP & ENTER GAME →</Btn>
          <Btn full variant="ghost" onClick={onCancel}>CANCEL</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Summary Screen ────────────────────────────────────────────────────────────
function SummaryScreen({ config, events, baseScore, baseRunsLog, endTime, estimateHistory, onNewGame }) {
  const { away, home, totalInnings } = config;
  
  const phaseEvents = events.filter(e => e.type === 'phase' || !e.type);
  const sorted = sortEvents(phaseEvents);
  const startTime = sorted[0]?.time;
  const actualDuration = endTime && startTime ? endTime - startTime : null;
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  
  const halfDurs = [], warmupDurs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const c = sorted[i], n = sorted[i + 1];
    const d = n.time - c.time;
    if (d < 0 || d > 5400) continue;
    if (c.phase === EV.START && n.phase === EV.TOP  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.MID  && n.phase === EV.BOT  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.TOP  && n.phase === EV.MID  && n.inning === c.inning)      halfDurs.push(d);
    if (c.phase === EV.BOT  && n.phase === EV.START && n.inning === c.inning + 1) halfDurs.push(d);
  }

  const score = { home: baseScore.home, away: baseScore.away };
  events.filter(e => e.type === 'run').forEach(e => score[e.team] += e.val);
  
  const combinedRunsLog = [...baseRunsLog, ...events.filter(e => e.type === 'run').map(e => ({ team: e.team, runs: e.val, inning: e.inning, half: e.half }))];

  const firstEst = estimateHistory.find(h => h.estimate != null);
  // Divided by 60 to translate raw seconds back to displayable minutes
  const firstEstError = firstEst && endTime ? Math.round((firstEst.estimate - endTime) / 60) : null;
  const winner = score.home > score.away ? home : score.away > score.home ? away : null;
  
  const [showCopy, setShowCopy] = useState(false);
  const exportText = exportGameText(config, events, baseScore, baseRunsLog, [], estimateHistory, null);

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 60px" }}>
      <link rel="stylesheet" href={FONT} />
      {showCopy && <CopyModal text={exportText} onClose={() => setShowCopy(false)} />}

      <div style={{ padding: "40px 20px 30px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "14px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>FINAL SCORE</div>
        <div style={{ fontSize: "72px", fontFamily: DISPLAY, marginTop: "8px", lineHeight: 1 }}>{score.away} – {score.home}</div>
        <div style={{ fontSize: "16px", color: C.text, fontFamily: MONO, marginTop: "8px", fontWeight: "bold" }}>{away} @ {home}</div>
        {winner ? <div style={{ marginTop: "12px", fontSize: "16px", color: C.accent, fontFamily: MONO, letterSpacing: "2px", fontWeight: "bold" }}>{winner.toUpperCase()} WINS</div>
                : <div style={{ marginTop: "12px", fontSize: "16px", color: C.text, fontFamily: MONO, letterSpacing: "2px", fontWeight: "bold" }}>TIE GAME</div>}
      </div>

      <div style={{ padding: "20px 16px", maxWidth: "440px", margin: "0 auto" }}>
        
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>FINAL LINESCORE</Label>
          <Linescore away={away} home={home} score={score} runsLog={combinedRunsLog} totalInnings={totalInnings} lastCompletedInning={lastCompleted} currentPhase={null} currentInning={lastCompleted} />
        </div>

        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>GAME TIME & PACE</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "12px" }}>
            <StatBox label="FIRST PITCH" value={formatTime(startTime)} />
            <StatBox label="FINAL OUT"   value={formatTime(endTime)} />
            <StatBox label="DURATION"    value={formatDur(actualDuration)} />
            <StatBox label="INNINGS"     value={`${lastCompleted}`} sub={lastCompleted > totalInnings ? "EXTRA INNINGS" : "REGULATION"} />
          </div>
          <Divider label="Measured Pace" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
            <StatBox label="AVG ½-INN"  value={formatDur(avg(halfDurs))}   sub={`${halfDurs.length} measured`} />
            <StatBox label="AVG WARMUP" value={formatDur(avg(warmupDurs))} sub={`${warmupDurs.length} measured`} />
          </div>
        </div>

        {firstEstError !== null && (
          <div style={{ background: C.bg, border: `2px dashed ${C.text}`, padding: "16px", marginBottom: "16px", textAlign: "center" }}>
            <Label>FIRST ESTIMATE ACCURACY</Label>
            <div style={{ fontSize: "40px", fontFamily: DISPLAY, color: Math.abs(firstEstError) <= 5 ? C.green : Math.abs(firstEstError) <= 15 ? C.yellow : C.red }}>
              {firstEstError > 0 ? "+" : ""}{firstEstError}m
            </div>
            <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO, marginTop: "6px", fontWeight: "bold" }}>
              {Math.abs(firstEstError) <= 5 ? "Excellent (within 5 min)" : Math.abs(firstEstError) <= 15 ? "Good (within 15 min)" : "Off pace (unusual game length)"}
            </div>
          </div>
        )}

        <AccuracyGraph estimateHistory={estimateHistory} endTime={endTime} config={config} />

        <div style={{ display: "flex", flexDirection: "column", gap: "12px", marginTop: "24px" }}>
          <Btn full variant="primary" onClick={onNewGame}>START NEW GAME →</Btn>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
            <Btn full variant="outline" small onClick={() => exportGame(config, events, baseScore, baseRunsLog, [], estimateHistory, null)}>⬇ Download JSON</Btn>
            <Btn full variant="outline" small onClick={() => setShowCopy(true)}>📋 Copy Text</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Game Tracker ──────────────────────────────────────────────────────────────
function GameTracker({ config, onNewGame, initialState }) {
  const { away, home, totalInnings, mercyAfter, mercyRuns, allowTies, tieInningLimit, timeLimit, gameStartTime, fallbackHalf, fallbackWarmup } = config;

  // Timeline Stream arrays
  const [events,          setEvents]          = useState(initialState?.events          ?? []);
  const [gameLog,         setGameLog]         = useState(initialState?.gameLog         ?? []);
  const [estimateHistory, setEstimateHistory] = useState(initialState?.estimateHistory ?? []);
  
  const [baseScore,       setBaseScore]       = useState(initialState?.baseScore       ?? { home: 0, away: 0 });
  const [baseRunsLog,     setBaseRunsLog]     = useState(initialState?.baseRunsLog     ?? []);

  // Modals & Active configurations
  const [entryTime, setEntryTime] = useState(nowTime());
  const [isTypingTime, setIsTypingTime] = useState(false);
  const [gameOverPrompt, setGameOverPrompt] = useState(false);
  const [endTimeInput,   setEndTimeInput]   = useState(nowTime());
  const [showSummary,    setShowSummary]    = useState(false);
  const [finalEndTime,   setFinalEndTime]   = useState(null);
  
  // Weather Delay States
  const [delayActive, setDelayActive] = useState(initialState?.weatherDelayState?.active ?? false);
  const [delayStartTime, setDelayStartTime] = useState(initialState?.weatherDelayState?.startTime ?? null);
  const [accumulatedDelaySec, setAccumulatedDelaySec] = useState(initialState?.weatherDelayState?.accumulatedSec ?? 0);
  const [liveDelaySec, setLiveDelaySec] = useState(0);
  
  const [showImport, setShowImport] = useState(false);
  const [showCopy, setShowCopy]     = useState(false);
  const [copyText, setCopyText]     = useState("");

  const logRef = useRef(null);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [gameLog]);

  // Live real-time ticker
  useEffect(() => {
      if (!isTypingTime) {
          const id = setInterval(() => setEntryTime(nowTime()), 1000);
          return () => clearInterval(id);
      }
  }, [isTypingTime]);

  // Live weather delay calculator
  useEffect(() => {
      if (delayActive && delayStartTime) {
          const id = setInterval(() => {
              const cur = parseTime(nowTime());
              setLiveDelaySec(Math.max(0, cur - delayStartTime));
          }, 1000);
          return () => clearInterval(id);
      } else {
          setLiveDelaySec(0);
      }
  }, [delayActive, delayStartTime]);

  const totalActiveDelay = accumulatedDelaySec + liveDelaySec;

  const handleToggleDelay = () => {
      if (delayActive) {
          setAccumulatedDelaySec(p => p + (parseTime(nowTime()) - delayStartTime));
          setDelayActive(false);
          setDelayStartTime(null);
      } else {
          setDelayActive(true);
          setDelayStartTime(parseTime(nowTime()));
      }
  };

  // Derived timeline configuration matrices
  const phaseEvents = events.filter(e => e.type === 'phase' || !e.type); 
  const sortedPhaseEvents = sortEvents(phaseEvents);
  const lastPhase = sortedPhaseEvents.length ? sortedPhaseEvents[sortedPhaseEvents.length - 1] : null;
  const inActiveInning = lastPhase && (lastPhase.phase === EV.TOP || lastPhase.phase === EV.BOT);
  
  let activeHalf = null, activeInningNum = null, battingTeam = null, fieldingTeam = null, currentOuts = 0;
  if (inActiveInning) {
      activeHalf = lastPhase.phase === EV.TOP ? 'top' : 'bot';
      activeInningNum = lastPhase.inning;
      battingTeam = activeHalf === 'top' ? 'away' : 'home';
      fieldingTeam = activeHalf === 'top' ? 'home' : 'away';
      const outEvents = events.filter(e => e.type === 'out' && e.inning === activeInningNum && e.half === activeHalf);
      currentOuts = outEvents.reduce((s, e) => s + e.val, 0);
  }

  const combinedRunsLog = useMemo(() => {
      const activeRuns = events.filter(e => e.type === 'run').map(e => ({ team: e.team, runs: e.val, inning: e.inning, half: e.half, eventId: e.id, batchId: e.batchId }));
      return [...baseRunsLog, ...activeRuns];
  }, [baseRunsLog, events]);

  const score = useMemo(() => {
      const s = { home: baseScore.home, away: baseScore.away };
      events.filter(e => e.type === 'run').forEach(e => s[e.team] += e.val);
      return s;
  }, [baseScore, events]);

  const nextPhaseFallback = getNextPhase(phaseEvents);
  const est  = computeEstimate({ phaseEvents, allEvents: events, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog: combinedRunsLog, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase, accumulatedDelay: totalActiveDelay });

  // History tracking snapshots
  useEffect(() => {
    if (!est?.canEstimate || !events.length) return;
    const lastEv = events[events.length - 1];
    setEstimateHistory(prev => {
      if (prev.length && prev[prev.length - 1].batchId === lastEv.batchId) return prev;
      return [...prev, {
        batchId:   lastEv.batchId,
        eventId:   lastEv.id,
        wallTime:  lastEv.time,
        inning:    lastEv.inning || lastPhase?.inning || 1,
        phase:     lastEv.phase || lastPhase?.phase || EV.START,
        estimate:  est.estimatedEnd,
        confidence: est.confidence,
      }];
    });
  }, [events, est?.estimatedEnd]);

  // Terminal state evaluation check
  const potOver = isGamePotentiallyOver(phaseEvents, score, totalInnings, mercyAfter, mercyRuns);
  useEffect(() => { 
    if (potOver && !gameOverPrompt && !showSummary) { 
      setGameOverPrompt(true); 
      setEndTimeInput(nowTime()); 
    } 
  }, [potOver, showSummary]);

  const commitEventBatch = (newEvents, logs = []) => {
      setEvents(p => [...p, ...newEvents]);
      setGameLog(p => [...p, ...logs.map(msg => ({ msg, batchId: newEvents[0].batchId }))]);
      setIsTypingTime(false);
      setEntryTime(nowTime());
  };

  const handleLogNextPhase = () => {
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const next = getNextPhase(phaseEvents);
      const newEvents = [{ id: batchId, batchId, type: 'phase', phase: next.phase, inning: next.inning, time: t }];
      const logs = [`📍 ${phaseLabel(next.inning, next.phase)} — Logged at ${formatTime(t)}`];
      commitEventBatch(newEvents, logs);
  };

  const handleAddRun = (val) => {
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const newEvents = [{ id: batchId, batchId, type: 'run', val, time: t, team: battingTeam, inning: activeInningNum, half: activeHalf }];
      const logs = [`🏃 +${val} Run for ${battingTeam === 'away' ? away : home}`];
      commitEventBatch(newEvents, logs);
  };

  const handleAddOut = (val) => {
      const t = getSafeTime(entryTime, events);
      const batchId = Date.now();
      const newEvents = [{ id: batchId, batchId, type: 'out', val, time: t, team: fieldingTeam, inning: activeInningNum, half: activeHalf }];
      const logs = [`⚾ ${val} Out(s) recorded`];

      if (currentOuts + val >= 3) {
          const nextPhase = activeHalf === 'top' ? EV.MID : EV.START;
          const nextInning = activeHalf === 'top' ? activeInningNum : activeInningNum + 1;
          newEvents.push({ id: batchId + 1, batchId, type: 'phase', phase: nextPhase, inning: nextInning, time: t });
          logs.push(`🕒 3 Outs! Auto-advanced to ${phaseLabel(nextInning, nextPhase)}`);
      }
      commitEventBatch(newEvents, logs);
  };

  const handleUndo = () => {
      if (!events.length) return;
      const lastBatchId = events[events.length - 1].batchId || events[events.length - 1].id;
      setEvents(p => p.filter(e => (e.batchId || e.id) !== lastBatchId));
      setGameLog(p => p.filter(l => l.batchId !== lastBatchId));
      setEstimateHistory(p => p.filter(h => h.batchId !== lastBatchId));
      setGameOverPrompt(false);
  };

  const handleEndGame = () => {
    const t = getSafeTime(endTimeInput, events);
    setFinalEndTime(t);
    setGameLog(p => [...p, { msg: `🏁 Final out logged`, batchId: Date.now() }]);
    setShowSummary(true);
  };

  const handleImport = data => {
    setShowImport(false);
    setEvents(data.events ?? []);
    setBaseScore(data.baseScore ?? { home: 0, away: 0 });
    setBaseRunsLog(data.baseRunsLog ?? []);
    setGameLog(data.gameLog ?? []);
    setEstimateHistory(data.estimateHistory ?? []);
    setDelayActive(data.weatherDelayState?.active ?? false);
    setDelayStartTime(data.weatherDelayState?.startTime ?? null);
    setAccumulatedDelaySec(data.weatherDelayState?.accumulatedSec ?? 0);
  };
  
  const getDelayExportState = () => ({ active: delayActive, startTime: delayStartTime, accumulatedSec: accumulatedDelaySec });
  const doExport = () => exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, getDelayExportState());
  const doCopyText = () => { setCopyText(exportGameText(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, getDelayExportState())); setShowCopy(true); };

  if (showSummary) {
    return <SummaryScreen config={config} events={events} baseScore={baseScore} baseRunsLog={baseRunsLog} endTime={finalEndTime} estimateHistory={estimateHistory} onNewGame={onNewGame} />;
  }

  const inWarmup = est?.currentlyInWarmup ?? false;
  const lastCompleted = est?.lastCompletedInning ?? 0;
  const runDiff = Math.abs(score.home - score.away);

  // Guarantee strict percentage sums to exactly 100% for the UI elements
  const awayWinPctRaw = Math.round((est?.probs?.awayWin || 0) * 100);
  const tiePctRaw = allowTies ? Math.round((est?.probs?.tie || 0) * 100) : 0;
  const homeWinPctAdj = Math.max(0, 100 - awayWinPctRaw - tiePctRaw);

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, maxWidth: "440px", margin: "0 auto", paddingBottom: "48px" }}>
      <link rel="stylesheet" href={FONT} />

      {showCopy   && <CopyModal text={copyText} onClose={() => setShowCopy(false)} />}
      {showImport && (
        <ImportModal
          hasActiveGame={events.length > 0}
          onImport={handleImport}
          onCancel={() => setShowImport(false)}
          onExportFirst={doExport}
        />
      )}

      {/* ── Header ── */}
      <div style={{ background: C.card, borderBottom: `2px solid ${C.text}`, padding: "16px 16px 12px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "2px", color: C.muted, fontFamily: MONO, textTransform: "uppercase", fontWeight: "bold" }}>
              {totalInnings} INN · {mercyAfter ? `M${mercyRuns}/${mercyAfter}` : "NO MERCY"}
            </div>
            <div style={{ fontSize: "28px", fontFamily: DISPLAY, marginTop: "4px", lineHeight: 1 }}>
              {away} <span style={{ color: C.faint, fontSize: "20px" }}>@</span> {home}
            </div>
          </div>
          <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", justifyContent: "flex-end", maxWidth: "160px" }}>
            {events.length > 0 && <Btn small variant="outline" onClick={handleUndo} disabled={delayActive}>↩ Undo</Btn>}
            <Btn small variant="ghost" onClick={doExport}>⬇</Btn>
            <Btn small variant="ghost" onClick={doCopyText}>📋</Btn>
            <Btn small variant="ghost" onClick={() => setShowImport(true)}>⬆</Btn>
            <Btn small variant="ghost" onClick={onNewGame}>Quit</Btn>
          </div>
        </div>

        {/* Score display board matrix */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 32px 1fr", alignItems: "center", margin: "16px 0 10px" }}>
          {[["away", away], ["home", home]].map(([side, name], i) => (
            <div key={side} style={{ textAlign: i === 0 ? "left" : "right" }}>
              <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>{name.toUpperCase()}</div>
              <div style={{ fontSize: "64px", fontFamily: DISPLAY, lineHeight: 1, color: score[side] > score[side === "away" ? "home" : "away"] ? C.accent : C.text }}>{score[side]}</div>
            </div>
          ))}
          <div style={{ textAlign: "center", color: C.faint, fontFamily: DISPLAY, fontSize: "24px" }}>–</div>
        </div>
      </div>

      {/* Flag Banners */}
      {est?.mercyEligible && <div style={{ background: C.redDim, borderBottom: `2px solid ${C.red}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.red, fontWeight: "bold" }}>⚠ MERCY ELIGIBLE — {score.home > score.away ? home : away} +{runDiff}</div>}
      {inWarmup && !delayActive && <div style={{ background: C.blueDim, borderBottom: `2px solid ${C.blue}`, padding: "10px 16px", fontSize: "12px", fontFamily: MONO, color: C.blue, fontWeight: "bold" }}>⏸ WARMUP — Stats paused, tracking duration</div>}

      <div style={{ padding: "16px 16px 0" }}>

        {/* Weather Delay Button Control */}
        <div style={{ marginBottom: "16px" }}>
          <Btn full variant={delayActive ? "highlight" : "outline"} onClick={handleToggleDelay}>
            {delayActive ? `⏸ WEATHER DELAY ACTIVE — ${formatDur(totalActiveDelay)}` : "⛅ WEATHER DELAY TOGGLE"}
          </Btn>
        </div>

        {/* Game Over Prompt Panel */}
        {gameOverPrompt && !delayActive && (
          <div style={{ background: C.card, border: `2px solid ${C.yellow}`, padding: "16px", marginBottom: "16px" }}>
            <Label>GAME OVER?</Label>
            <div style={{ fontSize: "14px", color: C.text, fontFamily: MONO, marginBottom: "12px" }}>The game condition has been reached. Log end time to finalize.</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: "8px", alignItems: "end" }}>
              <div><Label>END TIME</Label><Inp value={endTimeInput} onChange={v => { setEndTimeInput(v); setIsTypingTime(true); }} placeholder="H:MM:SS" /></div>
              <Btn onClick={handleEndGame} variant="highlight">END GAME</Btn>
              <Btn onClick={() => setGameOverPrompt(false)} variant="ghost" small>MORE INN</Btn>
            </div>
          </div>
        )}

        {/* Active Inter-Half Controls vs Logging Matrix */}
        {!gameOverPrompt && (
          inActiveInning ? (
            <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px", position: "relative" }}>
               <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                <div>
                  <div style={{ fontSize: "28px", fontFamily: DISPLAY, color: C.text, lineHeight: 1 }}>{activeHalf === 'top' ? 'TOP' : 'BOT'} {activeInningNum}</div>
                  <div style={{ fontSize: "12px", fontFamily: MONO, color: C.accent, marginTop: "4px", fontWeight: "bold" }}>▶ {battingTeam === 'away' ? away : home} BATTING</div>
                </div>
                <div>
                   <Label style={{ textAlign: "right", marginBottom: "4px" }}>OUTS</Label>
                   <div style={{ display: "flex", gap: "6px" }}>
                      {[1,2,3].map(i => (
                          <div key={i} style={{ width: "16px", height: "16px", borderRadius: "50%", border: `2px solid ${C.text}`, background: currentOuts >= i ? C.text : "transparent", opacity: delayActive ? 0.3 : 1 }} />
                      ))}
                   </div>
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px" }}>
                 <div style={{ border: `1px dashed ${C.borderBright}`, padding: "12px", textAlign: "center", background: C.bg }}>
                    <Label>RUN FOR {battingTeam === 'away' ? away.toUpperCase() : home.toUpperCase()}</Label>
                    <Btn full variant="outline" onClick={() => handleAddRun(1)} disabled={delayActive}>+1 Run</Btn>
                 </div>
                 <div style={{ border: `1px dashed ${C.borderBright}`, padding: "12px", textAlign: "center", background: C.bg }}>
                    <Label>OUT FOR {fieldingTeam === 'away' ? away.toUpperCase() : home.toUpperCase()}</Label>
                    <div style={{ display: "flex", gap: "6px" }}>
                      {currentOuts < 3 && <Btn full variant="outline" onClick={() => handleAddOut(1)} disabled={delayActive}>+1</Btn>}
                      {currentOuts < 2 && <Btn full variant="outline" onClick={() => handleAddOut(2)} disabled={delayActive}>+2</Btn>}
                      {currentOuts < 1 && <Btn full variant="outline" onClick={() => handleAddOut(3)} disabled={delayActive}>+3</Btn>}
                    </div>
                 </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "8px", alignItems: "end" }}>
                <div><Label>EVENT TIME (H:MM:SS)</Label><Inp disabled={delayActive} value={entryTime} onChange={v => { setEntryTime(v); setIsTypingTime(true); }} /></div>
                <Btn variant="ghost" disabled={delayActive} onClick={() => { setIsTypingTime(false); setEntryTime(nowTime()); }}>LIVE</Btn>
              </div>
            </div>
          ) : (
            <div style={{ background: C.bg, border: `2px dashed ${C.text}`, padding: "16px", marginBottom: "16px", textAlign: "center" }}>
              <Label>NEXT PHASE TO LOG</Label>
              <div style={{ fontSize: "24px", fontFamily: DISPLAY, color: C.accent, marginBottom: "4px" }}>{phaseLabel(nextPhaseFallback.inning, nextPhaseFallback.phase)}</div>
              <div style={{ fontSize: "12px", color: C.muted, fontFamily: MONO, marginBottom: "16px" }}>{phaseDesc(nextPhaseFallback.phase, away, home)}</div>
              
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: "8px", alignItems: "end" }}>
                <div style={{ textAlign: "left" }}><Label>TIME</Label><Inp disabled={delayActive} value={entryTime} onChange={v => { setEntryTime(v); setIsTypingTime(true); }} /></div>
                <Btn variant="ghost" disabled={delayActive} onClick={() => { setIsTypingTime(false); const t = nowTime(); setEntryTime(t); }}>LIVE</Btn>
                <Btn variant="primary" disabled={delayActive} onClick={handleLogNextPhase}>LOG ↵</Btn>
              </div>
            </div>
          )
        )}

        {/* Estimate tracking metrics card */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          {!est?.canEstimate ? (
            <div style={{ padding: "8px 0", textAlign: "center" }}>
              <div style={{ fontSize: "14px", color: C.muted, fontFamily: MONO, fontWeight: "bold" }}>GATHERING PACE DATA...</div>
              <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, marginTop: "6px" }}>Log Pre-1 Warmup → Top 1 → Mid-1 Warmup</div>
            </div>
          ) : (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <Label>ESTIMATED END</Label>
                  <div style={{ fontSize: "48px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1 }}>{formatTime(est.estimatedEnd)}</div>
                  {est.inExtra && <div style={{ fontSize: "11px", color: C.orange, fontFamily: MONO, marginTop: "6px", fontWeight: "bold" }}>EXTRA INNINGS EXPECTED</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <ConfChip confidence={est.confidence} />
                </div>
              </div>
              <Divider label="Pace Stats" />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "6px" }}>
                <StatBox label="½-Inn" value={formatDur(est.avgHalf)}   sub={est.measuredHalf   ? `${est.halfDurs.length}×`   : "default"} dim={inWarmup || delayActive} />
                <StatBox label="Warmup" value={formatDur(est.avgWarmup)} sub={est.measuredWarmup ? `${est.warmupDurs.length}×` : "default"} dim={inWarmup || delayActive} />
                <StatBox label="½ Left" value={est.remHalf}   dim={inWarmup || delayActive} />
                <StatBox label="Wrm Left"   value={est.remWarmup} dim={inWarmup || delayActive} />
              </div>
            </>
          )}
        </div>

        {/* ── Predicted Winner (Monte Carlo Simulation Results Display) ── */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>PREDICTED WINNER</Label>
          {!est?.probs ? (
            <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, textAlign: "center", padding: "8px 0" }}>
              Need at least 2 logged half-innings to simulate outcomes.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              <div style={{ display: "grid", gridTemplateColumns: allowTies ? "1fr 1fr 1fr" : "1fr 1fr", gap: "10px" }}>
                <StatBox label={`${away.toUpperCase()} WIN`} value={`${awayWinPctRaw}%`} color={C.blue} />
                <StatBox label={`${home.toUpperCase()} WIN`} value={`${homeWinPctAdj}%`} color={C.accent} />
                {allowTies && <StatBox label="TIE" value={`${tiePctRaw}%`} color={C.muted} />}
              </div>
            </div>
          )}
        </div>

        {/* ── Outcome Probabilities ── */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
          <Label>OUTCOME PROBABILITIES</Label>
          {!est?.probs ? (
            <div style={{ fontSize: "11px", color: C.faint, fontFamily: MONO, textAlign: "center", padding: "8px 0" }}>
              Need at least 2 logged half-innings to simulate outcomes.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", fontFamily: MONO, fontSize: "12px", background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px" }}>
                {mercyAfter && <div>⚡ Mercy: <strong style={{color: C.accent}}>{Math.round(est.probs.mercy * 100)}%</strong></div>}
                <div>🔝 Top {totalInnings} End: <strong>{Math.round(est.probs.endTop * 100)}%</strong></div>
                <div>🔚 Bot {totalInnings} End: <strong>{Math.round(est.probs.endBot * 100)}%</strong></div>
                <div>➕ Extras: <strong style={{color: C.orange}}>{Math.round(est.probs.extra * 100)}%</strong></div>
              </div>
            </div>
          )}
        </div>

        {/* Linescore panel layout */}
        <div style={{ marginBottom: "16px" }}>
          <Linescore away={away} home={home} score={score} runsLog={combinedRunsLog} totalInnings={totalInnings} lastCompletedInning={lastCompleted} currentPhase={lastPhase?.phase} currentInning={activeInningNum || lastPhase?.inning} />
        </div>

        {/* Game log terminal output panel */}
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "12px", marginBottom: "12px" }}>
          <Label>GAME LOG</Label>
          <div ref={logRef} style={{ background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px", maxHeight: "160px", overflowY: "auto", fontFamily: MONO, fontSize: "12px", lineHeight: "1.8" }}>
            {gameLog.length === 0 ? <span style={{ color: C.faint }}>No events logged yet.</span>
              : gameLog.map((e, i) => <div key={i} style={{ color: i === gameLog.length - 1 ? C.text : C.muted }}>{e.msg}</div>)}
          </div>
        </div>

        {/* Manual Terminal State Closer Trigger */}
        {events.length > 0 && !gameOverPrompt && !delayActive && (
          <div style={{ marginTop: "16px", textAlign: "center" }}>
            <button onClick={() => { setGameOverPrompt(true); setEndTimeInput(nowTime()); }} style={{ background: "none", border: "none", color: C.faint, fontSize: "12px", fontFamily: MONO, cursor: "pointer", textDecoration: "underline", fontWeight: "bold" }}>End game manually</button>
          </div>
        )}

      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("setup");
  const [config,  setConfig]  = useState(null);
  const [initState, setInitState] = useState(null);
  const [key, setKey] = useState(0);

  const handleStart = cfg => { 
      setConfig(cfg); 
      if (cfg.lateStart) {
          setScreen("latestart");
      } else {
          setInitState(null); 
          setKey(k => k + 1); 
          setScreen("game"); 
      }
  };
  
  const handleLateStartSubmit = data => {
      setInitState(data);
      setKey(k => k + 1);
      setScreen("game");
  };

  const handleImport = data => {
    setConfig(data.config);
    setInitState(data);
    setKey(k => k + 1);
    setScreen("game");
  };

  if (screen === "latestart" && config) {
      return <LateStartScreen config={config} onComplete={handleLateStartSubmit} onCancel={() => setScreen("setup")} />;
  }

  if (screen === "game" && config) {
    return <GameTracker key={key} config={config} onNewGame={() => setScreen("setup")} initialState={initState} />;
  }
  return <SetupScreen onStart={handleStart} onImport={handleImport} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
