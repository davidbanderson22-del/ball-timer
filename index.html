    <script type="text/babel">
/** @jsx React.createElement */
/** @jsxFrag React.Fragment */
const { useState, useCallback, useEffect, useRef, useMemo } = React;

const FONT = "https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&display=swap";

const C = {
  bg: "#f4f1ea", card: "#eae4d3", border: "#d0c8b6", borderBright: "#b8af9b",
  text: "#2c2c2c", muted: "#5a5a5a", faint: "#8a8a8a",
  green: "#4a6b4a", greenDim: "#d4dbd4",
  red: "#8b3a3a", redDim: "#ebd6d6",
  yellow: "#b89030", yellowDim: "#e8dfc8",
  blue: "#4a6b8c", blueDim: "#d2dce6",
  accent: "#8b3a3a", accentDim: "#e0caca",
  orange: "#b3592d",
};
const DISPLAY = "'Special Elite', cursive";
const MONO    = "'Courier Prime', monospace";
const SERIF   = "'Courier Prime', monospace";

const LEAGUES = {
  hs:       { label: "High School",         halfInning: 10,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  college:  { label: "College / NCAA",      halfInning: 11,  warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
  rec:      { label: "Adult Rec / Amateur", halfInning: 13,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
  mlb:      { label: "MLB / Pro",           halfInning: 10,  warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
  softball: { label: "Softball",            halfInning: 9,   warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
  custom:   { label: "Custom",              halfInning: 11,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
};

const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];
const isWarmup = p => p === EV.START || p === EV.MID;

function phaseLabel(inning, phase) {
  const m = { start: `Pre-${inning} Warmup`, top: `Top ${inning}`, mid: `Mid-${inning} Warmup`, bot: `Bot ${inning}` };
  return m[phase] ?? "";
}
function phaseDesc(phase, awayName = "Away", homeName = "Home") {
  const m = { start: "Between-inning warmup begins", top: `${awayName} steps up to bat`, mid: "Mid-inning warmup begins", bot: `${homeName} steps up to bat` };
  return m[phase] ?? "";
}

function parseTime(str) {
  if (!str) return null;
  const parts = str.trim().split(":").map(Number);
  let h = 0, m = 0, s = 0;
  if (parts.length === 3) { [h, m, s] = parts; } 
  else if (parts.length === 2) { [h, m] = parts; }
  else return null;
  if (isNaN(h) || isNaN(m) || isNaN(s)) return null;
  return h * 3600 + m * 60 + s;
}
function formatTime(sec) {
  if (sec == null || isNaN(sec)) return "—";
  const t = ((Math.round(sec)) % 86400 + 86400) % 86400;
  const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
  return `${h % 12 === 0 ? 12 : h % 12}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
}
function formatDur(sec) {
  if (sec == null || isNaN(sec)) return "—";
  const t = Math.round(sec);
  const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
  return h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
}
function nowTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function sortEvents(arr) {
  return [...arr].sort((a, b) => {
    if (a.time !== b.time) return a.time - b.time;
    return (a.id || 0) - (b.id || 0);
  });
}

function getSafeTime(inputTime, allEvents) {
  let t = parseTime(inputTime) ?? parseTime(nowTime());
  if (allEvents && allEvents.length > 0) {
      const sorted = sortEvents(allEvents);
      const lastTime = sorted[sorted.length - 1].time;
      if (t < lastTime) return lastTime;
  }
  return t;
}

function getNextPhase(phaseEvents) {
  if (!phaseEvents.length) return { inning: 1, phase: EV.START };
  const sorted = sortEvents(phaseEvents);
  const last = sorted[sorted.length - 1];
  const idx = PHASE_ORDER.indexOf(last.phase);
  if (idx < 3) {
    return { inning: last.inning, phase: PHASE_ORDER[idx + 1] };
  }
  return { inning: last.inning + 1, phase: EV.START };
}

function isGamePotentiallyOver(phaseEvents, score, effTotalInnings, mercyAfter, mercyRuns, allowTies, tieInningLimit) {
  if (!phaseEvents.length) return false;
  const sorted = sortEvents(phaseEvents);
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const diff = Math.abs(score.home - score.away);

  if (mercyAfter && mercyRuns && diff >= mercyRuns) {
    if (score.home > score.away) {
        if (last.inning >= mercyAfter && (last.phase === EV.MID || last.phase === EV.BOT)) return true;
        if (lastCompleted >= mercyAfter) return true;
    } else {
        if (lastCompleted >= mercyAfter) return true; 
    }
  }

  // Regulation end checks
  if (last.inning >= effTotalInnings) {
      if (last.phase === EV.MID && score.home > score.away) return true; 
      if (lastCompleted >= effTotalInnings && score.home !== score.away) return true; 
  }
  
  if (allowTies && lastCompleted >= tieInningLimit && score.home === score.away) return true;
  
  return false;
}

function poissonSample(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-Math.min(lambda, 20));
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning, halfDurCount, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase }) {
  if (halfDurCount < 2) return null;
  const prior = 0.8, pw = 2;
  const awayRuns   = runsLog.filter(r => r.team === "away").reduce((s, r) => s + r.runs, 0);
  const homeRuns   = runsLog.filter(r => r.team === "home").reduce((s, r) => s + r.runs, 0);
  const awayHalves = Math.max(1, runsLog.filter(r => r.half === "top").length);
  const homeHalves = Math.max(1, runsLog.filter(r => r.half === "bot").length);
  const awayRate   = (awayRuns + pw * prior) / (awayHalves + pw);
  const homeRate   = (homeRuns + pw * prior) / (homeHalves + pw);
  
  const N = 4000;
  let mercy = 0, endTop = 0, endBot = 0, extra = 0;
  let awayWin = 0, homeWin = 0, tieCount = 0;

  const baseInning = activeInningNum || (lastPhase ? lastPhase.inning : 1);
  const isTop = activeHalf === 'top';
  const isBot = activeHalf === 'bot';

  for (let i = 0; i < N; i++) {
    let a = score.away, h = score.home;
    let currentInn = Math.max(lastCompletedInning + 1, baseInning);

    if (isTop) {
        a += poissonSample(awayRate * ((3 - (currentOuts || 0)) / 3));
        h += poissonSample(homeRate);
        currentInn++;
    } else if (isBot) {
        h += poissonSample(homeRate * ((3 - (currentOuts || 0)) / 3));
        currentInn++;
    } else if (lastPhase && lastPhase.phase === EV.MID) {
        h += poissonSample(homeRate);
        currentInn++;
    }

    for (let j = currentInn; j <= totalInnings; j++) {
        a += poissonSample(awayRate);
        h += poissonSample(homeRate);
    }
    
    const diff = Math.abs(a - h);
    
    if (mercyAfter && mercyRuns && diff >= mercyRuns && (lastCompletedInning >= mercyAfter - 1 || totalInnings >= mercyAfter)) {
      mercy++;
    } else if (a === h) {
      extra++;
    } else if (h > a) {
      endTop++; 
    } else {
      endBot++; 
    }

    let currentInningResolution = Math.max(totalInnings, lastCompletedInning);
    while (a === h) {
      if (allowTies && currentInningResolution >= tieInningLimit) {
        tieCount++;
        break;
      }
      a += poissonSample(awayRate);
      h += poissonSample(homeRate);
      currentInningResolution++;
      if (currentInningResolution > 50) { tieCount++; break; }
    }

    if (a > h) awayWin++;
    else if (h > a) homeWin++;
  }
  return {
    mercy:       clamp(mercy / N, 0, 1),
    endTop:      clamp(endTop / N, 0, 1),
    endBot:      clamp(endBot / N, 0, 1),
    extra:       clamp(extra / N, 0, 1),
    awayWin:     clamp(awayWin / N, 0, 1),
    homeWin:     clamp(homeWin / N, 0, 1),
    tie:         clamp(tieCount / N, 0, 1),
    awayRate, homeRate,
  };
}

function computeEstimate({ phaseEvents, allEvents, score, totalInnings, mercyAfter, mercyRuns, fallbackHalf, fallbackWarmup, runsLog, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase, accumulatedDelay }) {
  if (!phaseEvents.length) return null;
  const sorted = sortEvents(phaseEvents);
  const halfDurs = [], warmupDurs = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const c = sorted[i], n = sorted[i + 1];
    const d = n.time - c.time;
    if (d < 0 || d > 5400) continue; 
    if (c.phase === EV.START && n.phase === EV.TOP  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.MID  && n.phase === EV.BOT  && n.inning === c.inning)      warmupDurs.push(d);
    if (c.phase === EV.TOP  && n.phase === EV.MID  && n.inning === c.inning)      halfDurs.push(d);
    if (c.phase === EV.BOT  && n.phase === EV.START && n.inning === c.inning + 1) halfDurs.push(d);
  }
  const measuredHalf   = avg(halfDurs);
  const measuredWarmup = avg(warmupDurs);
  
  const avgHalf   = (measuredHalf ?? (fallbackHalf * 60)) || 600; 
  const avgWarmup = (measuredWarmup ?? (fallbackWarmup * 60)) || 180;
  
  const minS = Math.min(halfDurs.length, warmupDurs.length);
  const confidence = minS === 0 ? null : minS === 1 ? "low" : minS <= 2 ? "fair" : minS <= 4 ? "good" : "strong";
  const canEstimate = warmupDurs.length >= 1;
  const last = sorted[sorted.length - 1];
  const lastCompleted = sorted.filter(e => e.phase === EV.BOT).reduce((mx, e) => Math.max(mx, e.inning), 0);
  const runDiff = Math.abs(score.home - score.away);
  
  let mercyEligible = false;
  if (mercyAfter && mercyRuns && runDiff >= mercyRuns) {
      if (score.home > score.away) {
          if (last.inning >= mercyAfter && (last.phase === EV.MID || last.phase === EV.BOT)) mercyEligible = true;
          if (lastCompleted >= mercyAfter) mercyEligible = true;
      } else {
          if (lastCompleted >= mercyAfter) mercyEligible = true;
      }
  }
  
  const homeLeading = score.home > score.away;
  const botFinalNeeded = !homeLeading;
  const inExtra = lastCompleted >= totalInnings;
  let remHalf = 0, remWarmup = 0;
  const effEnd = inExtra ? lastCompleted + 1 : totalInnings;
  for (let inn = 1; inn <= effEnd; inn++) {
    for (const ph of PHASE_ORDER) {
      if (inn === totalInnings && ph === EV.BOT && !botFinalNeeded && !inExtra) continue;
      if (inn === 1 && ph === EV.START) continue;
      if (sorted.some(e => e.inning === inn && e.phase === ph)) continue;
      if (ph === EV.TOP || ph === EV.BOT) remHalf++; else remWarmup++;
    }
  }
  if (inExtra) { remHalf += 2; remWarmup += 2; }
  
  const currentlyInWarmup = isWarmup(last.phase);
  const latestEvent = allEvents && allEvents.length ? sortEvents(allEvents)[allEvents.length - 1] : last;
  const outPace = (avgHalf || 0) / 3;
  const activeTimeRem = (!currentlyInWarmup && activeHalf) ? Math.max(0, (3 - (currentOuts || 0)) * outPace) : (currentlyInWarmup ? (avgWarmup || 0) : 0);
  
  const estimatedEnd = Number((latestEvent?.time || 0) + (activeTimeRem || 0) + (remHalf * (avgHalf || 0)) + (remWarmup * (avgWarmup || 0)) + (accumulatedDelay || 0)) || 0;
  
  const probs = computeProbs({ score, runsLog, totalInnings, mercyAfter, mercyRuns, lastCompletedInning: lastCompleted, halfDurCount: halfDurs.length, allowTies, tieInningLimit, activeHalf, activeInningNum, currentOuts, lastPhase });
  return {
    avgHalf, avgWarmup, measuredHalf, measuredWarmup,
    halfDurs, warmupDurs, confidence, canEstimate,
    remHalf, remWarmup, estimatedEnd, last,
    mercyEligible, botFinalNeeded, inExtra,
    lastCompletedInning: lastCompleted, currentlyInWarmup,
    probs, runDiff,
  };
}

const SAVE_VERSION = 2;

function exportGame(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState, rosterData) {
  const data = {
    v: SAVE_VERSION,
    savedAt: new Date().toISOString(),
    config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState, rosterData
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const ts   = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "-");
  a.href     = url;
  a.download = `game_${config.away}_vs_${config.home}_${ts}.json`.replace(/\s+/g, "_");
  a.click();
  URL.revokeObjectURL(url);
}

function exportGameText(config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState, rosterData) {
  const lines = [
    `GAME: ${config.away} @ ${config.home}`,
    `SAVED: ${new Date().toLocaleString()}`,
    `---`,
    JSON.stringify({ v: SAVE_VERSION, config, events, baseScore, baseRunsLog, gameLog, estimateHistory, weatherDelayState, rosterData }),
  ];
  return lines.join("\n");
}

function parseImport(text) {
  try {
    const data = JSON.parse(text.trim());
    if (data.v && data.config && data.events) return { ok: true, data };
    return { ok: false, error: "Unrecognized format" };
  } catch {
    const lines = text.trim().split("\n");
    for (let i = lines.length - 1; i >= 0; i--) {
      try {
        const data = JSON.parse(lines[i]);
        if (data.v && data.config && data.events) return { ok: true, data };
      } catch {}
    }
    return { ok: false, error: "Could not parse game data" };
  }
}

// ── Micro components ──────────────────────────────────────────────────────────
function Label({ children, style: s }) {
  return <div style={{ fontSize: "11px", letterSpacing: "1px", textTransform: "uppercase", color: C.muted, fontFamily: MONO, marginBottom: "5px", fontWeight: "bold", ...s }}>{children}</div>;
}
function Inp({ value, onChange, placeholder, type = "text", style: s, autoFocus, disabled }) {
  return (
    <input disabled={disabled} autoFocus={autoFocus} type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: "0px", color: disabled ? C.muted : C.text, padding: "9px 11px", fontSize: "14px", fontFamily: MONO, width: "100%", boxSizing: "border-box", outline: "none", WebkitAppearance: "none", opacity: disabled ? 0.6 : 1, ...s }} />
  );
}
function Sel({ value, onChange, children, style: s }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: "0px", color: C.text, padding: "9px 11px", fontSize: "14px", fontFamily: MONO, width: "100%", boxSizing: "border-box", outline: "none", WebkitAppearance: "none", ...s }}>
      {children}
    </select>
  );
}
function Btn({ children, onClick, variant = "primary", small, full, disabled, style: s }) {
  const vs = {
    primary:   { background: C.text, color: C.bg, border: `2px solid ${C.text}`, boxShadow: `2px 2px 0px ${C.text}` },
    outline:   { background: "transparent", color: C.text, border: `2px solid ${C.text}`, boxShadow: `2px 2px 0px ${C.text}` },
    ghost:     { background: "transparent", color: C.muted, border: `1px dashed ${C.borderBright}` },
    danger:    { background: C.red, color: C.bg, border: `2px solid ${C.red}`, boxShadow: `2px 2px 0px ${C.red}` },
    success:   { background: C.green, color: C.bg, border: `2px solid ${C.green}`, boxShadow: `2px 2px 0px ${C.green}` },
    highlight: { background: C.yellow, color: C.bg, border: `2px solid ${C.yellow}`, boxShadow: `2px 2px 0px ${C.yellow}` },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{

function Linescore({ away, home, score, runsLog, totalInnings, lastCompletedInning, currentPhase, currentInning }) {
  const maxCols = Math.max(totalInnings, currentInning || lastCompletedInning || 1);
  const cols = Array.from({ length: maxCols }, (_, i) => i + 1);
  const getRuns = (team, inning) => {
    const half = team === "away" ? "top" : "bot";
    const entries = runsLog.filter(r => r.team === team && r.inning === inning && r.half === half);
    if (entries.length) return String(entries.reduce((s, r) => s + r.runs, 0));

    let played = false;
    if (currentPhase !== null && currentPhase !== undefined) {
        if (inning < (currentInning || 1)) {
           played = true;
        } else if (inning === currentInning) {
           if (team === "away" && (currentPhase === EV.TOP || currentPhase === EV.MID || currentPhase === EV.BOT)) played = true;
           if (team === "home" && currentPhase === EV.BOT) played = true;
        }
    } else {
        played = team === "away" ? inning <= Math.ceil((lastCompletedInning || 0) + 0.5) : inning <= (lastCompletedInning || 0);
    }
    return played ? "0" : "·";
  };
  const cell = val => ({ width: "26px", minWidth: "26px", textAlign: "center", fontSize: "13px", fontFamily: MONO, padding: "5px 2px", color: val === "·" ? C.faint : C.text, borderRight: `1px solid ${C.borderBright}`, borderBottom: `1px solid ${C.borderBright}` });
  return (
    <div style={{ overflowX: "auto", border: `2px solid ${C.text}`, background: C.bg }}>
      <table style={{ borderCollapse: "collapse", width: "100%" }}>
        <thead>
          <tr>
            <td style={{ width: "64px", fontSize: "10px", fontFamily: MONO, color: C.muted, padding: "3px 4px", borderBottom: `2px solid ${C.text}` }} />
            {cols.map(i => <td key={i} style={{ width: "26px", minWidth: "26px", textAlign: "center", fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "3px 2px", borderRight: `1px solid ${C.borderBright}`, borderBottom: `2px solid ${C.text}` }}>{i}{i > totalInnings ? "x" : ""}</td>)}
            <td style={{ width: "28px", textAlign: "center", fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "3px 4px", borderBottom: `2px solid ${C.text}`, borderLeft: `2px solid ${C.text}` }}>R</td>
          </tr>
        </thead>
        <tbody>
          {[["away", away], ["home", home]].map(([side, name]) => (
            <tr key={side}>
              <td style={{ fontSize: "11px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "5px 4px", maxWidth: "64px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", borderBottom: `1px solid ${C.borderBright}`, borderRight: `2px solid ${C.text}` }}>{name}</td>
              {cols.map(inn => { const v = getRuns(side, inn); return <td key={inn} style={cell(v)}>{v}</td>; })}
              <td style={{ width: "28px", textAlign: "center", fontSize: "14px", fontWeight: "bold", fontFamily: MONO, color: C.text, padding: "5px 4px", borderBottom: `1px solid ${C.borderBright}`, borderLeft: `2px solid ${C.text}` }}>{score[side]}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function AccuracyGraph({ estimateHistory, endTime, config }) {
  const [xMode, setXMode] = useState("inning");
  const [yMode, setYMode] = useState("signed");
  const [excludeEarly, setExcludeEarly] = useState(false);
  const svgRef = useRef(null);

  const points = useMemo(() => {
    if (!endTime || !estimateHistory.length) return [];
    let filteredHistory = estimateHistory.filter(h => h.estimate != null && !isNaN(h.estimate));
    
    if (excludeEarly) {
        filteredHistory = filteredHistory.filter(h => h.inning > 1);
    }

    let phaseCounts = {};

    return filteredHistory.map(h => {
      let xVal;
      if (xMode === "inning") {
          const phaseKey = `${h.inning}-${h.phase}`;
          phaseCounts[phaseKey] = (phaseCounts[phaseKey] || 0) + 1;
          
          const baseMap = { [EV.START]: 0, [EV.TOP]: 0.1, [EV.MID]: 0.5, [EV.BOT]: 0.6 };
          const maxMap = { [EV.START]: 0.05, [EV.TOP]: 0.45, [EV.MID]: 0.55, [EV.BOT]: 0.95 };
          const offset = baseMap[h.phase] ?? 0;
          const maxO = maxMap[h.phase] ?? 0.95;
          const staggered = offset + ((phaseCounts[phaseKey] - 1) * 0.05);
          
          xVal = h.inning + Math.min(staggered, maxO);
      } else {
          xVal = h.wallTime;
      }

      return {
        ...h,
        error: yMode === "signed" ? Math.round((h.estimate - endTime) / 60) : Math.round(Math.abs(h.estimate - endTime) / 60),
        xVal
      };
    });
  }, [estimateHistory, endTime, xMode, yMode, excludeEarly]);

  const validPoints = points.filter(p => !isNaN(p.xVal) && !isNaN(p.error));
  if (validPoints.length === 0) return null;

  const W = 320, H = 180, PL = 44, PR = 12, PT = 16, PB = 28;
  const IW = W - PL - PR, IH = H - PT - PB;
  const xs = validPoints.map(p => p.xVal);
  const ys = validPoints.map(p => p.error);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yAbsMax = Math.max(Math.abs(Math.min(...ys)), Math.abs(Math.max(...ys)), 5);
  const yMin = yMode === "signed" ? -yAbsMax : 0;
  const yMax = yAbsMax;

  const toSVG = (xv, yv) => ({
    x: PL + ((xv - xMin) / (xMax - xMin || 1)) * IW,
    y: PT + (1 - (yv - yMin) / (yMax - yMin || 1)) * IH,
  });

  const zeroY = PT + (1 - (0 - yMin) / (yMax - yMin || 1)) * IH;
  const pathD = validPoints.map((p, i) => { const { x, y } = toSVG(p.xVal, p.error); return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`; }).join(" ");

  const yTicks = [];
  const step = Math.ceil(yAbsMax / 3);
  for (let v = Math.ceil(yMin / step) * step; v <= yMax; v += step) yTicks.push(v);
  
  const maxInn = Math.max(config.totalInnings, Math.ceil(xMax || 1));
  const xTicks = xMode === "inning"
    ? Array.from({ length: maxInn }, (_, i) => i + 1).filter(v => v >= Math.floor(xMin) && v <= Math.ceil(xMax))
    : validPoints.map(p => p.xVal);

  return (
    <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "14px", marginBottom: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
        <Label style={{ marginBottom: 0 }}>ESTIMATE ACCURACY</Label>
        <div style={{ display: "flex", gap: "6px" }}>
          <button onClick={() => setExcludeEarly(!excludeEarly)} style={{ background: excludeEarly ? C.text : "transparent", border: `1px solid ${C.text}`, color: excludeEarly ? C.bg : C.text, padding: "2px 6px", fontSize: "10px", fontFamily: MONO, fontWeight: "bold", cursor: "pointer" }}>
            {excludeEarly ? "SHOW ALL" : "HIDE EARLY"}
          </button>
          {[["signed", "±"], ["absolute", "|e|"]].map(([v, l]) => (
            <button key={v} onClick={() => setYMode(v)} style={{ background: yMode === v ? C.text : "transparent", border: `1px solid ${C.text}`, color: yMode === v ? C.bg : C.text, padding: "2px 6px", fontSize: "10px", fontFamily: MONO, fontWeight: "bold", cursor: "pointer" }}>{l}</button>
          ))}
          {[["inning", "INN"], ["time", "TIME"]].map(([v, l]) => (
            <button key={v} onClick={() => setXMode(v)} style={{ background: xMode === v ? C.blue : "transparent", border: `1px solid ${xMode === v ? C.blue : C.text}`, color: xMode === v ? C.bg : C.text, padding: "2px 6px", fontSize: "10px", fontFamily: MONO, fontWeight: "bold", cursor: "pointer" }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ overflowX: "auto", background: C.bg, border: `1px solid ${C.borderBright}`, padding: "10px 0" }}>
        <svg ref={svgRef} width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
          {yMode === "signed" && <line x1={PL} y1={zeroY} x2={W - PR} y2={zeroY} stroke={C.borderBright} strokeWidth="2" strokeDasharray="4,4" />}
          {yTicks.map(v => {
            const y = PT + (1 - (v - yMin) / (yMax - yMin || 1)) * IH;
            return <line key={v} x1={PL} y1={y} x2={W - PR} y2={y} stroke={C.borderBright} strokeWidth="1" strokeDasharray="2,2" />;
          })}
          <line x1={PL} y1={PT} x2={PL} y2={PT + IH} stroke={C.text} strokeWidth="2" />
          <line x1={PL} y1={PT + IH} x2={W - PR} y2={PT + IH} stroke={C.text} strokeWidth="2" />
          {yTicks.map(v => {
            const y = PT + (1 - (v - yMin) / (yMax - yMin || 1)) * IH;
            return <text key={v} x={PL - 6} y={y + 4} textAnchor="end" fontSize="10" fill={C.text} fontFamily={MONO} fontWeight="bold">{v > 0 ? `+${v}` : v}m</text>;
          })}
          {xMode === "inning" ? xTicks.map(v => {
            const { x } = toSVG(v, 0);
            return <text key={v} x={x} y={H - 6} textAnchor="middle" fontSize="10" fill={C.text} fontFamily={MONO} fontWeight="bold">{v}</text>;
          }) : validPoints.map((p, i) => {
            if (i % Math.max(1, Math.floor(validPoints.length / 5)) !== 0) return null;
            const { x } = toSVG(p.xVal, 0);
            return <text key={i} x={x} y={H - 6} textAnchor="middle" fontSize="9" fill={C.muted} fontFamily={MONO}>{formatTime(p.wallTime)}</text>;
          })}
          {validPoints.length > 1 && <path d={`${pathD} L${toSVG(validPoints[validPoints.length - 1].xVal, yMin).x},${toSVG(validPoints[validPoints.length - 1].xVal, yMin).y} L${toSVG(validPoints[0].xVal, yMin).x},${toSVG(validPoints[0].xVal, yMin).y} Z`} fill={C.accentDim} opacity="0.4" />}
          {validPoints.length > 1 && <path d={pathD} fill="none" stroke={C.accent} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />}
          {validPoints.map((p, i) => {
            const { x, y } = toSVG(p.xVal, p.error);
            const col = yMode === "signed"
              ? (p.error > 0 ? C.yellow : p.error < 0 ? C.blue : C.green)
              : (Math.abs(p.error) <= 5 ? C.green : Math.abs(p.error) <= 15 ? C.yellow : C.red);
            return <circle key={i} cx={x} cy={y} r="5" fill={col} stroke={C.bg} strokeWidth="2" />;
          })}
          <text x={PL + IW / 2} y={H} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily={MONO} fontWeight="bold">{xMode === "inning" ? "INNING" : "TIME"}</text>
          <text x={10} y={PT + IH / 2} textAnchor="middle" fontSize="10" fill={C.muted} fontFamily={MONO} fontWeight="bold" transform={`rotate(-90,10,${PT + IH / 2})`}>ERROR (MIN)</text>
        </svg>
      </div>

      <div style={{ display: "flex", gap: "12px", justifyContent: "center", marginTop: "12px" }}>
        {yMode === "signed"
          ? [["Long", C.yellow], ["Short", C.blue], ["Exact", C.green]].map(([l, c]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
              <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: c, border: `1px solid ${C.text}` }} />
              <span style={{ fontSize: "10px", color: C.muted, fontFamily: MONO, fontWeight: "bold", textTransform: "uppercase" }}>{l}</span>
            </div>
          ))
          : [["≤5m", C.green], ["≤15m", C.yellow], [">15m", C.red]].map(([l, c]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
              <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: c, border: `1px solid ${C.text}` }} />
              <span style={{ fontSize: "10px", color: C.muted, fontFamily: MONO, fontWeight: "bold", textTransform: "uppercase" }}>{l}</span>
            </div>
          ))}
      </div>
    </div>
  );
}

function StatsTable({ events, rosterData, config }) {
    const stats = useMemo(() => {
        const s = { away: {}, home: {} };
        ['away', 'home'].forEach(team => {
            (rosterData.pool?.[team] || []).forEach(p => {
                s[team][p.id] = { id: p.id, name: p.name, no: p.no, AB: 0, H: 0, R: 0, BB: 0, K: 0, HBP: 0 };
            });
        });

        events.forEach(e => {
            if (!e.team || !e.batterId) return;
            const pStats = s[e.team][e.batterId];
            if (!pStats) return;

            if (e.type === 'out') {
                if (e.outType === 'K') pStats.K++;
                if (e.outType !== 'CS' && e.outType !== 'Pickoff') {
                    pStats.AB++;
                }
            } else if (e.type === 'advance') {
                if (e.targetBase === 'walk') { pStats.BB++; }
                else if (e.targetBase === 'hbp') { pStats.HBP++; }
                else {
                    pStats.AB++;
                    if (!e.isError && ['1b','2b','3b','score'].includes(e.targetBase)) {
                        pStats.H++;
                    }
                }
            } else if (e.type === 'run') {
                if (e.targetBase === 'score') {
                    pStats.AB++;
                    if (!e.isError) pStats.H++;
                }
            }
        });

        events.forEach(e => {
            if (e.type === 'run' && e.scoredId && e.team) {
                if (s[e.team][e.scoredId]) s[e.team][e.scoredId].R++;
            }
        });

        return s;
    }, [events, rosterData]);

    const renderTeamStats = (teamName, teamKey) => {
        const players = Object.values(stats[teamKey]).filter(p => p.AB > 0 || p.BB > 0 || p.HBP > 0 || p.R > 0);
        if (!players.length) return null;

        return (
            <div style={{ marginBottom: "16px" }}>
                <Label>{teamName} BATTING</Label>
                <div style={{ overflowX: "auto", border: `2px solid ${C.text}` }}>
                    <table className="stats-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>AB</th>
                                <th>H</th>
                                <th>R</th>
                                <th>BB</th>
                                <th>K</th>
                            </tr>
                        </thead>
                        <tbody>
                            {players.map(p => (
                                <tr key={p.id}>
                                    <td>{p.no ? `#${p.no} ` : ''}{p.name || 'Unknown'}</td>
                                    <td>{p.AB}</td>
                                    <td>{p.H}</td>
                                    <td>{p.R}</td>
                                    <td>{p.BB}</td>
                                    <td>{p.K}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    return (
        <div style={{ background: C.card, border: `2px solid ${C.text}`, padding: "16px", marginBottom: "16px" }}>
            {renderTeamStats(config.away, 'away')}
            {renderTeamStats(config.home, 'home')}
        </div>
    );
}

        ? [{l:'K', v:1}, {l:'GO', v:1}, {l:'FO', v:1}, {l:'DP', v:2}, {l:'TP', v:3}, {l:'Other', v:1}]
        : [{l:'Force', v:1}, {l:'Tag', v:1}, {l:'CS', v:1}, {l:'Pickoff', v:1}, {l:'Double off', v:2}, {l:'Other', v:1}];

    const advanceOptions = isBatter
        ? [{l:'Walk', v:'walk'}, {l:'HBP', v:'hbp'}, {l:'Single', v:'1b'}, {l:'Double', v:'2b'}, {l:'Triple', v:'3b'}, {l:'HR', v:'score'}]
        : (baseId === '1b' ? [{l:'2B', v:'2b'}, {l:'3B', v:'3b'}, {l:'Score', v:'score'}]
          : baseId === '2b' ? [{l:'3B', v:'3b'}, {l:'Score', v:'score'}]
          : [{l:'Score', v:'score'}]);

    const handleOutClick = (label, count) => {
        if (count > 1) {
            setTargetOuts(count);
            setSelectedLabel(label);
            setSelectedOuts([baseId]);
            setMode('multi_out');
        } else {
            onOut(label, count, [baseId]);
        }
    };

    return (
        <div style={overlayStyle}>
            <div style={modalStyle}>
                <div style={{ fontSize: "20px", fontFamily: DISPLAY, color: C.accent, marginBottom: "10px" }}>
                    {isBatter ? "BATTER ACTION" : "RUNNER ACTION"}
                </div>
                <div style={{ fontSize: "12px", color: C.text, fontFamily: MONO, marginBottom: "12px", fontWeight: "bold" }}>
                    {runner?.name || 'Player'}
                </div>
                {mode === 'main' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                        <Btn full variant="danger" onClick={() => setMode('out')}>OUT</Btn>
                        <Btn full variant="success" onClick={() => setMode('advance')}>ADVANCE</Btn>
                        <Btn full variant="primary" onClick={onSub}>SUBSTITUTE</Btn>
                        <Btn full variant="outline" onClick={() => { setMode('edit_info'); }}>EDIT INFO</Btn>
                        {!isBatter && onCourtesy && (
                            <Btn full variant="highlight" onClick={onCourtesy}>COURTESY RUNNER</Btn>
                        )}
                        <Btn full variant="ghost" onClick={onClose}>CANCEL</Btn>
                    </div>
                )}
                {mode === 'out' && (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                        {outOptions.map(o => (
                            <Btn key={o.l} full variant="outline" onClick={() => handleOutClick(o.l, o.v)}>{o.l}</Btn>
                        ))}
                        <div style={{ gridColumn: "span 2" }}>
                            <Btn full variant="ghost" onClick={() => setMode('main')}>BACK</Btn>
                        </div>
                    </div>
                )}
                {mode === 'multi_out' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                        <Label>SELECT {targetOuts} PLAYERS OUT</Label>
                        {['home', '1b', '2b', '3b'].map(bId => bases[bId] && (
                            <label key={bId} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px', background: C.bg, border: `1px solid ${C.borderBright}` }}>
                                <input type="checkbox" checked={selectedOuts.includes(bId)} disabled={selectedOuts.length >= targetOuts && !selectedOuts.includes(bId)} onChange={(e) => {
                                    if (e.target.checked) setSelectedOuts([...selectedOuts, bId]);
                                    else setSelectedOuts(selectedOuts.filter(x => x !== bId));
                                }} />
                                <span style={{ fontSize: '12px', fontFamily: MONO, fontWeight: 'bold' }}>{bId === 'home' ? 'Batter' : bId.toUpperCase()}: {bases[bId].name || 'Player'}</span>
                            </label>
                        ))}
                        <Btn full variant="primary" disabled={selectedOuts.length !== targetOuts} onClick={() => onOut(selectedLabel, targetOuts, selectedOuts)}>CONFIRM {targetOuts} OUTS</Btn>
                        <Btn full variant="ghost" onClick={() => setMode('out')}>BACK</Btn>
                    </div>
                )}
                {mode === 'advance' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                        <div style={{ marginBottom: '8px' }}>
                            <Toggle on={isError} onToggle={() => setIsError(!isError)} label="Reached on Error" />
                        </div>
                        {advanceOptions.map(o => (
                            <Btn key={o.l} full variant="outline" onClick={() => onAdvance(o.l, o.v, isError)}>{o.l}</Btn>
                        ))}
                        <Btn full variant="ghost" onClick={() => setMode('main')}>BACK</Btn>
                    </div>
                )}
                {mode === 'edit_info' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                        <Label>SELECT OR ADD PLAYER</Label>
                        <Sel value={editSelectedId} onChange={v => {
                            setEditSelectedId(v);
                            if (v === 'add_new') {
                                setEditName('');
                                setEditNo('');
                            } else {
                                const existing = rosterPool.find(p => p.id === v);
                                if (existing) {
                                    setEditName(existing.name || '');
                                    setEditNo(existing.no || '');
                                }
                            }
                        }}>
                            <option value="" disabled hidden>Select Player...</option>
                            {rosterPool.map(p => <option key={p.id} value={p.id}>{p.no ? `#${p.no} ` : ''}{p.name || `Player ${p.id}`}</option>)}
                            <option value="add_new">+ Add New Player</option>
                        </Sel>
                        {editSelectedId === 'add_new' && (
                            <div style={{ display: "flex", gap: "6px", marginTop: "8px" }}>
                                <Inp value={editName} onChange={setEditName} placeholder="Name" />
                                <div style={{ width: "80px" }}><Inp value={editNo} onChange={setEditNo} placeholder="No." /></div>
                            </div>
                        )}
                        <Btn full variant="primary" onClick={() => {
                            if (editSelectedId === 'add_new') {
                                onEditInfo({ id: `p_${Date.now()}`, name: editName, no: editNo });
                            } else {
                                const existing = rosterPool.find(p => p.id === editSelectedId);
                                if (existing) {
                                    onEditInfo({ ...existing, name: editName, no: editNo });
                                } else if (editSelectedId === runner?.id) {
                                    // Fallback for an unsaved dummy runner
                                    onEditInfo({ ...runner, name: editName, no: editNo });
                                }
                            }
                        }}>SAVE INFO</Btn>
                        <Btn full variant="ghost" onClick={() => setMode('main')}>BACK</Btn>
                    </div>
                )}
            </div>
        </div>
    )
}

function FielderSubModal({ team, pos, currentPlayer, rosterPool, activeFieldersMap, currentPitchTotal, onSave, onCancel }) {
    const [selectedId, setSelectedId] = useState(currentPlayer?.id || "");
    const [pitches, setPitches] = useState(String(currentPitchTotal || ""));
    const [newName, setNewName] = useState("");
    const [newNo, setNewNo] = useState("");

    const handleConfirm = () => {
         let newPlayer;
         if (selectedId === 'add_new') {
             newPlayer = { id: `p_${Date.now()}`, name: newName, no: newNo, pos: pos };
         } else {
             newPlayer = rosterPool.find(p => p.id === selectedId);
             if (!newPlayer && selectedId === (currentPlayer?.id || "")) {
                 newPlayer = currentPlayer;
             }
         }
         if (newPlayer) {
             onSave({ ...newPlayer, pos }, parseInt(pitches) || 0);
         }
    };

    return (
        <div style={overlayStyle}>
            <div style={modalStyle}>
                <div style={{ fontSize: "20px", fontFamily: DISPLAY, color: C.accent, marginBottom: "10px" }}>ASSIGN {pos}</div>
                <div style={{ fontSize: "12px", color: C.text, fontFamily: MONO, marginBottom: "12px", fontWeight: "bold" }}>
                    {currentPlayer?.name ? `Current: ${currentPlayer.name} (#${currentPlayer.no})` : `No player currently assigned to ${pos}`}
                </div>
                
                <Label>SELECT FROM FULL ROSTER</Label>
                <Sel value={selectedId} onChange={setSelectedId}>
                    <option value="" disabled hidden>Select Player...</option>
                    {rosterPool.map(p => {
                        const existingPos = Object.entries(activeFieldersMap).find(([pPos, assigned]) => assigned?.id === p.id && pPos !== pos)?.[0];
                        return <option key={p.id} value={p.id}>{p.no ? `#${p.no} ` : ''}{p.name || `Player`} {existingPos ? `(Move from ${existingPos})` : ''}</option>;
                    })}
                    <option value="add_new">+ Add New Player</option>
                </Sel>

                {selectedId === 'add_new' && (
                    <div style={{ display: "flex", gap: "6px", marginTop: "12px" }}>
                        <Inp value={newName} onChange={setNewName} placeholder="Name" />
                        <div style={{ width: "80px" }}><Inp value={newNo} onChange={setNewNo} placeholder="No." /></div>
                    </div>
                )}

                {pos === 'P' && currentPlayer?.name && selectedId !== 'add_new' && (
                    <div style={{ marginTop: "12px", borderTop: `1px dashed ${C.borderBright}`, paddingTop: "12px" }}>
                        <Label>TOTAL GAME PITCHES BY OUTGOING PITCHER ({currentPlayer.name})</Label>
                        <Inp value={pitches} onChange={setPitches} placeholder="Total count..." type="number" />
                    </div>
                )}

                <div style={{ display: "flex", gap: "10px", marginTop: "16px" }}>
                    <Btn full variant="primary" onClick={handleConfirm} disabled={!selectedId && !currentPlayer}>CONFIRM</Btn>
                    <Btn full variant="ghost" onClick={onCancel}>CANCEL</Btn>
                </div>
            </div>
        </div>
    );
}

function RosterScreen({ rosterData, onSaveRoster, onClose, awayName, homeName }) {
  const [activeTab, setActiveTab] = useState('away');
  const [roster, setRoster] = useState(() => JSON.parse(JSON.stringify(rosterData)));
  const [mode, setMode] = useState('edit');
  const fileInputRef = useRef(null);
  const importTextareaRef = useRef(null);
  const [showImportTextarea, setShowImportTextarea] = useState(false);

  const updatePlayer = (team, id, field, value) => {
      const newRoster = { ...roster };
      
      const poolIdx = newRoster.pool[team].findIndex(p => p.id === id);
      if (poolIdx > -1) newRoster.pool[team][poolIdx][field] = value;
      
      const lineupIdx = newRoster[team].findIndex(p => p.id === id);
      if (lineupIdx > -1) newRoster[team][lineupIdx][field] = value;
      
      Object.keys(newRoster.fielders[team]).forEach(pos => {
          if (newRoster.fielders[team][pos]?.id === id) {
              newRoster.fielders[team][pos][field] = value;
          }
      });
      
      setRoster(newRoster);
  };

  const handlePoolChange = (team, index, field, value) => {
      const poolId = roster.pool[team][index].id;
      updatePlayer(team, poolId, field, value);
  };

  const handleAddPoolPlayer = (team) => {
      const newRoster = { ...roster };
      newRoster.pool[team].push({ id: `p_${Date.now()}`, name: '', no: '', pos: '' });
      setRoster(newRoster);
  };
  
  const handleRemovePoolPlayer = (team, id) => {
      const newRoster = { ...roster };
      newRoster.pool[team] = newRoster.pool[team].filter(p => p.id !== id);
      setRoster(newRoster);
  };

  const handleLineupSelect = (team, index, poolId) => {
      const poolPlayer = roster.pool[team].find(p => p.id === poolId);
      if (!poolPlayer) {
          const newRoster = { ...roster };
          newRoster[team][index] = { id: `blank_${Date.now()}`, name: '', no: '', pos: newRoster[team][index].pos };
          setRoster(newRoster);
          return;
      }
      const newRoster = { ...roster };
      const oldPos = newRoster[team][index].pos;
      newRoster[team][index] = { ...poolPlayer, pos: oldPos };
      if (oldPos && newRoster.fielders[team][oldPos]?.id === newRoster[team][index].id) {
          newRoster.fielders[team][oldPos] = { ...poolPlayer, pos: oldPos };
      }
      setRoster(newRoster);
  };

  const handleLineupPosChange = (team, index, value) => {
      const newRoster = { ...roster };
      const pId = newRoster[team][index].id;
      newRoster[team][index].pos = value;
      
      if (pId) {
          const pIdx = newRoster.pool[team].findIndex(p => p.id === pId);
          if (pIdx > -1) newRoster.pool[team][pIdx].pos = value;
          
          Object.keys(newRoster.fielders[team]).forEach(p => {
              if (newRoster.fielders[team][p]?.id === pId) newRoster.fielders[team][p] = null;
          });
          if (value) {
              newRoster.fielders[team][value] = newRoster[team][index];
          }
      }
      setRoster(newRoster);
  };

  const handleDefensiveChange = (team, pos, val) => {
      const newRoster = { ...roster };
      newRoster.fielders = { ...newRoster.fielders };
      newRoster.fielders[team] = { ...newRoster.fielders[team] };
      
      Object.keys(newRoster.fielders[team]).forEach(p => {
          if (newRoster.fielders[team][p]?.id === val) newRoster.fielders[team][p] = null;
      });

      if (val === "clear") {
          newRoster.fielders[team][pos] = null;
      } else {
          const poolPlayer = newRoster.pool[team].find(p => p.id === val);
          if (poolPlayer) {
              newRoster.fielders[team][pos] = { ...poolPlayer, pos };
              
              const pIdx = newRoster.pool[team].findIndex(p => p.id === val);
              if (pIdx > -1) newRoster.pool[team][pIdx].pos = pos;
              
              const lIdx = newRoster[team].findIndex(p => p.id === val);
              if (lIdx > -1) newRoster[team][lIdx].pos = pos;
          }
      }
      setRoster(newRoster);
  };

  const handleAddHitter = (team) => {
      const newRoster = { ...roster };
      newRoster[team].push({ id: `h_${Date.now()}`, name: '', no: '', pos: '' });
      setRoster(newRoster);
  };

  const handleSortPool = (team, by) => {
      const newRoster = { ...roster };
      newRoster.pool[team].sort((a, b) => {
          if (by === 'no') {
              return (parseInt(a.no) || 0) - (parseInt(b.no) || 0);
          } else {
              const getLastName = name => (name || '').trim().split(' ').pop().toLowerCase();
              return getLastName(a.name).localeCompare(getLastName(b.name));
          }
      });
      setRoster(newRoster);
  };

  const processRosterText = (text, team) => {
      const lines = text.split('\n');
      const newRoster = { ...roster };
      lines.forEach((line, i) => {
          const clean = line.trim();
          if (!clean) return;
          
          const lower = clean.toLowerCase();
          if (lower.startsWith('#') && lower.includes('name')) return;
          if (lower === 'order' || lower === 'player' || lower === 'position') return;
          if (lower.includes('first name') || lower.includes('last name')) return;

          let name = clean;
          let no = '';
          
          // Match GameChanger formats like "12 John Doe"
          const gcMatch = clean.match(/^(\d+)\s+(.+)$/);
          if (gcMatch) {
              no = gcMatch[1];
              name = gcMatch[2].trim();
          } else {
              // Match alternate formats like "John Doe 12"
              const reverseMatch = clean.match(/^(.+?)\s+(\d+)$/);
              if (reverseMatch) {
                  name = reverseMatch[1].trim();
                  no = reverseMatch[2];
              } else {
                  // Fallbacks for commas or dashes
                  const parts = clean.split(/[,]+| - | \t /);
                  if (parts.length > 1) {
                      name = parts[0].trim();
                      no = parts[1].trim();
                  }
              }
          }
          
          name = name.split('\t')[0].trim(); 
          newRoster.pool[team].push({ id: `p_${Date.now()}_${i}`, name, no, pos: '' });
      });
      setRoster(newRoster);
  };

  const handleFileImport = (e, team) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
          processRosterText(ev.target.result, team);
      };
      reader.readAsText(file);
      e.target.value = null; // reset input
  };
  
  const handlePastedRoster = (e, team) => {
      const val = e.target.value;
      if (!val) return;
      processRosterText(val, team);
      setShowImportTextarea(false);
  };
  
  const rotateLineup = (team, newLeadoffIndex) => {
      if (newLeadoffIndex === 0) return;
      const newRoster = { ...roster };
      const currentLineup = newRoster[team];
      newRoster[team] = [...currentLineup.slice(newLeadoffIndex), ...currentLineup.slice(0, newLeadoffIndex)];
      
      if (newRoster.lineupIdx?.[team] !== undefined) {
          newRoster.lineupIdx[team] = 0; // Reset active batter to top for clarity
      }
      setRoster(newRoster);
  };

  const list = roster[activeTab];
  const poolList = roster.pool?.[activeTab] || [];

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SERIF, padding: "0 0 48px" }}>
      <div style={{ padding: "20px 20px 10px", borderBottom: `2px solid ${C.text}`, textAlign: "center" }}>
        <div style={{ fontSize: "28px", fontFamily: DISPLAY, color: C.accent, lineHeight: 1 }}>ROSTER & LINEUP</div>
      </div>
      
      <div style={{ display: "flex", borderBottom: `2px solid ${C.text}`, background: C.card }}>
          <button onClick={() => setActiveTab('away')} style={{ flex: 1, padding: "12px", fontFamily: MONO, fontWeight: "bold", background: activeTab === 'away' ? C.text : "transparent", color: activeTab === 'away' ? C.bg : C.text, border: "none" }}>{awayName || "AWAY"}</button>
          <button onClick={() => setActiveTab('home')} style={{ flex: 1, padding: "12px", fontFamily: MONO, fontWeight: "bold", background: activeTab === 'home' ? C.text : "transparent", color: activeTab === 'home' ? C.bg : C.text, border: "none" }}>{homeName || "HOME"}</button>
      </div>

      <div style={{ padding: "20px 16px", maxWidth: "420px", margin: "0 auto" }}>
          
        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "16px", display: "flex", justify-content: "space-between", alignItems: "center" }}>
            <div>
                <Label>ENTRY MODE</Label>
                <div style={{ fontSize: "11px", fontFamily: MONO, color: C.muted }}>{mode === 'edit' ? 'Setup Mode (No Logs)' : 'Lineup Display'}</div>
            </div>
            <Toggle on={mode === 'sub'} onToggle={() => setMode(mode === 'edit' ? 'sub' : 'edit')} label={mode === 'sub' ? '🔄 VIEW' : '✎ EDIT'} />
        </div>

        {mode === 'edit' && (
             <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "20px" }}>
                 <Label>FULL TEAM ROSTER</Label>
                 <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
                    <div style={{ fontSize: "11px", color: C.muted, fontFamily: MONO }}>Add all players here to easily select them.</div>
                    <div style={{ display: "flex", gap: "6px" }}>
                        <Btn variant="ghost" small onClick={() => handleSortPool(activeTab, 'name')}>A-Z ↓</Btn>
                        <Btn variant="ghost" small onClick={() => handleSortPool(activeTab, 'no')}>1-9 ↓</Btn>
                    </div>
                 </div>
                 
                 {showImportTextarea && (
                     <textarea 
                        ref={importTextareaRef}
                        onChange={(e) => handlePastedRoster(e, activeTab)}
                        placeholder="Paste list from GameChanger/Notes here..." 
                        style={{ width: "100%", height: "80px", marginBottom: "12px", fontFamily: MONO, fontSize: "12px", padding: "8px", boxSizing: "border-box", border: `1px solid ${C.borderBright}` }}
                     />
                 )}
                 
                 <div style={{ maxHeight: "200px", overflowY: "auto", marginBottom: "12px", paddingRight: "4px" }}>
                     {poolList.map((p, i) => (
                         <div key={p.id} style={{ display: "flex", gap: "6px", marginBottom: "6px", alignItems: "center" }}>
                             <Inp value={p.name} onChange={v => handlePoolChange(activeTab, i, 'name', v)} placeholder="Name" />
                             <div style={{ width: "80px" }}>
                                 <Inp value={p.no} onChange={v => handlePoolChange(activeTab, i, 'no', v)} placeholder="No." />
                             </div>
                             <button onClick={() => handleRemovePoolPlayer(activeTab, p.id)} style={{ background: "transparent", border: "none", color: C.red, fontWeight: "bold", cursor: "pointer", fontSize: "16px", padding: "0 4px" }}>×</button>
                         </div>
                     ))}
                 </div>
                 <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                     <Btn variant="outline" small style={{ flex: 1 }} onClick={() => handleAddPoolPlayer(activeTab)}>+ Add Player</Btn>
                     <Btn variant="outline" small style={{ flex: 1 }} onClick={() => fileInputRef.current.click()}>+ Import .txt</Btn>
                     <Btn variant="outline" small style={{ flex: 1 }} onClick={() => setShowImportTextarea(!showImportTextarea)}>📋 Paste List</Btn>
                     <input type="file" ref={fileInputRef} accept=".txt" style={{ display: "none" }} onChange={e => handleFileImport(e, activeTab)} />
                 </div>
             </div>
        )}

        <div style={{ border: `2px solid ${C.text}`, background: C.card, padding: "16px", marginBottom: "20px" }}>
            <Label>BATTING ORDER</Label>
            {list.map((player, i) => (
                <div key={i} style={{ display: "flex", gap: "6px", marginBottom: "8px", alignItems: "center" }}>
                    {mode === 'edit' && (
                        <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
                            <button disabled={i === 0} onClick={() => rotateLineup(activeTab, i)} style={{ background: "transparent", border: `1px solid ${C.borderBright}`, cursor: i === 0 ? "default" : "pointer", fontSize: "8px", padding: "4px", opacity: i === 0 ? 0.3 : 1, whiteSpace: "nowrap" }}>↻ LEADOFF</button>
                        </div>
                    )}
