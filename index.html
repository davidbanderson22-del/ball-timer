<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Baseball Estimator v5.1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0c0a; color: #e0e6e0; font-family: 'DM Mono', monospace; overflow-x: hidden; }
        .score-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        .glass { background: rgba(20, 25, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #1f261e; }
        .btn-active { background: #a3e635; color: #000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2e3d2c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- RESTORED LEAGUE SEEDS FROM V5 ---
        const LEAGUES = {
            hs:       { label: "High School",         halfInning: 10,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
            college:  { label: "College / NCAA",      halfInning: 11,  warmup: 2.5, innings: 9, mercy: 10, mercyAfter: 7 },
            rec:      { label: "Adult Rec / Amateur", halfInning: 13,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
            mlb:      { label: "MLB / Pro",           halfInning: 10,  warmup: 2.0, innings: 9, mercy: null, mercyAfter: null },
            softball: { label: "Softball",            halfInning: 9,   warmup: 2.5, innings: 7, mercy: 10, mercyAfter: 5 },
            custom:   { label: "Custom",              halfInning: 11,  warmup: 3.0, innings: 7, mercy: 10, mercyAfter: 5 },
        };

        const EV = { START: "start", TOP: "top", MID: "mid", BOT: "bot" };
        const PHASE_ORDER = [EV.START, EV.TOP, EV.MID, EV.BOT];

        // --- UTILS ---
        const parseTime = (s) => { if(!s) return null; const [h,m] = s.split(':').map(Number); return h*60+m; };
        const formatTime = (min) => {
            if (min == null) return "--:--";
            const t = (Math.round(min) + 1440) % 1440;
            const h = Math.floor(t / 60), m = t % 60;
            return `${h % 12 || 12}:${m.toString().padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
        };
        const nowHM = () => { const d = new Date(); return `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`; };

        // --- MONTE CARLO ENGINE ---
        function poissonSample(lambda) {
            if (lambda <= 0) return 0;
            const L = Math.exp(-Math.min(lambda, 20));
            let k = 0, p = 1;
            do { k++; p *= Math.random(); } while (p > L);
            return k - 1;
        }

        // --- SETUP SCREEN ---
        const Setup = ({ onStart }) => {
            const [lg, setLg] = useState('hs');
            const [away, setAway] = useState('AWAY');
            const [home, setHome] = useState('HOME');
            const [time, setTime] = useState(nowHM());

            return (
                <div style={{ padding: '40px 20px', maxWidth: '400px', margin: '0 auto' }}>
                    <h1 className="score-font" style={{ fontSize: '48px', color: '#a3e635', marginBottom: '30px' }}>ESTIMATOR V5.1</h1>
                    <div className="glass" style={{ padding: '20px', borderRadius: '12px' }}>
                        <label style={{ fontSize: '10px', color: '#6b7f66' }}>LEAGUE PRESET</label>
                        <select value={lg} onChange={e => setLg(e.target.value)} style={{ width: '100%', padding: '12px', background: '#0a0c0a', color: '#fff', border: '1px solid #1f261e', marginBottom: '20px' }}>
                            {Object.entries(LEAGUES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                        </select>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '20px' }}>
                            <input placeholder="Away" value={away} onChange={e => setAway(e.target.value)} style={{ padding: '12px', background: '#0a0c0a', color: '#fff', border: '1px solid #1f261e' }} />
                            <input placeholder="Home" value={home} onChange={e => setHome(e.target.value)} style={{ padding: '12px', background: '#0a0c0a', color: '#fff', border: '1px solid #1f261e' }} />
                        </div>
                        <label style={{ fontSize: '10px', color: '#6b7f66' }}>FIRST PITCH</label>
                        <input value={time} onChange={e => setTime(e.target.value)} style={{ width: '100%', padding: '12px', background: '#0a0c0a', color: '#fff', border: '1px solid #1f261e', marginBottom: '30px' }} />
                        <button onClick={() => onStart({ ...LEAGUES[lg], away, home, gameStartTime: parseTime(time) })} className="score-font" style={{ width: '100%', padding: '15px', background: '#a3e635', color: '#000', border: 'none', borderRadius: '4px', fontSize: '20px' }}>START GAME</button>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const Game = ({ config, onReset }) => {
            const [events, setEvents] = useState([]);
            const [score, setScore] = useState({ away: 0, home: 0 });
            const [outs, setOuts] = useState(0);
            const [history, setHistory] = useState([]);

            // Transition Logic
            const getNext = () => {
                if (!events.length) return { inning: 1, phase: EV.START };
                const last = events[events.length - 1];
                const idx = PHASE_ORDER.indexOf(last.phase);
                if (idx < 3) return { inning: last.inning, phase: PHASE_ORDER[idx + 1] };
                return { inning: last.inning + 1, phase: EV.START };
            };

            const next = getNext();

            const logAction = (type, val = 1) => {
                const now = parseTime(nowHM());
                if (type === 'RUN') {
                    const team = next.phase === EV.TOP ? 'away' : 'home';
                    setScore(s => ({ ...s, [team]: s[team] + val }));
                } else if (type === 'OUT') {
                    if (outs + val >= 3) {
                        setOuts(0);
                        const newEv = { ...next, time: now, id: Date.now() };
                        setEvents(prev => [...prev, newEv]);
                    } else {
                        setOuts(o => o + val);
                    }
                } else if (type === 'PHASE') {
                    setEvents(prev => [...prev, { ...next, time: now, id: Date.now() }]);
                }
            };

            // Estimate Engine
            const est = useMemo(() => {
                const sorted = [...events].sort((a,b) => a.time - b.time);
                const halfDurs = [], warmupDurs = [];
                for (let i = 0; i < sorted.length - 1; i++) {
                    const d = sorted[i+1].time - sorted[i].time;
                    if (d < 0 || d > 90) continue;
                    (sorted[i].phase === EV.TOP || sorted[i].phase === EV.BOT) ? halfDurs.push(d) : warmupDurs.push(d);
                }

                const avgH = halfDurs.length ? halfDurs.reduce((a,b)=>a+b,0)/halfDurs.length : config.halfInning;
                const avgW = warmupDurs.length ? warmupDurs.reduce((a,b)=>a+b,0)/warmupDurs.length : config.warmup;

                let remH = 0, remW = 0;
                const last = sorted[sorted.length-1] || { inning: 1, phase: EV.START, time: config.gameStartTime };
                
                for(let i = last.inning; i <= config.innings; i++) {
                    PHASE_ORDER.forEach(p => {
                        if (i === last.inning && PHASE_ORDER.indexOf(p) <= PHASE_ORDER.indexOf(last.phase)) return;
                        if (i === config.innings && p === EV.BOT && score.home > score.away) return;
                        (p === EV.TOP || p === EV.BOT) ? remH++ : remW++;
                    });
                }

                return {
                    end: last.time + (remH * avgH) + (remW * avgW),
                    avgH, avgW, remH,
                    confidence: halfDurs.length > 3 ? 'STRONG' : 'SEED'
                };
            }, [events, score]);

            return (
                <div style={{ padding: '15px', maxWidth: '440px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                        <span className="score-font" style={{ color: '#6b7f66' }}>{config.away} @ {config.home}</span>
                        <button onClick={onReset} style={{ background: 'none', border: 'none', color: '#e05c4b', cursor: 'pointer' }}>[RESET]</button>
                    </div>

                    {/* SCOREBOARD AESTHETIC */}
                    <div className="glass" style={{ borderRadius: '12px', padding: '20px', textAlign: 'center', marginBottom: '15px' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center' }}>
                            <div>
                                <div className="score-font" style={{ fontSize: '64px', color: score.away > score.home ? '#a3e635' : '#fff' }}>{score.away}</div>
                                <div style={{ fontSize: '10px', color: '#6b7f66' }}>{config.away}</div>
                            </div>
                            <div className="score-font" style={{ fontSize: '24px', color: '#1f261e', padding: '0 20px' }}>VS</div>
                            <div>
                                <div className="score-font" style={{ fontSize: '64px', color: score.home > score.away ? '#a3e635' : '#fff' }}>{score.home}</div>
                                <div style={{ fontSize: '10px', color: '#6b7f66' }}>{config.home}</div>
                            </div>
                        </div>
                    </div>

                    {/* ESTIMATE CARD */}
                    <div className="glass" style={{ borderRadius: '12px', padding: '24px', border: '1px solid #a3e635', marginBottom: '15px', textAlign: 'center' }}>
                        <div style={{ fontSize: '10px', color: '#a3e635', letterSpacing: '4px', marginBottom: '5px' }}>ESTIMATED COMPLETION</div>
                        <div className="score-font" style={{ fontSize: '56px', color: '#a3e635' }}>{formatTime(est.end)}</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', marginTop: '15px' }}>
                            <div style={{ fontSize: '11px' }}><div style={{ color: '#6b7f66' }}>PACE</div>{Math.round(est.avgH)}m</div>
                            <div style={{ fontSize: '11px' }}><div style={{ color: '#6b7f66' }}>LEFT</div>{est.remH}</div>
                            <div style={{ fontSize: '11px' }}><div style={{ color: '#a3e635' }}>{est.confidence}</div></div>
                        </div>
                    </div>

                    {/* CONTROLS */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '15px' }}>
                        {(next.phase === EV.TOP || next.phase === EV.BOT) ? (
                            <>
                                <button onClick={() => logAction('RUN')} className="score-font" style={{ padding: '25px', fontSize: '24px', background: '#141914', color: '#a3e635', border: '1px solid #1f261e', borderRadius: '8px' }}>RUN +1</button>
                                <button onClick={() => logAction('OUT')} className="score-font" style={{ padding: '25px', fontSize: '24px', background: '#141914', color: '#fff', border: '1px solid #1f261e', borderRadius: '8px' }}>OUT ({outs})</button>
                            </>
                        ) : (
                            <button onClick={() => logAction('PHASE')} className="score-font" style={{ gridColumn: 'span 2', padding: '25px', fontSize: '24px', background: '#a3e635', color: '#000', border: 'none', borderRadius: '8px' }}>
                                START {next.phase === EV.START ? `INN ${next.inning}` : 'BOT HALF'}
                            </button>
                        )}
                    </div>

                    {/* PHASE TRACKER */}
                    <div className="glass" style={{ padding: '15px', borderRadius: '8px', fontSize: '12px' }}>
                        <div style={{ color: '#6b7f66', marginBottom: '10px' }}>PHASE: {next.phase.toUpperCase()} {next.inning}</div>
                        <div style={{ maxHeight: '100px', overflowY: 'auto' }}>
                            {[...events].reverse().map(e => (
                                <div key={e.id} style={{ borderBottom: '1px solid #1f261e', padding: '5px 0' }}>
                                    <span style={{ color: '#6b7f66' }}>{formatTime(e.time)}</span> — {e.phase.toUpperCase()} {e.inning}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cfg, setCfg] = useState(null);
            return cfg ? <Game config={cfg} onReset={() => setCfg(null)} /> : <Setup onStart={setCfg} />;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
